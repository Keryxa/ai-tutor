<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }

        .container {
            z-index: 2;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            max-width: 80%;
        }

        h1 { color: #d81b60; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #880e4f; font-size: 1.2rem; }

        .btn {
            background: #d81b60;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 20px;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.4);
        }

        /* Анимация сердечек */
        .heart {
            position: absolute;
            color: rgba(216, 27, 96, 0.6);
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: move linear infinite;
        }

        @keyframes move {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="headline">Ты — моё самое яркое событие</h1>
        <p id="subline">Нажми на кнопку, если скучаешь...</p>
        <button class="btn" onclick="showLove()">Нажать</button>
    </div>

    <script>
        // Генерация падающих сердечек
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);

        const phrases = [
            "Я очень рад, что мы вместе ❤️",
            "Твоя улыбка — это лучший подарок",
            "Хочу обнять тебя прямо сейчас!",
            "С каждым днем ты мне дороже",
            "Ты — причина моей радости"
        ];

        function showLove() {
            const headline = document.getElementById('headline');
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            headline.innerText = randomPhrase;
            
            // Вибрация на телефоне (если поддерживается)
            if (navigator.vibrate) navigator.vibrate(50);
        }
    </script>
</body>
</html>
