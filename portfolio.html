<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
  <title>Креативный редактор · Портфолио карточек</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 100%);
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    .site-wrapper {
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ----- ВЕРХНИЕ КНОПКИ (как прежде) ----- */
    .nav-bar {
      width: 100%;
      padding: 1.8rem 2rem 1rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 2rem;
      background: rgba(10, 10, 20, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .gradient-btn {
      padding: 0.9rem 2.8rem;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff6b9d, #c44dff, #6b7bff);
      background-size: 250% 250%;
      color: white;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(180, 80, 255, 0.4);
      transition: all 0.3s ease;
      animation: gradientShift 4s ease infinite;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .gradient-btn i {
      font-size: 1.2rem;
      transition: transform 0.2s;
    }

    .gradient-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 35px rgba(200, 100, 255, 0.6);
      animation: gradientShift 2s ease infinite;
    }

    .gradient-btn:hover i {
      transform: scale(1.2);
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ----- АНИМИРОВАННЫЕ БЛОКИ ИНФОРМАЦИИ НА ГЛАВНОЙ ----- */
    .info-section {
      width: 100%;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
    }

    .animated-blocks {
      display: flex;
      flex-wrap: wrap;
      gap: 2.5rem;
      justify-content: center;
      align-items: center;
      max-width: 1300px;
      width: 100%;
    }

    .info-block {
      background: rgba(30, 30, 45, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 3rem;
      padding: 2.2rem 2.5rem;
      text-align: center;
      min-width: 220px;
      flex: 1 1 220px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 35px rgba(0,0,0,0.6);
      animation: floatBlock 4s ease-in-out infinite;
      transition: transform 0.3s;
    }

    .info-block:nth-child(2) { animation-delay: 0.4s; }
    .info-block:nth-child(3) { animation-delay: 0.8s; }
    .info-block:nth-child(4) { animation-delay: 1.2s; }

    @keyframes floatBlock {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    .info-block:hover {
      transform: translateY(-8px) scale(1.03);
      border-color: #c44dff;
    }

    .info-number {
      font-size: 3.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f9a8d4, #b084f5, #6b9bff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      line-height: 1.2;
    }

    .info-label {
      font-size: 1.2rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #d1d1f0;
      margin-top: 0.6rem;
    }

    .info-desc {
      font-size: 0.9rem;
      color: #b0b0cc;
      margin-top: 0.4rem;
    }

    /* ----- МОДАЛЬНЫЕ ОКНА (общие стили) ----- */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
    }

    .modal.active {
      display: flex;
    }

    .modal-dialog {
      background: rgba(20, 20, 35, 0.95);
      border-radius: 2.5rem;
      padding: 2.2rem;
      max-width: 800px;
      width: 95%;
      max-height: 85vh;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 30px 45px #00000080;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 1.2rem;
      right: 1.8rem;
      background: none;
      border: none;
      color: #ffffffcc;
      font-size: 2rem;
      cursor: pointer;
      transition: 0.2s;
    }

    .modal-close:hover {
      color: #ff8ab3;
      transform: scale(1.1);
    }

    /* ПОРТФОЛИО в модалке: только картинки и текст ДО/ПОСЛЕ */
    .portfolio-modal-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      margin-top: 1rem;
    }

    .compare-item {
      text-align: center;
    }

    .image-only-card {
      width: 240px;
      background: #ffffff10;
      border-radius: 2rem;
      padding: 1rem;
      backdrop-filter: blur(4px);
    }

    .mock-image {
      width: 100%;
      height: 170px;
      border-radius: 1.2rem;
      background-size: cover;
      background-position: center;
    }

    .label-before, .label-after {
      font-weight: 700;
      margin-top: 0.5rem;
      font-size: 1rem;
      letter-spacing: 0.05em;
    }

    .label-before { color: #b9b9dd; }
    .label-after { color: #f5b7ff; }

    /* Отзывы в модальном окне */
    .reviews-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.3rem;
      justify-content: center;
      margin: 1.5rem 0;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border-radius: 1.8rem;
      padding: 1.4rem;
      flex: 1 1 230px;
      backdrop-filter: blur(8px);
    }

    .stars {
      color: #ffb84d;
    }

    /* Кнопка "Оставить отзыв" справа внизу */
    .floating-review-btn {
      position: fixed;
      bottom: 2.2rem;
      right: 2.2rem;
      background: linear-gradient(135deg, #ff7eb3, #b95cf0);
      border: none;
      border-radius: 4rem;
      padding: 1rem 2rem;
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
      box-shadow: 0 12px 28px rgba(180,70,255,0.7);
      cursor: pointer;
      z-index: 150;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: 0.25s;
      animation: pulseBtn 2s infinite;
    }

    .floating-review-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 18px 35px #b45fff;
    }

    @keyframes pulseBtn {
      0% { box-shadow: 0 0 0 0 rgba(200, 100, 255, 0.7); }
      70% { box-shadow: 0 0 0 18px rgba(200, 100, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(200, 100, 255, 0); }
    }

    /* Форма отзыва (внутри модалки) */
    .comment-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }

    .comment-form input, .comment-form textarea {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 2rem;
      padding: 0.9rem 1.4rem;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    .comment-form input:focus, .comment-form textarea:focus {
      border-color: #c44dff;
    }

    .submit-review-btn {
      background: #c44dff;
      border: none;
      border-radius: 3rem;
      padding: 0.9rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-top: 1rem;
    }

    .contact-link {
      background: #ffffff10;
      padding: 1rem;
      border-radius: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="site-wrapper">
  <!-- Верхние кнопки (теперь открывают модальные окна) -->
  <div class="nav-bar">
    <button class="gradient-btn" onclick="openPortfolioModal()"><i class="fas fa-images"></i> Портфолио</button>
    <button class="gradient-btn" onclick="openReviewsModal()"><i class="fas fa-star"></i> Отзывы</button>
    <button class="gradient-btn" onclick="openContactsModal()"><i class="fas fa-address-book"></i> Контакты</button>
  </div>

  <!-- ГЛАВНАЯ: только анимированные информационные блоки -->
  <section class="info-section">
    <div class="animated-blocks">
      <div class="info-block">
        <span class="info-number">5+</span>
        <span class="info-label">Лет опыта</span>
        <div class="info-desc">в креативном дизайне</div>
      </div>
      <div class="info-block">
        <span class="info-number">1000+</span>
        <span class="info-label">Заказов</span>
        <div class="info-desc">успешно выполнено</div>
      </div>
      <div class="info-block">
        <span class="info-number">98%</span>
        <span class="info-label">Довольных</span>
        <div class="info-desc">клиентов возвращаются</div>
      </div>
      <div class="info-block">
        <span class="info-number">ТОП</span>
        <span class="info-label">Редактор</span>
        <div class="info-desc">маркетплейсов</div>
      </div>
    </div>
  </section>
</div>

<!-- КНОПКА ОТЗЫВ СПРАВА ВНИЗУ (закреплена) -->
<button class="floating-review-btn" id="floatingReviewBtn"><i class="fas fa-pen"></i> Отзыв</button>

<!-- МОДАЛЬНОЕ ОКНО: ПОРТФОЛИО (только изображения и ДО/ПОСЛЕ) -->
<div id="portfolioModal" class="modal">
  <div class="modal-dialog">
    <button class="modal-close" onclick="closeModal('portfolioModal')">&times;</button>
    <h2 style="text-align:center; margin-bottom:1.5rem;">✨ До / После обработки</h2>
    <div class="portfolio-modal-grid">
      <div class="compare-item">
        <div class="image-only-card"><div class="mock-image" style="background: linear-gradient(135deg, #b0b0c0, #8787a2);"></div></div>
        <div class="label-before">📸 ДО</div>
      </div>
      <div class="compare-item">
        <div class="image-only-card"><div class="mock-image" style="background: radial-gradient(circle at 20% 30%, #ffd0e0, #c9a5ff);"></div></div>
        <div class="label-after">✨ ПОСЛЕ</div>
      </div>
      <div class="compare-item">
        <div class="image-only-card"><div class="mock-image" style="background: linear-gradient(145deg, #b8b8d0, #7c7c9c);"></div></div>
        <div class="label-before">📸 ДО</div>
      </div>
      <div class="compare-item">
        <div class="image-only-card"><div class="mock-image" style="background: radial-gradient(circle at 80% 30%, #ffe5f0, #b594f0);"></div></div>
        <div class="label-after">✨ ПОСЛЕ</div>
      </div>
    </div>
  </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО: ОТЗЫВЫ (просмотр) -->
<div id="reviewsModal" class="modal">
  <div class="modal-dialog">
    <button class="modal-close" onclick="closeModal('reviewsModal')">&times;</button>
    <h2 style="text-align:center;">💬 Отзывы клиентов</h2>
    <div class="reviews-grid" id="reviewsList"></div>
  </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО: КОНТАКТЫ -->
<div id="contactsModal" class="modal">
  <div class="modal-dialog" style="max-width:450px;">
    <button class="modal-close" onclick="closeModal('contactsModal')">&times;</button>
    <h2 style="text-align:center;">Связь со мной</h2>
    <div class="contact-links">
      <a href="https://t.me/casper_lider" target="_blank" class="contact-link"><i class="fab fa-telegram-plane"></i> @casper_lider</a>
      <a href="mailto:arestov03900@gmail.com" class="contact-link"><i class="fas fa-envelope"></i> arestov03900@gmail.com</a>
    </div>
  </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО: ОСТАВИТЬ ОТЗЫВ (после пароля) -->
<div id="leaveReviewModal" class="modal">
  <div class="modal-dialog" style="max-width:500px;">
    <button class="modal-close" onclick="closeModal('leaveReviewModal')">&times;</button>
    <h2 style="text-align:center;">✍️ Новый отзыв</h2>
    <div class="comment-form">
      <input type="text" id="authorInput" placeholder="Ваше имя">
      <textarea id="reviewTextInput" rows="3" placeholder="Поделитесь впечатлением..."></textarea>
      <button class="submit-review-btn" onclick="submitReviewFromModal()">Отправить</button>
      <span id="reviewStatus" style="font-size:0.9rem; color:#f5b7ff;"></span>
    </div>
  </div>
</div>

<!-- СКРЫТОЕ МОДАЛЬНОЕ ОКНО ДЛЯ ВВОДА ПАРОЛЯ -->
<div id="passwordModal" class="modal">
  <div class="modal-dialog" style="max-width:380px; text-align:center;">
    <button class="modal-close" onclick="closeModal('passwordModal')">&times;</button>
    <h3>🔐 Введите пароль</h3>
    <input type="password" id="passwordInput" placeholder="Пароль" style="width:100%; margin:1.5rem 0; padding:0.9rem; border-radius:2rem; background:#ffffff10; border:1px solid #ffffff33; color:white;">
    <button class="submit-review-btn" onclick="checkPassword()">Подтвердить</button>
    <p id="passError" style="color:#ff9b9b; margin-top:0.8rem;"></p>
  </div>
</div>

<script>
  const PASSWORD = "135710";

  // Массив отзывов
  const reviewsData = [
    { author: "Анна К.", text: "Лучший редактор! Карточки стали продаваться в 3 раза лучше.", stars: 5 },
    { author: "Максим Б.", text: "Заказал 50 карточек – сдано раньше срока. Профи!", stars: 5 },
    { author: "Елена В.", text: "До и после – небо и земля. Рекомендую.", stars: 5 },
    { author: "Артём С.", text: "Грамотный дизайн, улучшил конверсию.", stars: 5 },
    { author: "Ольга М.", text: "Сотрудничаем больше года. Правки моментальные.", stars: 5 },
    { author: "Дмитрий П.", text: "Карточки выглядят дорого. Очень доволен!", stars: 5 }
  ];

  function renderStars(count) {
    return '★'.repeat(count) + '☆'.repeat(5-count);
  }

  function displayReviews() {
    const container = document.getElementById('reviewsList');
    if (!container) return;
    container.innerHTML = reviewsData.map(r => `
      <div class="review-card">
        <div class="stars">${renderStars(r.stars)}</div>
        <div style="font-style:italic; margin:0.5rem 0;">“${r.text}”</div>
        <div style="font-weight:700; color:#c9b0ff;">— ${r.author}</div>
      </div>
    `).join('');
  }
  displayReviews();

  // Универсальные функции модалок
  function openModal(id) {
    document.getElementById(id).classList.add('active');
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('active');
  }

  function openPortfolioModal() { openModal('portfolioModal'); }
  function openReviewsModal() { openModal('reviewsModal'); }
  function openContactsModal() { openModal('contactsModal'); }

  // Логика кнопки "Отзыв" (плавающая)
  document.getElementById('floatingReviewBtn').addEventListener('click', function() {
    openModal('passwordModal');
    document.getElementById('passwordInput').value = '';
    document.getElementById('passError').textContent = '';
  });

  function checkPassword() {
    const input = document.getElementById('passwordInput').value.trim();
    if (input === PASSWORD) {
      closeModal('passwordModal');
      openModal('leaveReviewModal');
      document.getElementById('authorInput').value = '';
      document.getElementById('reviewTextInput').value = '';
      document.getElementById('reviewStatus').textContent = '';
    } else {
      document.getElementById('passError').textContent = '❌ Неверный пароль';
    }
  }

  function submitReviewFromModal() {
    const author = document.getElementById('authorInput').value.trim();
    const text = document.getElementById('reviewTextInput').value.trim();
    const status = document.getElementById('reviewStatus');
    if (!author || !text) {
      status.textContent = 'Заполните имя и текст';
      return;
    }
    reviewsData.unshift({ author, text, stars: 5 });
    displayReviews();
    status.textContent = '✅ Отзыв добавлен!';
    setTimeout(() => {
      closeModal('leaveReviewModal');
    }, 1000);
  }

  // Закрытие по клику вне диалога
  window.addEventListener('click', function(e) {
    if (e.target.classList.contains('modal')) {
      e.target.classList.remove('active');
    }
  });
</script>
</body>
</html>
