<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor — Админ-панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f1622 100%);
            color: #eef2ff;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container, .admin-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .glass-card {
            background: rgba(30, 36, 52, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1, h2 {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
        }

        textarea {
            font-family: monospace;
            min-height: 150px;
            resize: vertical;
        }

        button {
            padding: 12px 24px;
            background: #3b82f6;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        button.danger {
            background: #ef4444;
        }

        button.danger:hover {
            background: #dc2626;
        }

        button.success {
            background: #10b981;
        }

        .preview {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #334155;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #60a5fa;
        }

        .stat-label {
            color: #94a3b8;
            margin-top: 5px;
        }

        .error {
            color: #ef4444;
            margin-bottom: 15px;
        }

        .success-msg {
            color: #10b981;
            margin-bottom: 15px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid #334155;
        }

        .tab-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .password-change {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }

        .inline-code {
            background: #0f172a;
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="glass-card" style="max-width: 400px; margin: 100px auto;">
            <h1>🔐 Вход в админ-панель</h1>
            <div id="loginError" class="error"></div>
            <input type="password" id="passwordInput" placeholder="Введите пароль">
            <button id="loginBtn">Войти</button>
        </div>
    </div>

    <div id="adminPage" class="admin-container" style="display: none;">
        <div class="glass-card">
            <h1>🎛️ AI Tutor — Админ-панель</h1>
            
            <!-- Статистика -->
            <h2>📊 Статистика сайта</h2>
            <div class="stats-grid" id="statsContainer">
                <div class="stat-card">
                    <div class="stat-number" id="visitsCount">0</div>
                    <div class="stat-label">Всего посещений</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="queriesCount">0</div>
                    <div class="stat-label">Всего вопросов</div>
                </div>
            </div>
            <button id="resetStatsBtn" class="danger">Сбросить статистику</button>

            <hr style="margin: 20px 0; border-color: #334155;">

            <!-- Рекламные блоки -->
            <h2>💼 Управление рекламой</h2>
            
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="top">🔝 Верхний блок</button>
                <button class="tab-btn" data-tab="sidebar">📌 Боковой блок</button>
                <button class="tab-btn" data-tab="footer">📋 Нижний блок</button>
            </div>

            <div id="tabTop" class="tab-content active">
                <label>HTML код для верхней рекламы:</label>
                <textarea id="adTopCode" placeholder="<div><img src='banner.jpg'></div>"></textarea>
                <button id="previewTopBtn" class="success">👁️ Предпросмотр</button>
            </div>

            <div id="tabSidebar" class="tab-content">
                <label>HTML код для боковой рекламы:</label>
                <textarea id="adSidebarCode" placeholder="<div><a href='#'>Купить курс</a></div>"></textarea>
                <button id="previewSidebarBtn" class="success">👁️ Предпросмотр</button>
            </div>

            <div id="tabFooter" class="tab-content">
                <label>HTML код для нижней рекламы:</label>
                <textarea id="adFooterCode" placeholder="<div>Спонсор дня: ...</div>"></textarea>
                <button id="previewFooterBtn" class="success">👁️ Предпросмотр</button>
            </div>

            <div id="previewArea" class="preview" style="display: none;">
                <h3>📺 Предпросмотр:</h3>
                <div id="previewContent"></div>
            </div>

            <div style="margin-top: 20px;">
                <button id="saveAdsBtn">💾 Сохранить все рекламные блоки</button>
                <button id="clearAllAdsBtn" class="danger">🗑️ Очистить всю рекламу</button>
            </div>

            <!-- Смена пароля -->
            <div class="password-change">
                <h2>🔑 Смена пароля</h2>
                <div id="passwordError" class="error"></div>
                <div id="passwordSuccess" class="success-msg"></div>
                <input type="password" id="newPasswordInput" placeholder="Новый пароль">
                <input type="password" id="confirmPasswordInput" placeholder="Подтвердите пароль">
                <button id="changePasswordBtn">Изменить пароль</button>
                <p style="margin-top: 10px; font-size: 12px; color: #94a3b8;">
                    ⚠️ Требования: минимум 8 символов, буквы в разных регистрах и цифры
                </p>
            </div>

            <hr style="margin: 20px 0; border-color: #334155;">
            
            <div style="display: flex; gap: 10px;">
                <button id="logoutBtn" class="danger">🚪 Выйти</button>
                <button id="openSiteBtn">🌐 Открыть сайт</button>
            </div>
        </div>
    </div>

    <script>
        // Конфигурация
        const STORAGE_KEYS = {
            PASSWORD: 'ai_tutor_admin_password',
            ADS: 'ai_tutor_ads',
            STATS: 'ai_tutor_stats'
        };

        // Пароль по умолчанию
        const DEFAULT_PASSWORD = '135710Aa!';

        // Инициализация пароля
        function initPassword() {
            if (!localStorage.getItem(STORAGE_KEYS.PASSWORD)) {
                localStorage.setItem(STORAGE_KEYS.PASSWORD, DEFAULT_PASSWORD);
            }
        }

        // Проверка пароля
        function checkPassword(inputPassword) {
            const savedPassword = localStorage.getItem(STORAGE_KEYS.PASSWORD);
            return inputPassword === savedPassword;
        }

        // Получение рекламных кодов
        function getAds() {
            const saved = localStorage.getItem(STORAGE_KEYS.ADS);
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch(e) {
                    return { top: '', sidebar: '', footer: '' };
                }
            }
            return { top: '', sidebar: '', footer: '' };
        }

        // Сохранение рекламных кодов
        function saveAds(ads) {
            localStorage.setItem(STORAGE_KEYS.ADS, JSON.stringify(ads));
            // Триггерим событие для синхронизации с сайтом
            window.dispatchEvent(new StorageEvent('storage', {
                key: STORAGE_KEYS.ADS,
                newValue: JSON.stringify(ads)
            }));
        }

        // Получение статистики
        function getStats() {
            const saved = localStorage.getItem(STORAGE_KEYS.STATS);
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch(e) {
                    return { visits: 0, totalQueries: 0 };
                }
            }
            return { visits: 0, totalQueries: 0 };
        }

        // Обновление UI статистики
        function updateStatsUI() {
            const stats = getStats();
            document.getElementById('visitsCount').innerText = stats.visits || 0;
            document.getElementById('queriesCount').innerText = stats.totalQueries || 0;
        }

        // Сброс статистики
        function resetStats() {
            if (confirm('Вы уверены, что хотите сбросить всю статистику? Это действие необратимо.')) {
                localStorage.setItem(STORAGE_KEYS.STATS, JSON.stringify({ visits: 0, totalQueries: 0 }));
                updateStatsUI();
                showMessage('Статистика сброшена', 'success');
            }
        }

        // Загрузка рекламы в форму
        function loadAdsToForm() {
            const ads = getAds();
            document.getElementById('adTopCode').value = ads.top || '';
            document.getElementById('adSidebarCode').value = ads.sidebar || '';
            document.getElementById('adFooterCode').value = ads.footer || '';
        }

        // Сохранение рекламы из формы
        function saveAdsFromForm() {
            const ads = {
                top: document.getElementById('adTopCode').value,
                sidebar: document.getElementById('adSidebarCode').value,
                footer: document.getElementById('adFooterCode').value
            };
            saveAds(ads);
            showMessage('Рекламные блоки сохранены!', 'success');
        }

        // Очистка всей рекламы
        function clearAllAds() {
            if (confirm('Вы уверены, что хотите удалить ВСЮ рекламу?')) {
                saveAds({ top: '', sidebar: '', footer: '' });
                loadAdsToForm();
                showMessage('Вся реклама удалена', 'success');
            }
        }

        // Предпросмотр
        function showPreview(blockType) {
            const ads = getAds();
            let content = '';
            if (blockType === 'top') content = ads.top || '';
            else if (blockType === 'sidebar') content = ads.sidebar || '';
            else content = ads.footer || '';
            
            const previewArea = document.getElementById('previewArea');
            const previewContent = document.getElementById('previewContent');
            
            if (content && content.trim()) {
                previewContent.innerHTML = content;
                previewArea.style.display = 'block';
            } else {
                previewContent.innerHTML = '<div style="color: #94a3b8;">Блок пуст. Добавьте HTML код для предпросмотра.</div>';
                previewArea.style.display = 'block';
            }
            
            setTimeout(() => {
                previewArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        // Смена пароля
        function changePassword(newPass, confirmPass) {
            // Валидация
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
            if (!passwordRegex.test(newPass)) {
                showMessage('Пароль должен содержать минимум 8 символов, заглавные и строчные буквы и цифры', 'error', 'passwordError');
                return false;
            }
            if (newPass !== confirmPass) {
                showMessage('Пароли не совпадают', 'error', 'passwordError');
                return false;
            }
            
            localStorage.setItem(STORAGE_KEYS.PASSWORD, newPass);
            showMessage('Пароль успешно изменён!', 'success', 'passwordSuccess');
            document.getElementById('newPasswordInput').value = '';
            document.getElementById('confirmPasswordInput').value = '';
            return true;
        }

        function showMessage(message, type, elementId = 'loginError') {
            const el = document.getElementById(elementId);
            if (el) {
                el.innerText = message;
                el.style.color = type === 'error' ? '#ef4444' : '#10b981';
                setTimeout(() => {
                    el.innerText = '';
                }, 3000);
            }
        }

        // Вкладки
        function initTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabId = tab.dataset.tab;
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    document.querySelectorAll('.tab-content').forEach(content => {
                        content.classList.remove('active');
                    });
                    document.getElementById(`tab${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`).classList.add('active');
                });
            });
        }

        // Выход
        function logout() {
            localStorage.removeItem('admin_logged_in');
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('adminPage').style.display = 'none';
        }

        // Проверка авторизации
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in');
            if (isLoggedIn === 'true') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
                updateStatsUI();
                loadAdsToForm();
            } else {
                document.getElementById('loginPage').style.display = 'block';
                document.getElementById('adminPage').style.display = 'none';
            }
        }

        // Инициализация
        initPassword();
        
        // Логин
        document.getElementById('loginBtn').addEventListener('click', () => {
            const password = document.getElementById('passwordInput').value;
            if (checkPassword(password)) {
                localStorage.setItem('admin_logged_in', 'true');
                checkAuth();
                document.getElementById('passwordInput').value = '';
            } else {
                showMessage('Неверный пароль!', 'error');
            }
        });

        // Кнопки
        document.getElementById('saveAdsBtn').addEventListener('click', saveAdsFromForm);
        document.getElementById('clearAllAdsBtn').addEventListener('click', clearAllAds);
        document.getElementById('resetStatsBtn').addEventListener('click', resetStats);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('changePasswordBtn').addEventListener('click', () => {
            const newPass = document.getElementById('newPasswordInput').value;
            const confirmPass = document.getElementById('confirmPasswordInput').value;
            changePassword(newPass, confirmPass);
        });
        document.getElementById('previewTopBtn').addEventListener('click', () => showPreview('top'));
        document.getElementById('previewSidebarBtn').addEventListener('click', () => showPreview('sidebar'));
        document.getElementById('previewFooterBtn').addEventListener('click', () => showPreview('footer'));
        document.getElementById('openSiteBtn').addEventListener('click', () => {
            window.open('../index.html', '_blank');
        });

        // Нажатие Enter в поле пароля
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        initTabs();
        checkAuth();
    </script>
</body>
</html>
