```html
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VDC - Админ панель</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI';background:#0d1a2e;color:#fff;padding:20px}
.panel{background:#111;border-radius:10px;padding:20px;margin-bottom:20px}
h2{color:#0ff;margin-bottom:10px}
.msg{background:#222;padding:10px;border-radius:8px;margin-bottom:10px}
</style>
</head>

<body>

<h1>⚡ АДМИН ПАНЕЛЬ</h1>

<div class="panel">
<h2>📥 ВХОДЯЩИЕ ЗАЯВКИ НА ВЫВОД</h2>
<div id="withdraw-list">Загрузка...</div>
</div>

<div class="panel">
<h2>📨 ИСТОРИЯ СООБЩЕНИЙ</h2>
<div id="messages-list">Загрузка...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
var supabase = window.supabase.createClient(
'https://kmkgqegtulbmdjlmllka.supabase.co',
'sb_publishable_azFcv95b6rBSnDxU2jYWEA_pO2Z5qTI'
);

// ===== ЗАЯВКИ НА ВЫВОД =====
async function loadWithdraws(){
    var {data} = await supabase
        .from('withdraw_requests')
        .select('*')
        .order('created_at',{ascending:false});

    if(!data || data.length===0){
        document.getElementById('withdraw-list').innerHTML='Нет заявок';
        return;
    }

    document.getElementById('withdraw-list').innerHTML =
    data.map(function(x){
        return `
        <div class="msg">
            <b>Игрок:</b> ${x.nickname}<br>
            <b>Звезды:</b> ${x.stars}<br>
            <b>Крипта:</b> ${x.crypto}<br>
            <b>Адрес:</b> ${x.address}<br>
            <b>Комментарий:</b> ${x.comment || '-'}<br>
            <b>Telegram:</b> ${x.telegram || '-'}<br>
            <b>Статус:</b> ${x.status}<br>
            <small>${new Date(x.created_at).toLocaleString()}</small>
        </div>`;
    }).join('');
}

// ===== СООБЩЕНИЯ =====
async function loadMessages(){
    var {data} = await supabase
        .from('admin_messages')
        .select('*')
        .order('created_at',{ascending:false});

    if(!data || data.length===0){
        document.getElementById('messages-list').innerHTML='Нет сообщений';
        return;
    }

    document.getElementById('messages-list').innerHTML =
    data.map(function(x){
        return `
        <div class="msg">
            <b>Кому:</b> ${x.nickname}<br>
            <b>Сообщение:</b> ${x.message}<br>
            <small>${new Date(x.created_at).toLocaleString()}</small>
        </div>`;
    }).join('');
}

// автообновление
async function init(){
    await loadWithdraws();
    await loadMessages();
}

init();
setInterval(init,5000);
</script>

</body>
</html>
```
