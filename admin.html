<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS — Админ-панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0f1622 100%);
            color: #eef2ff;
            min-height: 100vh;
            padding: 20px;
        }
        .login-container, .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(30, 36, 52, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.4);
        }
        h1, h2 {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        h1 { font-size: 1.8rem; }
        h2 { font-size: 1.3rem; margin-top: 20px; }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
        }
        textarea {
            font-family: monospace;
            min-height: 120px;
            resize: vertical;
        }
        button {
            padding: 12px 24px;
            background: #3b82f6;
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        button.danger { background: #ef4444; }
        button.danger:hover { background: #dc2626; }
        button.success { background: #10b981; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-number {
            font-size: 42px;
            font-weight: bold;
            color: #60a5fa;
        }
        .stat-label {
            color: #94a3b8;
            margin-top: 8px;
            font-size: 14px;
        }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .message.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        hr {
            border-color: #334155;
            margin: 20px 0;
        }
        .preview-box {
            background: #0f172a;
            border-radius: 16px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>
    <div id="loginPage" class="login-container">
        <div class="glass-card" style="max-width: 400px; margin: 80px auto;">
            <h1>🔐 AXIS Админ-панель</h1>
            <p style="margin-bottom: 20px; color: #94a3b8;">Введите пароль для доступа</p>
            <div id="loginMessage"></div>
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button id="loginBtn" style="width: 100%;">Войти</button>
        </div>
    </div>

    <div id="adminPage" class="admin-container" style="display: none;">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h1>🎛️ AXIS Админ-панель</h1>
                <button id="logoutBtn" class="danger">🚪 Выйти</button>
            </div>
            
            <h2>📊 Статистика сайта</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="visitsCount">0</div>
                    <div class="stat-label">Всего посещений</div>
                </div>
            </div>
            <button id="resetStatsBtn" class="danger">🔄 Сбросить статистику</button>

            <hr>

            <h2>💼 Рекламный блок</h2>
            <p style="color: #94a3b8; margin-bottom: 15px;">Вставьте HTML код для показа рекламы вверху сайта</p>
            <textarea id="adCode" placeholder='<div style="background: #2d3748; padding: 10px; border-radius: 12px;"><img src="banner.jpg" width="100%"></div>'></textarea>
            <button id="previewBtn" class="success">👁️ Предпросмотр</button>
            <button id="saveAdBtn">💾 Сохранить рекламу</button>
            <button id="clearAdBtn" class="danger">🗑️ Очистить рекламу</button>
            <div id="previewArea" style="display: none;">
                <div class="preview-box">
                    <h3 style="margin-bottom: 10px;">📺 Предпросмотр:</h3>
                    <div id="previewContent"></div>
                </div>
            </div>

            <hr>

            <h2>🔑 Смена пароля</h2>
            <div id="passwordMessage"></div>
            <input type="password" id="newPasswordInput" placeholder="Новый пароль (мин. 8 символов, цифры, заглавные и строчные буквы)">
            <input type="password" id="confirmPasswordInput" placeholder="Подтвердите пароль">
            <button id="changePasswordBtn">Изменить пароль</button>

            <hr>

            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button id="openSiteBtn" class="success">🌐 Открыть сайт AXIS</button>
            </div>
            
            <footer style="margin-top: 20px; text-align: center; font-size: 11px; color: #4a5568;">
                AXIS Admin Panel | Данные хранятся в вашем браузере
            </footer>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = {
            PASSWORD: 'axis_admin_password',
            ADS: 'axis_ads',
            STATS: 'axis_stats'
        };
        const DEFAULT_PASSWORD = '135710Aa!';

        function initPassword() {
            if (!localStorage.getItem(STORAGE_KEYS.PASSWORD)) {
                localStorage.setItem(STORAGE_KEYS.PASSWORD, DEFAULT_PASSWORD);
            }
        }

        function checkPassword(inputPassword) {
            return inputPassword === localStorage.getItem(STORAGE_KEYS.PASSWORD);
        }

        function getAds() {
            const saved = localStorage.getItem(STORAGE_KEYS.ADS);
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch(e) {
                    return { top: '' };
                }
            }
            return { top: '' };
        }

        function saveAds(ads) {
            localStorage.setItem(STORAGE_KEYS.ADS, JSON.stringify(ads));
            window.dispatchEvent(new StorageEvent('storage', {
                key: STORAGE_KEYS.ADS,
                newValue: JSON.stringify(ads)
            }));
        }

        function getStats() {
            const saved = localStorage.getItem(STORAGE_KEYS.STATS);
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch(e) {
                    return { visits: 0 };
                }
            }
            return { visits: 0 };
        }

        function updateStatsUI() {
            const stats = getStats();
            document.getElementById('visitsCount').innerText = stats.visits || 0;
        }

        function resetStats() {
            if (confirm('Сбросить статистику посещений?')) {
                localStorage.setItem(STORAGE_KEYS.STATS, JSON.stringify({ visits: 0 }));
                updateStatsUI();
                showMessage('Статистика сброшена', 'success');
            }
        }

        function loadAdToForm() {
            const ads = getAds();
            document.getElementById('adCode').value = ads.top || '';
        }

        function saveAdFromForm() {
            const ads = { top: document.getElementById('adCode').value };
            saveAds(ads);
            showMessage('Реклама сохранена!', 'success');
        }

        function clearAd() {
            if (confirm('Удалить рекламу?')) {
                saveAds({ top: '' });
                loadAdToForm();
                showMessage('Реклама удалена', 'success');
            }
        }

        function showPreview() {
            const adCode = document.getElementById('adCode').value;
            const previewArea = document.getElementById('previewArea');
            const previewContent = document.getElementById('previewContent');
            if (adCode && adCode.trim()) {
                previewContent.innerHTML = adCode;
            } else {
                previewContent.innerHTML = '<div style="color: #94a3b8;">Блок пуст</div>';
            }
            previewArea.style.display = 'block';
            previewArea.scrollIntoView({ behavior: 'smooth' });
        }

        function changePassword(newPass, confirmPass) {
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
            if (!passwordRegex.test(newPass)) {
                showMessage('Пароль должен содержать минимум 8 символов, заглавные и строчные буквы и цифры', 'error', 'passwordMessage');
                return false;
            }
            if (newPass !== confirmPass) {
                showMessage('Пароли не совпадают', 'error', 'passwordMessage');
                return false;
            }
            localStorage.setItem(STORAGE_KEYS.PASSWORD, newPass);
            showMessage('Пароль успешно изменён!', 'success', 'passwordMessage');
            document.getElementById('newPasswordInput').value = '';
            document.getElementById('confirmPasswordInput').value = '';
            return true;
        }

        function showMessage(message, type, elementId = 'loginMessage') {
            const el = document.getElementById(elementId);
            if (el) {
                el.innerHTML = `<div class="message ${type}">${message}</div>`;
                setTimeout(() => { el.innerHTML = ''; }, 3000);
            }
        }

        function logout() {
            localStorage.removeItem('axis_admin_logged');
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('adminPage').style.display = 'none';
            document.getElementById('passwordInput').value = '';
        }

        function checkAuth() {
            const isLoggedIn = localStorage.getItem('axis_admin_logged');
            if (isLoggedIn === 'true') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
                updateStatsUI();
                loadAdToForm();
            } else {
                document.getElementById('loginPage').style.display = 'block';
                document.getElementById('adminPage').style.display = 'none';
            }
        }

        initPassword();

        document.getElementById('loginBtn')?.addEventListener('click', () => {
            const password = document.getElementById('passwordInput').value;
            if (checkPassword(password)) {
                localStorage.setItem('axis_admin_logged', 'true');
                checkAuth();
            } else {
                showMessage('Неверный пароль!', 'error');
            }
        });

        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('saveAdBtn')?.addEventListener('click', saveAdFromForm);
        document.getElementById('clearAdBtn')?.addEventListener('click', clearAd);
        document.getElementById('previewBtn')?.addEventListener('click', showPreview);
        document.getElementById('resetStatsBtn')?.addEventListener('click', resetStats);
        document.getElementById('changePasswordBtn')?.addEventListener('click', () => {
            const newPass = document.getElementById('newPasswordInput').value;
            const confirmPass = document.getElementById('confirmPasswordInput').value;
            changePassword(newPass, confirmPass);
        });
        document.getElementById('openSiteBtn')?.addEventListener('click', () => {
            window.open('../index.html', '_blank');
        });
        document.getElementById('passwordInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        checkAuth();
    </script>
</body>
</html>
