<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<title>VDC - Админ панель</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0a0a1a,#0d1a2e);color:#fff;min-height:100vh;padding:20px}
.admin-container{max-width:1200px;margin:0 auto}
.admin-header{background:rgba(0,0,0,.5);border:1px solid rgba(0,255,255,.3);border-radius:16px;padding:20px 30px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.admin-header h1{color:#0ff;font-size:24px;text-shadow:0 0 10px #0ff}
.logout-btn{padding:10px 25px;background:#ff4444;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:20px}
.stat-card{background:rgba(0,0,0,.5);border:1px solid rgba(0,255,255,.2);border-radius:12px;padding:20px;text-align:center}
.stat-card h3{color:#0ff;margin-bottom:10px;font-size:14px}
.stat-value{font-size:36px;font-weight:bold;color:#ffd700}
.panel{background:rgba(0,0,0,.5);border:1px solid rgba(0,255,255,.2);border-radius:12px;padding:25px;margin-bottom:20px}
.panel h2{color:#0ff;margin-bottom:15px;font-size:18px}
.top-players-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.top-list{background:rgba(0,0,0,.3);border-radius:8px;padding:15px}
.top-list h3{color:#ffd700;margin-bottom:10px;font-size:16px}
.top-player-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin:5px 0;background:rgba(255,255,255,.05);border-radius:6px;font-size:14px}
.top-player-item.gold{background:rgba(255,215,0,.15)}
.top-player-item.silver{background:rgba(192,192,192,.1)}
.top-player-item.bronze{background:rgba(205,127,50,.1)}
.form-group{margin-bottom:15px}
.form-group label{display:block;color:#0ff;margin-bottom:5px;font-size:14px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px;background:rgba(0,0,0,.4);border:1px solid rgba(0,255,255,.3);border-radius:8px;color:#fff;font-family:inherit;font-size:14px}
.form-group textarea{min-height:80px;resize:vertical}
.btn{padding:12px 30px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:14px;transition:all .3s;margin-right:10px;margin-bottom:10px}
.btn-primary{background:linear-gradient(45deg,#6200ea,#00c6ff);color:#fff}
.btn-success{background:#28a745;color:#fff}
.btn-danger{background:#dc3545;color:#fff}
.btn-warning{background:#ffc107;color:#000}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.winners-list{max-height:300px;overflow-y:auto}
.winner-item{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;margin:5px 0;background:rgba(255,255,255,.05);border-radius:6px}
.winner-badge{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold}
.winner-badge.gold{background:#ffd700;color:#000}
.winner-badge.silver{background:#c0c0c0;color:#000}
.winner-badge.bronze{background:#cd7f32;color:#fff}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:rgba(0,0,0,.8);border:2px solid #0ff;border-radius:16px;padding:40px;width:350px;text-align:center;box-shadow:0 0 30px rgba(0,255,255,.3)}
.login-box h2{color:#0ff;margin-bottom:20px}
.login-error{color:#ff4444;font-size:13px;margin-top:10px;display:none}
#main-panel{display:none}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-content{background:linear-gradient(135deg,#0a0a1a,#0d1a2e);border:1px solid rgba(0,255,255,.3);border-radius:16px;padding:30px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.modal-content h3{color:#0ff;margin-bottom:15px}
.field-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;padding:10px;background:rgba(0,0,0,.3);border-radius:8px}
.field-row label{min-width:100px;color:#0ff;font-size:13px}
.field-row input{flex:1}
.remove-field-btn{background:#ff4444;color:#fff;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-weight:bold}
.info-text{font-size:12px;color:#aaa;margin:5px 0}
</style>
</head>
<body>
<div id="login-screen">
<div class="login-box">
<h2>🔐 ВХОД В ПАНЕЛЬ</h2>
<div class="form-group"><input type="text" id="login-username" placeholder="Логин" style="text-align:center"/></div>
<div class="form-group"><input type="password" id="login-password" placeholder="Пароль" style="text-align:center"/></div>
<button class="btn btn-primary" onclick="doLogin()" style="width:100%">ВОЙТИ</button>
<div class="login-error" id="login-error"></div>
</div></div>
<div id="main-panel">
<div class="admin-container">
<div class="admin-header"><h1>⚡ VDC - ПАНЕЛЬ УПРАВЛЕНИЯ</h1><button class="logout-btn" onclick="doLogout()">ВЫЙТИ</button></div>
<div class="stats-grid">
<div class="stat-card"><h3>👥 ВСЕГО ИГРОКОВ</h3><div class="stat-value" id="stat-total">0</div></div>
<div class="stat-card"><h3>🟢 ОНЛАЙН</h3><div class="stat-value" id="stat-online">0</div></div>
<div class="stat-card"><h3>🔗 РЕФЕРАЛОВ</h3><div class="stat-value" id="stat-referrals">0</div></div>
<div class="stat-card"><h3>🏆 ПОБЕДИТЕЛЕЙ</h3><div class="stat-value" id="stat-winners">0</div></div>
</div>
<div class="panel"><h2>🏆 ТОП ИГРОКОВ</h2><div class="top-players-grid"><div class="top-list"><h3>⭐ По звёздам</h3><div id="top-stars-list">Загрузка...</div></div><div class="top-list"><h3>📦 По запасу</h3><div id="top-level-list">Загрузка...</div></div></div></div>
<div class="panel"><h2>⏰ СБРОС</h2><div class="form-group"><label>День (1-28)</label><input type="number" id="reset-day" min="1" max="28" value="1" style="width:100px"/></div><div class="form-group"><label>Время (UTC)</label><input type="time" id="reset-time" value="00:00" style="width:200px"/></div><button class="btn btn-warning" onclick="saveResetSchedule()">💾 СОХРАНИТЬ</button><button class="btn btn-danger" onclick="forceResetNow()">⚠️ СБРОСИТЬ СЕЙЧАС</button></div>
<div class="panel"><h2>🏅 ПОБЕДИТЕЛИ</h2><div class="winners-list" id="winners-list">Загрузка...</div></div>
<div class="panel"><h2>📝 ПОЛЯ ПОБЕДИТЕЛЕЙ</h2><div id="winner-fields-container"></div><button class="btn btn-primary" onclick="addWinnerField()">➕ ПОЛЕ</button><button class="btn btn-success" onclick="saveWinnerFields()" style="margin-top:10px">💾 СОХРАНИТЬ</button></div>
<div class="panel"><h2>✉️ ОТПРАВИТЬ</h2><div class="form-group"><label>Шаблон</label><textarea id="winner-message-template"></textarea></div><div class="form-group"><label>Кому</label><select id="winner-select" multiple style="min-height:100px"></select></div><button class="btn btn-success" onclick="sendWinnerMessages()">📨 ОТПРАВИТЬ</button></div>
<div class="panel"><h2>📱 ПРЕДПРОСМОТР</h2><button class="btn btn-primary" onclick="showTestSMS()">👁️ ПОСМОТРЕТЬ</button></div>
</div></div>
<div class="modal" id="test-sms-modal"><div class="modal-content"><h3>📱 ОКНО ПОБЕДИТЕЛЯ</h3><div id="test-sms-fields"></div><button class="btn btn-primary" onclick="closeTestSMS()" style="margin-top:15px">ЗАКРЫТЬ</button></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SUPABASE_URL='https://kmkgqegtulbmdjlmllka.supabase.co';
var SUPABASE_KEY='sb_publishable_azFcv95b6rBSnDxU2jYWEA_pO2Z5qTI';
var supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var isLoggedIn=false,winnerFields=[];
checkSession();
async function checkSession(){var s=sessionStorage.getItem('admin_logged_in');if(s==='true'){isLoggedIn=true;showMainPanel();}}
async function doLogin(){var u=document.getElementById('login-username').value.trim();var p=document.getElementById('login-password').value.trim();if(!u||!p){showLoginError('Заполни все поля');return}var{data}=await supabase.from('admin_users').select('password_hash').eq('username',u).single();if(data&&data.password_hash==='f7c3bc1d808e04732adf679965ccc34ca7ae3441'&&p==='135710Aa!'){isLoggedIn=true;sessionStorage.setItem('admin_logged_in','true');showMainPanel();}else{showLoginError('Неверный логин или пароль');}}
function showLoginError(m){var e=document.getElementById('login-error');e.textContent=m;e.style.display='block';setTimeout(function(){e.style.display='none'},3000)}
function doLogout(){sessionStorage.removeItem('admin_logged_in');isLoggedIn=false;document.getElementById('main-panel').style.display='none';document.getElementById('login-screen').style.display='flex'}
async function showMainPanel(){document.getElementById('login-screen').style.display='none';document.getElementById('main-panel').style.display='block';await loadStats();await loadTopPlayers();await loadWinners();await loadWinnerMessageTemplate();await loadWinnerFields();await loadResetSchedule()}
async function loadStats(){var{data:p}=await supabase.from('players').select('id,is_online');document.getElementById('stat-total').textContent=p?p.length:0;document.getElementById('stat-online').textContent=p?p.filter(function(x){return x.is_online}).length:0;var{data:r}=await supabase.from('referral_tracking').select('id');document.getElementById('stat-referrals').textContent=r?r.length:0;var{data:w}=await supabase.from('winners').select('id');document.getElementById('stat-winners').textContent=w?w.length:0}
async function loadTopPlayers(){var{data:s}=await supabase.from('players').select('nickname,highscore_stars').order('highscore_stars',{ascending:false}).limit(3);var{data:l}=await supabase.from('players').select('nickname,highscore_level').order('highscore_level',{ascending:false}).limit(3);var m=['🥇','🥈','🥉'],c=['gold','silver','bronze'];document.getElementById('top-stars-list').innerHTML=(s||[]).map(function(x,i){return'<div class="top-player-item '+(c[i]||'')+'"><span>'+(m[i]||'')+' '+x.nickname+'</span><span>⭐ '+(x.highscore_stars||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.')+'</span></div>'}).join('')||'Нет данных';document.getElementById('top-level-list').innerHTML=(l||[]).map(function(x,i){return'<div class="top-player-item '+(c[i]||'')+'"><span>'+(m[i]||'')+' '+x.nickname+'</span><span>📦 '+(x.highscore_level||0)+'</span></div>'}).join('')||'Нет данных'}
async function loadWinners(){var{data}=await supabase.from('winners').select('*').order('created_at',{ascending:false}).limit(20);document.getElementById('winners-list').innerHTML=(data||[]).map(function(w){var b=w.place===1?'gold':(w.place===2?'silver':'bronze'),m=w.place===1?'🥇':(w.place===2?'🥈':'🥉');return'<div class="winner-item"><span>'+m+' '+w.nickname+' ('+w.category+')</span><span class="winner-badge '+b+'">'+w.month_year+'</span><span>'+(w.message_sent?'✅':'⏳')+'</span></div>'}).join('')||'Нет победителей';var p=(data||[]).filter(function(w){return!w.message_sent});document.getElementById('winner-select').innerHTML=p.map(function(w){return'<option value="'+w.id+'">'+w.nickname+' (место '+w.place+', '+w.category+')</option>'}).join('')}
async function loadWinnerMessageTemplate(){var{data}=await supabase.from('game_settings').select('setting_value').eq('setting_key','winner_message_template').single();if(data)document.getElementById('winner-message-template').value=data.setting_value}
async function loadWinnerFields(){var{data}=await supabase.from('game_settings').select('setting_value').eq('setting_key','winner_form_fields').single();if(data&&data.setting_value){winnerFields=JSON.parse(data.setting_value)}else{winnerFields=[{label:'Твой адрес',placeholder:'Введи адрес...'},{label:'Твой телефон',placeholder:'Введи телефон...'}]}renderWinnerFields()}
function renderWinnerFields(){var c=document.getElementById('winner-fields-container');c.innerHTML=winnerFields.map(function(f,i){return'<div class="field-row"><label>Строка '+(i+1)+':</label><input type="text" class="field-label" value="'+f.label+'" onchange="updateField('+i+',\'label\',this.value)"/><input type="text" class="field-placeholder" value="'+f.placeholder+'" onchange="updateField('+i+',\'placeholder\',this.value)"/><button class="remove-field-btn" onclick="removeWinnerField('+i+')">×</button></div>'}).join('')}
function addWinnerField(){winnerFields.push({label:'Новое поле',placeholder:'Введи данные...'});renderWinnerFields()}
function updateField(i,k,v){winnerFields[i][k]=v}
function removeWinnerField(i){winnerFields.splice(i,1);renderWinnerFields()}
async function saveWinnerFields(){var l=document.querySelectorAll('.field-label'),p=document.querySelectorAll('.field-placeholder');for(var i=0;i<l.length;i++){winnerFields[i]={label:l[i].value,placeholder:p[i].value}}await supabase.from('game_settings').upsert({setting_key:'winner_form_fields',setting_value:JSON.stringify(winnerFields),updated_at:new Date().toISOString()});alert('✅ Сохранено!')}
async function loadResetSchedule(){var{data:d}=await supabase.from('game_settings').select('setting_value').eq('setting_key','reset_day').single();var{data:t}=await supabase.from('game_settings').select('setting_value').eq('setting_key','reset_time').single();if(d)document.getElementById('reset-day').value=d.setting_value;if(t)document.getElementById('reset-time').value=t.setting_value}
async function saveResetSchedule(){var d=document.getElementById('reset-day').value,t=document.getElementById('reset-time').value;await supabase.from('game_settings').upsert({setting_key:'reset_day',setting_value:d,updated_at:new Date().toISOString()});await supabase.from('game_settings').upsert({setting_key:'reset_time',setting_value:t,updated_at:new Date().toISOString()});alert('✅ Сохранено!')}
async function forceResetNow(){if(!confirm('⚠️ Сбросить все достижения?'))return;var{data:s}=await supabase.from('players').select('nickname,highscore_stars').order('highscore_stars',{ascending:false}).limit(3);var{data:l}=await supabase.from('players').select('nickname,highscore_level').order('highscore_level',{ascending:false}).limit(3);var my=new Date().toISOString().slice(0,7);for(var i=0;i<(s||[]).length;i++){await supabase.from('winners').insert({month_year:my,place:i+1,nickname:s[i].nickname,score:s[i].highscore_stars,category:'stars'})}for(var j=0;j<(l||[]).length;j++){await supabase.from('winners').insert({month_year:my,place:j+1,nickname:l[j].nickname,score:l[j].highscore_level,category:'level'})}await supabase.from('players').update({highscore_stars:0,highscore_level:0,stars:10,cargo_level:0,speed_level:0,size_level:0,hole_type:0}).neq('nickname','admin');alert('✅ Сброс выполнен!');await loadStats();await loadTopPlayers();await loadWinners()}
async function sendWinnerMessages(){var t=document.getElementById('winner-message-template').value,s=document.getElementById('winner-select'),ids=[];for(var i=0;i<s.options.length;i++){if(s.options[i].selected)ids.push(s.options[i].value)}if(ids.length===0){alert('Выбери получателей');return}await supabase.from('game_settings').upsert({setting_key:'winner_message_template',setting_value:t,updated_at:new Date().toISOString()});for(var j=0;j<ids.length;j++){await supabase.from('winners').update({message_sent:true,message:t}).eq('id',ids[j])}alert('✅ Отправлено!');await loadWinners();showTestSMS()}
function showTestSMS(){var t=document.getElementById('winner-message-template').value,e=t.replace('{nickname}','Player1').replace('{place}','1').replace('{category}','stars').replace('{score}','5000');var h='<div style="padding:15px;background:rgba(0,0,0,.3);border-radius:8px;margin-bottom:15px"><p>'+e+'</p></div><p style="color:#0ff;margin-bottom:10px">Заполни данные:</p>';winnerFields.forEach(function(f){h+='<div class="form-group"><label>'+f.label+'</label><input type="text" placeholder="'+f.placeholder+'" style="width:100%;padding:10px;background:rgba(0,0,0,.4);border:1px solid rgba(0,255,255,.3);border-radius:8px;color:#fff"/></div>'});h+='<button class="btn btn-success" style="margin-top:10px">📨 ОТПРАВИТЬ</button>';document.getElementById('test-sms-fields').innerHTML=h;document.getElementById('test-sms-modal').classList.add('open')}
function closeTestSMS(){document.getElementById('test-sms-modal').classList.remove('open')}
setInterval(function(){if(isLoggedIn){loadStats();loadTopPlayers()}},5000);
document.getElementById('login-password').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
