<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель AI Tutor — статистика и управление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h2 {
            color: #764ba2;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #764ba2;
        }
        .stat-label {
            color: #475569;
            margin-top: 8px;
            font-size: 0.85rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f1f5f9;
            color: #1e293b;
        }
        .hidden {
            display: none;
        }
        input, button {
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        button {
            background: #764ba2;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        button:hover {
            background: #5a3a7a;
        }
        .danger-btn {
            background: #ef4444;
        }
        .danger-btn:hover {
            background: #dc2626;
        }
        .success {
            color: #10b981;
        }
        .error {
            color: #ef4444;
        }
        .key-preview {
            background: #f1f5f9;
            padding: 10px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
        }
        .logout-btn {
            background: #475569;
            margin-top: 20px;
        }
        .refresh-btn {
            background: #3b82f6;
            margin-left: 10px;
            padding: 6px 14px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        hr {
            margin: 20px 0;
        }
        @media (max-width: 700px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            th, td { font-size: 12px; padding: 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="loginDiv" class="card" style="max-width: 450px; margin: 0 auto;">
        <h2>🔐 Вход в админ-панель</h2>
        <input type="password" id="adminPass" placeholder="Введите пароль" style="width: 100%;">
        <button id="loginBtn" style="width: 100%; margin-top: 12px;">Войти</button>
        <div id="loginError" class="error" style="margin-top: 12px;"></div>
    </div>

    <div id="adminPanel" class="hidden">
        <!-- Статистика -->
        <div class="card">
            <div class="flex-between">
                <h2>📊 Статистика сайта</h2>
                <button id="refreshStatsBtn" class="refresh-btn">🔄 Обновить</button>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalVisits">0</div>
                    <div class="stat-label">Всего посещений</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalRequests">0</div>
                    <div class="stat-label">Запросов к ИИ</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="uniqueUsers">0</div>
                    <div class="stat-label">Уникальных пользователей</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="todayVisits">0</div>
                    <div class="stat-label">Посещений сегодня</div>
                </div>
            </div>
        </div>

        <!-- График активности по дням -->
        <div class="card">
            <h2>📈 Активность за последние 7 дней</h2>
            <div id="weeklyChart" style="display: flex; gap: 12px; justify-content: space-around; flex-wrap: wrap; margin-top: 16px;"></div>
        </div>

        <!-- Последние запросы пользователей -->
        <div class="card">
            <h2>🕒 Последние 20 запросов</h2>
            <div style="overflow-x: auto;">
                <table id="requestsTable">
                    <thead>
                        <tr><th>Время</th><th>Вопрос</th><th>Класс</th><th>Страна/Город</th></tr>
                    </thead>
                    <tbody id="requestsBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Управление API ключом -->
        <div class="card">
            <h2>🔑 Управление API ключом Gemini</h2>
            <input type="text" id="apiKeyInput" placeholder="Вставьте новый API-ключ (AIza...)" style="width: 70%;">
            <button id="saveKeyBtn">💾 Сохранить ключ</button>
            <div id="saveMessage" style="margin-top: 12px;"></div>
            <div class="key-preview" style="margin-top: 16px;">
                📌 Текущий ключ: <span id="currentKeyPreview">не задан</span>
            </div>
            <button id="clearKeyBtn" class="danger-btn" style="margin-top: 12px;">🗑️ Удалить ключ</button>
        </div>

        <!-- Очистка истории -->
        <div class="card">
            <h2>🧹 Очистка данных</h2>
            <button id="clearHistoryBtn" class="danger-btn">🗑️ Очистить всю историю запросов</button>
            <div id="clearMessage" style="margin-top: 12px;"></div>
        </div>

        <button id="logoutBtn" class="logout-btn">🚪 Выйти из админ-панели</button>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "keryxa2025"; // ⚠️ ЗАМЕНИ НА СВОЙ ПАРОЛЬ

    // Функция сбора статистики из localStorage
    function getStats() {
        // Статистика посещений (хранится отдельным ключом)
        let visitsData = localStorage.getItem('site_visits_stats');
        if (!visitsData) {
            visitsData = { total: 0, daily: {}, history: [] };
        } else {
            visitsData = JSON.parse(visitsData);
        }

        // История запросов пользователей
        let userHistory = localStorage.getItem('ai_history_v4');
        let requests = [];
        if (userHistory) {
            requests = JSON.parse(userHistory);
        }

        // Уникальные пользователи (по IP-подобному идентификатору — используем fingerprint из localStorage)
        let userId = localStorage.getItem('user_fingerprint');
        let allFingerprints = JSON.parse(localStorage.getItem('all_fingerprints') || '[]');
        
        return {
            totalVisits: visitsData.total || 0,
            dailyVisits: visitsData.daily || {},
            requests: requests,
            uniqueUsers: allFingerprints.length,
            todayVisits: visitsData.daily ? (visitsData.daily[new Date().toISOString().slice(0,10)] || 0) : 0
        };
    }

    // Получить активность по дням за последние 7 дней
    function getWeeklyActivity() {
        const stats = getStats();
        const daily = stats.dailyVisits;
        const result = [];
        for (let i = 6; i >= 0; i--) {
            const date = new Date();
            date.setDate(date.getDate() - i);
            const dateStr = date.toISOString().slice(0,10);
            const dayName = date.toLocaleDateString('ru-RU', { weekday: 'short' });
            result.push({
                date: dateStr,
                label: dayName + ' ' + dateStr.slice(5),
                count: daily[dateStr] || 0
            });
        }
        return result;
    }

    // Обновить всю админ-панель
    function refreshAdminPanel() {
        const stats = getStats();
        const weekly = getWeeklyActivity();

        document.getElementById('totalVisits').innerText = stats.totalVisits;
        document.getElementById('totalRequests').innerText = stats.requests.length;
        document.getElementById('uniqueUsers').innerText = stats.uniqueUsers;
        document.getElementById('todayVisits').innerText = stats.todayVisits;

        // График
        const chartDiv = document.getElementById('weeklyChart');
        chartDiv.innerHTML = weekly.map(day => `
            <div style="text-align: center; flex: 1; min-width: 50px;">
                <div style="background: #764ba2; height: ${Math.max(30, day.count * 6)}px; width: 100%; max-width: 60px; border-radius: 12px 12px 0 0; margin: 0 auto;"></div>
                <div style="font-size: 10px; margin-top: 8px;">${day.label}</div>
                <div style="font-weight: bold; font-size: 12px;">${day.count}</div>
            </div>
        `).join('');

        // Таблица запросов
        const tbody = document.getElementById('requestsBody');
        const lastRequests = stats.requests.slice(0, 20);
        tbody.innerHTML = lastRequests.map(req => `
            <tr>
                <td style="font-size: 11px;">${req.date || '—'}</td>
                <td>${req.q?.substring(0, 50) || '—'}</td>
                <td>${req.grade || '—'}</td>
                <td>${req.country || ''} ${req.city || ''}</td>
            </tr>
        `).join('');
    }

    // Загрузка ключа
    function loadCurrentKey() {
        const key = localStorage.getItem('GEMINI_API_KEY');
        document.getElementById('currentKeyPreview').innerText = key ? key.substring(0, 30) + '...' : 'не задан';
    }

    // Логин
    document.getElementById('loginBtn').onclick = () => {
        const pass = document.getElementById('adminPass').value;
        if (pass === ADMIN_PASSWORD) {
            localStorage.setItem('admin_logged', 'true');
            document.getElementById('loginDiv').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            refreshAdminPanel();
            loadCurrentKey();
        } else {
            document.getElementById('loginError').innerText = 'Неверный пароль';
        }
    };

    // Кнопка обновления
    document.getElementById('refreshStatsBtn').onclick = () => refreshAdminPanel();

    // Сохранение ключа
    document.getElementById('saveKeyBtn').onclick = () => {
        const newKey = document.getElementById('apiKeyInput').value.trim();
        if (newKey.length > 10 && newKey.startsWith('AIza')) {
            localStorage.setItem('GEMINI_API_KEY', newKey);
            document.getElementById('saveMessage').innerHTML = '<span class="success">✅ Ключ сохранён!</span>';
            loadCurrentKey();
            document.getElementById('apiKeyInput').value = '';
            setTimeout(() => document.getElementById('saveMessage').innerHTML = '', 3000);
        } else {
            document.getElementById('saveMessage').innerHTML = '<span class="error">❌ Введите корректный ключ Gemini (начинается с AIza)</span>';
        }
    };

    // Удаление ключа
    document.getElementById('clearKeyBtn').onclick = () => {
        if (confirm('Удалить API-ключ? Без него сайт не будет работать.')) {
            localStorage.removeItem('GEMINI_API_KEY');
            loadCurrentKey();
            document.getElementById('saveMessage').innerHTML = '<span class="error">⚠️ Ключ удалён</span>';
            setTimeout(() => document.getElementById('saveMessage').innerHTML = '', 2000);
        }
    };

    // Очистка истории запросов
    document.getElementById('clearHistoryBtn').onclick = () => {
        if (confirm('Очистить всю историю запросов пользователей? Отменить будет нельзя.')) {
            localStorage.removeItem('ai_history_v4');
            refreshAdminPanel();
            document.getElementById('clearMessage').innerHTML = '<span class="success">✅ История очищена</span>';
            setTimeout(() => document.getElementById('clearMessage').innerHTML = '', 2000);
        }
    };

    // Выход
    document.getElementById('logoutBtn').onclick = () => {
        localStorage.removeItem('admin_logged');
        location.reload();
    };

    // Автоматический вход, если уже залогинены
    if (localStorage.getItem('admin_logged') === 'true') {
        document.getElementById('loginDiv').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        refreshAdminPanel();
        loadCurrentKey();
    }
</script>
</body>
</html>
