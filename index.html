    let recognition = null;
    let isVoiceActive = false;
    
    function startVoiceAdd() {
        if (isVoiceActive) return;
        
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
        } else if ('SpeechRecognition' in window) {
            recognition = new SpeechRecognition();
        } else {
            alert("Голосовое распознавание не поддерживается вашим браузером");
            return;
        }
        
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = currentLang === 'ru' ? 'ru-RU' : (currentLang === 'uk' ? 'uk-UA' : 'en-US');
        recognition.maxAlternatives = 1;
        
        haptic();
        isVoiceActive = true;
        
        let statusSpan = document.getElementById('voiceStatusSpan');
        if(statusSpan) {
            statusSpan.innerText = "🎙️ Слушаю...";
            statusSpan.style.color = "#10b981";
        }
        
        recognition.onstart = function() {
            if(statusSpan) statusSpan.innerText = "🎙️ Говорите...";
        };
        
        recognition.onresult = function(event) {
            let finalTranscript = "";
            let interimTranscript = "";
            
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalTranscript += transcript;
                } else {
                    interimTranscript += transcript;
                }
            }
            
            if (interimTranscript) {
                if(statusSpan) statusSpan.innerText = `📝 ${interimTranscript}`;
            }
            
            if (finalTranscript) {
                if(statusSpan) statusSpan.innerText = `✅ Распознано: ${finalTranscript}`;
                
                let words = finalTranscript.toLowerCase()
                    .replace(/[.,!?;:()\-"']/g, '')
                    .split(/[\s,;]+/)
                    .filter(w => w.length > 1);
                
                let newIngredients = [];
                for(let w of words) {
                    if(!userIngredients.includes(w)) {
                        userIngredients.push(w);
                        newIngredients.push(w);
                    }
                }
                
                saveAll();
                renderRecipeModule();
                
                if(newIngredients.length > 0) {
                    if(statusSpan) statusSpan.innerText = `✅ Добавлено: ${newIngredients.join(', ')}`;
                    setTimeout(() => {
                        if(statusSpan) statusSpan.innerText = "";
                    }, 3000);
                } else {
                    if(statusSpan) statusSpan.innerText = "⚠️ Ничего нового не добавлено";
                    setTimeout(() => {
                        if(statusSpan) statusSpan.innerText = "";
                    }, 2000);
                }
            }
        };
        
        recognition.onerror = function(event) {
            console.error("Voice recognition error:", event.error);
            let errorMsg = "❌ Ошибка: ";
            switch(event.error) {
                case 'not-allowed': errorMsg += "нет разрешения на микрофон"; break;
                case 'no-speech': errorMsg += "речь не обнаружена"; break;
                case 'audio-capture': errorMsg += "микрофон не найден"; break;
                default: errorMsg += event.error;
            }
            if(statusSpan) {
                statusSpan.innerText = errorMsg;
                statusSpan.style.color = "#ef4444";
            }
            isVoiceActive = false;
            setTimeout(() => {
                if(statusSpan && statusSpan.innerText === errorMsg) statusSpan.innerText = "";
            }, 3000);
        };
        
        recognition.onend = function() {
            isVoiceActive = false;
            if(statusSpan && statusSpan.innerText !== "✅ Распознано:" && !statusSpan.innerText.includes("Добавлено")) {
                statusSpan.innerText = "";
            }
            recognition = null;
        };
        
        recognition.start();
    }

    function renderRecipeModule() {
        let ingHtml = userIngredients.map((ing,i)=>`<span class="ingredient-tag">${ing} <button style="background:transparent; border:none; color:#ffaaa5;" data-rmidx="${i}">✖</button></span>`).join('');
        
        const exactMatches = [];
        const suggestions = [];
        
        for (let rec of fullRecipesDB) {
            const hasAllIngredients = rec.ings.every(need => userIngredients.includes(need));
            if (hasAllIngredients) {
                exactMatches.push(rec);
            } else {
                const hasAnyIngredient = rec.ings.some(need => userIngredients.includes(need));
                if (hasAnyIngredient && userIngredients.length > 0) {
                    const missingIngredients = rec.ings.filter(need => !userIngredients.includes(need));
                    suggestions.push({ ...rec, missing: missingIngredients });
                }
            }
        }
        
        let exactHtml = '';
        if (exactMatches.length > 0) {
            exactHtml = `<h3 style="margin-top: 15px;">${t('exactMatches')} (${exactMatches.length})</h3>` +
                exactMatches.map(rec => `<div class="recipe-card"><div class="flex-between"><strong>🍳 ${rec.name}</strong><span class="badge">⏱️ ${rec.time} ${t('timerMin')}</span></div><div style="font-size:0.75rem; margin:8px 0">📌 ${rec.ings.join(', ')}</div><div class="flex-between"><button class="stepsModalBtn" data-recipe='${JSON.stringify(rec)}'>🍳 ${t('stepByStep')}</button><span style="font-size:11px;">✨ ${rec.tip}</span></div></div>`).join('');
        }
        
        let suggestionsHtml = '';
        if (suggestions.length > 0) {
            suggestionsHtml = `<h3 style="margin-top: 15px;">${t('suggestions')} (${suggestions.length})</h3>` +
                suggestions.map(rec => `<div class="suggestion-card"><div class="flex-between"><strong>🍳 ${rec.name}</strong><span class="badge">⏱️ ${rec.time} ${t('timerMin')}</span></div><div style="font-size:0.75rem; margin:8px 0">📌 ${rec.ings.join(', ')}</div><div><span class="missing-badge">⚠️ ${t('missing')} ${rec.missing.join(', ')}</span></div><div class="flex-between" style="margin-top: 8px;"><button class="stepsModalBtn" data-recipe='${JSON.stringify(rec)}'>🍳 ${t('stepByStep')}</button><span style="font-size:11px;">✨ ${rec.tip}</span></div></div>`).join('');
        }
        
        let noRecipesHtml = '';
        if (exactMatches.length === 0 && suggestions.length === 0 && userIngredients.length === 0) {
            noRecipesHtml = `<div class="glass-card" style="padding:1rem">✨ Добавьте продукты голосом или вручную ✨</div>`;
        } else if (exactMatches.length === 0 && suggestions.length === 0 && userIngredients.length > 0) {
            noRecipesHtml = `<div class="glass-card" style="padding:1rem">😕 Нет рецептов, совместимых с вашими продуктами</div>`;
        }

        const container = document.getElementById('moduleRecipe');
        container.innerHTML = `
            <div class="glass-card" style="padding:1.2rem">
                <h2>${t('recipeTitle')} <button class="info-btn" id="helpRecipeBtn">❔</button></h2>
                <div class="voice-row"><input id="manualProd" placeholder="🍅 Добавить продукт" style="flex:1"><button class="primary" id="manualAddProdBtn">${t('manualAdd')}</button></div>
                <div class="voice-row"><button id="voiceAddBtn" class="voice-btn">${t('voiceInput')}</button><span id="voiceStatusSpan" style="font-size:12px; margin-left: 10px;"></span></div>
                <div style="margin:12px 0; display:flex; flex-wrap:wrap; gap:8px;">${ingHtml || '<i>Список пуст</i>'}</div>
                ${userIngredients.length ? `<button id="clearAllIngs" style="background:#4a3a44;">Очистить всё</button>` : ''}
            </div>
            ${noRecipesHtml}
            ${exactHtml}
            ${suggestionsHtml}
        `;
        
        document.getElementById('manualAddProdBtn')?.addEventListener('click', addManualProduct);
        document.getElementById('voiceAddBtn')?.addEventListener('click', startVoiceAdd);
        document.getElementById('clearAllIngs')?.addEventListener('click', ()=>{ userIngredients=[]; saveAll(); renderRecipeModule(); haptic(); });
        document.getElementById('helpRecipeBtn')?.addEventListener('click', ()=>showHelpModal('recipe'));
        document.querySelectorAll('[data-rmidx]').forEach(btn=>btn.addEventListener('click',(e)=>{ let idx = parseInt(btn.dataset.rmidx); removeIng(idx); }));
        document.querySelectorAll('.stepsModalBtn').forEach(btn=>btn.addEventListener('click',(e)=>{ let rec = JSON.parse(btn.dataset.recipe); showStepByStep(rec); haptic(); }));
    }

    function renderNewsModule() {
        const getNewsHtml = () => {
            return `
                <div class="glass-card" style="padding:1.2rem">
                    <div class="flex-between">
                        <h2>${t('newsTitle')} <button class="info-btn" id="helpNewsBtn">❔</button></h2>
                        <button class="refresh-btn" id="refreshNewsBtn">🔄 ${t('refresh')}</button>
                    </div>
                    
                    <div class="section-title">${t('topNews')}</div>
                    ${newsData.slice(0,3).map(item => `
                        <div class="news-card">
                            <div class="flex-between">
                                <strong>📰 ${item.title}</strong>
                            </div>
                            <div style="font-size:0.85rem; margin:8px 0">${item.description}</div>
                            <div class="news-date">📅 ${item.date}</div>
                        </div>
                    `).join('')}
                    
                    <div class="section-title">${t('innovations')}</div>
                    ${innovationData.map(item => `
                        <div class="innovation-card">
                            <div class="flex-between">
                                <strong>🚀 ${item.title}</strong>
                            </div>
                            <div style="font-size:0.85rem; margin:8px 0">${item.description}</div>
                            <div class="news-date">📅 ${item.date}</div>
                        </div>
                    `).join('')}
                    
                    <div class="section-title">${t('quotes')}</div>
                    ${quotesData.map(quote => `
                        <div class="quote-card">
                            <div class="quote-icon">💭</div>
                            <div class="quote-text">"${quote.text}"</div>
                            <div class="quote-author">— ${quote.author}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        };
        
        const container = document.getElementById('moduleNews');
        container.innerHTML = getNewsHtml();
        
        document.getElementById('helpNewsBtn')?.addEventListener('click', ()=>showHelpModal('news'));
        document.getElementById('refreshNewsBtn')?.addEventListener('click', () => {
            haptic();
            renderNewsModule();
        });
    }

    function renderMotivationModule() {
        const container = document.getElementById('moduleMotivation');
        container.innerHTML = `
            <div class="glass-card" style="padding:1.2rem">
                <div class="flex-between">
                    <h2>${t('motivationTitle')} <button class="info-btn" id="helpMotivationBtn">❔</button></h2>
                    <button class="refresh-btn" id="refreshMotivationBtn">🔄 ${t('refresh')}</button>
                </div>
                <div class="quote-card" style="margin-top: 15px;">
                    <div class="quote-icon">✨</div>
                    <div class="quote-text">"${quotesData[0].text}"</div>
                    <div class="quote-author">— ${quotesData[0].author}</div>
                </div>
                <div class="quote-card">
                    <div class="quote-icon">💪</div>
                    <div class="quote-text">"${quotesData[1].text}"</div>
                    <div class="quote-author">— ${quotesData[1].author}</div>
                </div>
                <div class="quote-card">
                    <div class="quote-icon">🌟</div>
                    <div class="quote-text">"${quotesData[2].text}"</div>
                    <div class="quote-author">— ${quotesData[2].author}</div>
                </div>
            </div>
        `;
        
        document.getElementById('helpMotivationBtn')?.addEventListener('click', ()=>showHelpModal('motivation'));
        document.getElementById('refreshMotivationBtn')?.addEventListener('click', () => {
            haptic();
            renderMotivationModule();
        });
    }

    function renderSettingsModule() {
        document.getElementById('moduleSettings').innerHTML = `<div class="glass-card" style="padding:1.5rem;"><h2>${t('settingsTitle')}<button class="info-btn" id="helpSettingsBtn">❔</button></h2><div class="flex-between"><span>🌐 ${t('langLabel')}</span><div><button class="langSet" data-lang="ru">Рус</button><button class="langSet" data-lang="uk">Укр</button><button class="langSet" data-lang="en">Eng</button></div></div><hr/><button id="installPwaBtnFinal" class="primary">📲 ${t('install')}</button><div class="stat-badge" id="statsDisplay"></div><footer style="margin-top:1rem; font-size:10px;">AXIS · v8.0 · офлайн ассистент · Рецепты + Новости + Вдохновение</footer></div>`;
        document.querySelectorAll('.langSet').forEach(btn=>btn.addEventListener('click',(e)=>{ currentLang=btn.dataset.lang; saveAll(); renderAllModules(); haptic(); }));
        document.getElementById('helpSettingsBtn')?.addEventListener('click',()=>showHelpModal('settings'));
        let deferredPrompt = null; 
        window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; });
        document.getElementById('installPwaBtnFinal')?.addEventListener('click',()=>{ if(deferredPrompt){ deferredPrompt.prompt(); } else alert("PWA уже установлен"); });
        let stats = localStorage.getItem('axis_stats');
        if(stats) {
            try {
                let s = JSON.parse(stats);
                document.getElementById('statsDisplay').innerHTML = `👥 Посещений: ${s.visits || 0}`;
            } catch(e) {}
        }
    }

    function renderAllModules(){ renderRecipeModule(); renderNewsModule(); renderMotivationModule(); renderSettingsModule(); }
    
    function switchModule(moduleId) {
        document.querySelectorAll('.module').forEach(mod=>mod.classList.remove('active-module'));
        document.getElementById(`module${moduleId.charAt(0).toUpperCase()+moduleId.slice(1)}`).classList.add('active-module');
        document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active'));
        let activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(btn=>btn.dataset.module===moduleId);
        if(activeBtn) activeBtn.classList.add('active');
        setBackgroundTheme(moduleId);
        haptic();
    }
    
    document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{
        const moduleName = btn.dataset.module;
        switchModule(moduleName);
    }));
    
    if('serviceWorker' in navigator) { 
        const swBlob = new Blob([`self.addEventListener('fetch', e=>e.respondWith(fetch(e.request).catch(()=>new Response("AXIS offline",{status:200}))))`], {type:'application/javascript'}); 
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)); 
    }
    
    setBackgroundTheme('recipe');
    renderAllModules(); 
    switchModule('recipe');
</script>
</body>
</html>
