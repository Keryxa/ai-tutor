<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AI Tutor | Допомога з ДЗ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-start: #667eea;
            --bg-end: #764ba2;
            --card-bg: rgba(255, 255, 255, 0.98);
            --text: #1f2937;
            --text-light: #4b5563;
            --border: #e2e8f0;
            --accent: #764ba2;
            --accent-hover: #5a3a7a;
            --mic: #ef4444;
            --mic-listening: #10b981;
            --result-bg: #f1f5f9;
            --error: #dc2626;
        }

        body.dark {
            --bg-start: #1a1a2e;
            --bg-end: #16213e;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-light: #cbd5e1;
            --border: #334155;
            --result-bg: #0f172a;
            --error: #f87171;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            padding: 12px;
            transition: all 0.3s;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .header {
            background: linear-gradient(135deg, rgba(0,0,0,0.15), rgba(0,0,0,0.05));
            padding: 20px 16px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.8rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header p {
            color: rgba(255,255,255,0.85);
            font-size: 0.8rem;
            margin-top: 6px;
        }

        .theme-toggle {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            width: 36px;
            height: 36px;
            font-size: 1rem;
            cursor: pointer;
            color: white;
        }

        .form-card {
            padding: 18px;
        }

        .lang-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .lang-selector {
            background: var(--result-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.8rem;
            color: var(--text);
            cursor: pointer;
        }

        .grade-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.8rem;
            display: block;
            margin-bottom: 6px;
        }

        select, textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            font-size: 0.95rem;
            background: var(--card-bg);
            color: var(--text);
            font-family: inherit;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .question-area {
            background: var(--result-bg);
            border-radius: 24px;
            padding: 16px;
            margin: 16px 0;
        }

        .subject-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0 18px;
        }

        .subject-btn {
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            font-weight: 500;
        }

        .subject-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .voice-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin: 16px 0 12px;
            flex-wrap: wrap;
        }

        .mic-btn {
            background: var(--mic);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .mic-btn.listening {
            background: var(--mic-listening);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
            100% { transform: scale(1); }
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: 0.2s;
        }

        .send-btn:active {
            transform: scale(0.97);
        }

        .result-box {
            margin-top: 20px;
            background: var(--result-bg);
            border-radius: 24px;
            padding: 16px;
            border-left: 5px solid var(--accent);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .answer-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
            color: var(--text);
        }

        .answer-content {
            line-height: 1.55;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }

        .history-section {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .history-title {
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .history-list {
            max-height: 260px;
            overflow-y: auto;
            display: none;
        }

        .history-list.show {
            display: block;
        }

        .history-item {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.5s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-left: 5px;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border-left: 3px solid var(--error);
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            font-size: 0.6rem;
            padding: 14px;
            border-top: 1px solid var(--border);
            color: var(--text-light);
        }

        @media (max-width: 480px) {
            .form-card { padding: 14px; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>

                <option value="el">🇬🇷 Ελληνικά</option>
            </select>
        </div>

        <!-- Только класс (без страны/города) -->
        <div class="grade-group">
            <label id="gradeLabel">📖 Класс</label>
            <select id="grade">

                <option>6</option><option selected>7</option><option>8</option><option>9</option><option>10</option><option>11</option>
            </select>
        </div>

        <div class="question-area">
            <label id="subjectLabel">📚 Предмет</label>
            <div class="subject-buttons" id="subjectButtons">
                <button class="subject-btn" data-subject="Математика">📐 Математика</button>
                <button class="subject-btn" data-subject="Русский язык">📖 Русский</button>
                <button class="subject-btn" data-subject="Физика">⚡ Физика</button>
                <button class="subject-btn" data-subject="Химия">🧪 Химия</button>
                <button class="subject-btn" data-subject="История">🏛️ История</button>
                <button class="subject-btn" data-subject="Биология">🌿 Биология</button>
            </div>

            <label id="questionLabel">✍️ Задание / вопрос</label>
            <textarea id="questionInput" rows="3" placeholder="Например: решить уравнение 4x+5=17, или расскажи о фотосинтезе..."></textarea>

                <span id="voiceStatus" class="status-text">Нажми и говори</span>
            </div>
            
            <button id="sendButton" class="send-btn"><span id="sendText">🚀 Получить решение</span></button>
        </div>

        <div class="result-box" id="resultBox" style="display: none;">
            <div class="result-header">
                <span id="answerTitle">🤖 Ответ</span>
                <div class="answer-actions">
                    <button id="copyAnswerBtn" class="action-btn">📋</button>
                    <button id="speakAnswerBtn" class="action-btn">🔊</button>
                </div>
            </div>
            <div id="answerText" class="answer-content"></div>
        </div>

        <div class="history-section">
            <div class="history-title" id="historyToggle">📜 История запросов <span>▼</span></div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>
    <footer id="footerText">🎤 Голос | 🔊 Озвучка | 📜 История | 🔒 Безопасный бэкенд</footer>
</div>

        it: { title: "📚 Tutor IA", subtitle: "🎤 Voce / Testo — compiti in secondi", grade: "📖 Classe", subject: "📚 Materia", question: "✍️ Compito / domanda", send: "🚀 Ottieni soluzione", mic: "Chiedi a voce", answer: "🤖 Risposta", history: "📜 Cronologia", footer: "🎤 Voce | 🔊 Leggi | 📜 Cronologia | 🔒 Backend sicuro", subjects: { "Математика":"📐 Matematica","Русский язык":"📖 Russo","Физика":"⚡ Fisica","Химия":"🧪 Chimica","История":"🏛️ Storia","Биология":"🌿 Biologia" }, placeholder: "Es: risolvi 4x+5=17 o spiega la fotosintesi...", errorNoText: "📢 Scrivi o pronuncia il compito", sending: "Risolvo...", copyOk: "✅ Copiato", errConnect: "⚠️ Errore di connessione. Controlla internet o l'URL del Worker.", serverErr: "⚠️ Errore server. Riprova più tardi." },
        el: { title: "📚 AI Εκπαιδευτής", subtitle: "🎤 Φωνή / Κείμενο — λύση σε δευτερόλεπτα", grade: "📖 Τάξη", subject: "📚 Μάθημα", question: "✍️ Εργασία / ερώτηση", send: "🚀 Λήψη λύσης", mic: "Ρώτησε με φωνή", answer: "🤖 Απάντηση", history: "📜 Ιστορικό", footer: "🎤 Φωνή | 🔊 Ανάγνωση | 📜 Ιστορικό | 🔒 Ασφαλές backend", subjects: { "Математика":"📐 Μαθηματικά","Русский язык":"📖 Ρωσικά","Физика":"⚡ Φυσική","Химия":"🧪 Χημεία","История":"🏛️ Ιστορία","Биология":"🌿 Βιολογία" }, placeholder: "Π.χ. λύσε 4x+5=17 ή εξήγησε τη φωτοσύνθεση...", errorNoText: "📢 Γράψε ή πες την εργασία", sending: "Επίλυση...", copyOk: "✅ Αντιγράφηκε", errConnect: "⚠️ Σφάλμα σύνδεσης. Ελέγξτε το διαδίκτυο ή το URL του Worker.", serverErr: "⚠️ Σφάλμα διακομιστή. Δοκιμάστε αργότερα." }
    };

    // DOM элементы
    const langSelect = document.getElementById('langSelect');
    const gradeSelect = document.getElementById('grade');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendButton');
    const micBtn = document.getElementById('micButton');
    const voiceStatusSpan = document.getElementById('voiceStatus');
    const resultBox = document.getElementById('resultBox');
    const answerDiv = document.getElementById('answerText');
    const copyBtn = document.getElementById('copyAnswerBtn');
    const speakBtn = document.getElementById('speakAnswerBtn');
    const historyToggle = document.getElementById('historyToggle');
    const historyListDiv = document.getElementById('historyList');
    const themeToggle = document.getElementById('themeToggle');
    const subjectContainer = document.getElementById('subjectButtons');

    // Текущий язык
    let currentLang = "ru";
    let currentSubject = "Математика";
    let history = [];

    // Worker URL (замените на ваш реальный адрес Cloudflare Worker!)
    const WORKER_URL = "https://gemini-proxy.keryxa-ai.workers.dev";  // <-- ВСТАВЬТЕ ВАШУ РЕАЛЬНУЮ ССЫЛКУ

    // ========== ПЕРЕКЛЮЧЕНИЕ ЯЗЫКА ==========
    function updateUI() {
        const t = translations[currentLang];
        if (!t) return;
        document.getElementById('mainTitle').innerText = t.title;
        document.getElementById('subText').innerText = t.subtitle;
        document.getElementById('gradeLabel').innerText = t.grade;
        document.getElementById('subjectLabel').innerText = t.subject;
        document.getElementById('questionLabel').innerText = t.question;
        document.getElementById('sendText').innerText = t.send;
        document.getElementById('micText').innerText = t.mic;
        document.getElementById('answerTitle').innerText = t.answer;
        document.getElementById('historyToggle').innerHTML = t.history + ' <span>▼</span>';
        document.getElementById('footerText').innerText = t.footer;
        questionInput.placeholder = t.placeholder;

        // Обновить кнопки предметов
        const btns = subjectContainer.querySelectorAll('.subject-btn');
        btns.forEach(btn => {
            const original = btn.getAttribute('data-subject');
            if (t.subjects[original]) {
                btn.innerText = t.subjects[original];
            }
        });
    }

    langSelect.addEventListener('change', (e) => {
        currentLang = e.target.value;
        updateUI();
        renderHistory();  // обновить историю с новым языком для кнопок перевода не надо, но даты сохранятся
    });

    // ========== ТЕМА ==========
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        themeToggle.textContent = '☀️';
    }
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
    });

    // Предметы активные
    document.querySelectorAll('.subject-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSubject = btn.getAttribute('data-subject');
        });
    });
    document.querySelector('.subject-btn').classList.add('active');

    // ========== ГОЛОСОВОЙ ВВОД ==========
    let recognition = null, isListening = false;
    const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechAPI) {
        recognition = new SpeechAPI();
        recognition.lang = 'ru-RU';
        recognition.interimResults = false;
        recognition.onresult = (e) => {
            questionInput.value = e.results[0][0].transcript;
            voiceStatusSpan.innerHTML = '🎤 Распознано';
            stopListening();
        };
        recognition.onerror = () => { voiceStatusSpan.innerHTML = '❌ Ошибка микрофона'; stopListening(); };
        recognition.onend = stopListening;
    } else {
        micBtn.disabled = true;
        voiceStatusSpan.innerText = '❌ Голос не поддерживается';
    }
    function startListening() {
        if (!recognition || isListening) return;
        recognition.start();
        isListening = true;
        micBtn.classList.add('listening');
        micBtn.querySelector('span').innerText = translations[currentLang]?.mic || 'Спросить голосом';
        voiceStatusSpan.innerHTML = '🎙️ Говорите...';
    }
    function stopListening() {
        if (recognition && isListening) recognition.abort();
        isListening = false;
        micBtn.classList.remove('listening');
        if (translations[currentLang]) micBtn.querySelector('span').innerText = translations[currentLang].mic;
        voiceStatusSpan.innerHTML = 'Нажми и говори';
    }
    micBtn.addEventListener('click', () => isListening ? stopListening() : startListening());

    // История
    function loadHistory() {
        const saved = localStorage.getItem('ai_history_v2');
        if (saved) history = JSON.parse(saved);
        renderHistory();
    }
    function saveToHistory(question, answer) {
        history.unshift({ question: question.substring(0, 80), answer, subject: currentSubject, date: new Date().toLocaleString() });
        if (history.length > 15) history.pop();
        localStorage.setItem('ai_history_v2', JSON.stringify(history));
        renderHistory();
    }
    function renderHistory() {
        if (history.length === 0) {
            historyListDiv.innerHTML = '<div style="padding:8px; text-align:center;">📭 Пусто</div>';
            return;
        }
        historyListDiv.innerHTML = history.map((item, idx) => `<div class="history-item" data-idx="${idx}">📌 ${item.question}<br><span style="font-size:0.65rem;">${item.subject} • ${item.date}</span></div>`).join('');
        document.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', () => {
                const idx = el.getAttribute('data-idx');
                const item = history[parseInt(idx)];
                questionInput.value = item.question;
                currentSubject = item.subject;
                document.querySelectorAll('.subject-btn').forEach(btn => {
                    if (btn.getAttribute('data-subject') === currentSubject) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
                answerDiv.innerHTML = item.answer.replace(/\n/g, '<br>');
                resultBox.style.display = 'block';
            });
        });
    }
    historyToggle.addEventListener('click', () => {
        historyListDiv.classList.toggle('show');
        const span = historyToggle.querySelector('span');
        if (span) span.textContent = historyListDiv.classList.contains('show') ? '▲' : '▼';
    });
    loadHistory();

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(answerDiv.innerText);
        alert(translations[currentLang]?.copyOk || 'Скопировано');
    });
    speakBtn.addEventListener('click', () => {
        const text = answerDiv.innerText;
        if (text && !text.includes('Решаю')) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = currentLang === 'ru' ? 'ru-RU' : (currentLang === 'uk' ? 'uk-UA' : 'en-US');
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }
    });

    // ========== ОТПРАВКА ЗАПРОСА (исправленная ошибка соединения) ==========
    async function askGemini(questionText) {
        const t = translations[currentLang];
        const grade = gradeSelect.value;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: questionText,
                    grade: grade,
                    subject: currentSubject,
                    lang: currentLang
                })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.success) {
                answerDiv.innerHTML = data.answer.replace(/\n/g, '<br>');
                saveToHistory(questionText, data.answer);
                return true;
            } else {
                answerDiv.innerHTML = t.serverErr + ' ' + (data.error || '');
                return false;
            }
        } catch (err) {
            console.error(err);
            answerDiv.innerHTML = t.errConnect + '<br><span style="font-size:0.75rem;">🔧 Убедитесь, что Worker URL правильный и сервер включён.</span>';
            return false;
        }
    }

    sendBtn.addEventListener('click', async () => {
        const q = questionInput.value.trim();
        const t = translations[currentLang];
        if (!q) {
            answerDiv.innerHTML = t.errorNoText;
            resultBox.style.display = 'block';
            return;
        }
        resultBox.style.display = 'block';
        answerDiv.innerHTML = `<span class="loader"></span> ${t.sending}`;
        await askGemini(q);
    });

    questionInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });
    updateUI();
</script>
