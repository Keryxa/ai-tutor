    function loadAllAds() {
        const saved = localStorage.getItem('axis_ads_full');
        let ads = { pcLeft1: '', pcLeft2: '', pcRight1: '', pcRight2: '', mobile1: '', mobile2: '', footer1: '', footer2: '', footer3: '' };
        if (saved) { try { ads = { ...ads, ...JSON.parse(saved) }; } catch(e) {} }
        document.getElementById('adLeft1').innerHTML = ads.pcLeft1 || '';
        document.getElementById('adLeft2').innerHTML = ads.pcLeft2 || '';
        document.getElementById('adRight1').innerHTML = ads.pcRight1 || '';
        document.getElementById('adRight2').innerHTML = ads.pcRight2 || '';
        document.getElementById('adMobile1').innerHTML = ads.mobile1 || '';
        document.getElementById('adMobile2').innerHTML = ads.mobile2 || '';
        document.getElementById('adFooter1').innerHTML = ads.footer1 || '';
        document.getElementById('adFooter2').innerHTML = ads.footer2 || '';
        document.getElementById('adFooter3').innerHTML = ads.footer3 || '';
        const topAd = document.getElementById('axisAdTop');
        if (topAd && ads.top) topAd.innerHTML = ads.top;
    }

        let visits = 1;
        if (stats) { try { const parsed = JSON.parse(stats); visits = (parsed.visits || 0) + 1; } catch(e) {} }
        localStorage.setItem('axis_stats', JSON.stringify({ visits: visits, lastVisit: new Date().toISOString() }));

    function generateFloatingItems(moduleType) {
        const container = document.getElementById('floatingContainer');
        container.innerHTML = '';
        container.className = `floating-bg bg-${moduleType}-floating`;

            const item = document.createElement('div');
            item.className = 'floating-item';
            item.textContent = icons[Math.floor(Math.random() * icons.length)];

    function startVoiceAdd() {
        if(!recognition) { alert("–У–Њ–ї–Њ—Б–Њ–≤–Њ–µ —А–∞—Б–њ–Њ–Ј–љ–∞–≤–∞–љ–Є–µ –љ–µ –њ–Њ–і–і–µ—А–ґ–Є–≤–∞–µ—В—Б—П"); return; }
        haptic();
        recognition.start();
        let statusSpan = document.getElementById('voiceStatusSpan');
        if(statusSpan) statusSpan.innerText = "рЯОЩпЄП –°–ї—Г—И–∞—О, –љ–∞–Ј—Л–≤–∞–є—В–µ –њ—А–Њ–і—Г–Ї—В—Л...";
        recognition.onresult = (event) => {
            let final = "";
            for(let i=0; i<event.results.length; i++) final += event.results[i][0].transcript;
            if(statusSpan) statusSpan.innerText = `рЯУЭ ${final.slice(0,50)}`;
            if(event.results[event.results.length-1].isFinal) {
                let words = final.toLowerCase().split(/[ ,;]+/).filter(w => w.length>1 && !userIngredients.includes(w));
                if(words.length) { userIngredients.push(...words); saveAll(); }
                if(confirm(`–Ф–Њ–±–∞–≤–ї–µ–љ—Л: ${words.join(', ') || '–љ–Є—З–µ–≥–Њ'}. –Я—А–Њ–і–Њ–ї–ґ–Є—В—М?`)) { recognition.stop(); renderRecipeModule(); }
                else { recognition.start(); }
            }
        };
        recognition.onend = () => { if(statusSpan) statusSpan.innerText = ""; renderRecipeModule(); };
    }

    function renderRecipeModule() {
        let ingHtml = userIngredients.map((ing,i)=>`<span class="ingredient-tag">${ing} <button style="background:transparent; border:none; color:#ffaaa5;" data-rmidx="${i}">вЬЦ</button></span>`).join('');
        
        // –†–∞–Ј–і–µ–ї—П–µ–Љ —А–µ—Ж–µ–њ—В—Л –љ–∞ —В–Њ—З–љ—Л–µ —Б–Њ–≤–њ–∞–і–µ–љ–Є—П –Є –њ—А–µ–і–ї–Њ–ґ–µ–љ–Є—П
        const exactMatches = [];
        const suggestions = [];
        
        for (let rec of fullRecipesDB) {
            const hasAllIngredients = rec.ings.every(need => userIngredients.includes(need));
            
            if (hasAllIngredients) {
                exactMatches.push(rec);
            } else {
                // –Я—А–Њ–≤–µ—А—П–µ–Љ, –µ—Б—В—М –ї–Є —Е–Њ—В—П –±—Л –Њ–і–Є–љ –Є–љ–≥—А–µ–і–Є–µ–љ—В –Є–Ј —А–µ—Ж–µ–њ—В–∞ –≤ —Б–њ–Є—Б–Ї–µ –њ–Њ–ї—М–Ј–Њ–≤–∞—В–µ–ї—П
                const hasAnyIngredient = rec.ings.some(need => userIngredients.includes(need));
                if (hasAnyIngredient && userIngredients.length > 0) {
                    const missingIngredients = rec.ings.filter(need => !userIngredients.includes(need));
                    suggestions.push({ ...rec, missing: missingIngredients });
                }
            }
        }
        
        let exactHtml = '';
        if (exactMatches.length > 0) {
            exactHtml = `<h3 style="margin-top: 15px;">${t('exactMatches')} (${exactMatches.length})</h3>` +
                exactMatches.map(rec => `<div class="recipe-card"><div class="flex-between"><strong>рЯН≥ ${rec.name}</strong><span class="badge">вП±пЄП ${rec.time} ${t('timerMin')}</span></div><div style="font-size:0.75rem; margin:8px 0">рЯУМ ${rec.ings.join(', ')}</div><div class="flex-between"><button class="stepsModalBtn" data-recipe='${JSON.stringify(rec)}'>рЯУЦ ${t('stepByStep')}</button><span style="font-size:11px;">вЬ® ${rec.tip}</span></div></div>`).join('');
        }
        
        let suggestionsHtml = '';
        if (suggestions.length > 0) {
            suggestionsHtml = `<h3 style="margin-top: 15px;">${t('suggestions')} (${suggestions.length})</h3>` +
                suggestions.map(rec => `<div class="suggestion-card"><div class="flex-between"><strong>рЯН≥ ${rec.name}</strong><span class="badge">вП±пЄП ${rec.time} ${t('timerMin')}</span></div><div style="font-size:0.75rem; margin:8px 0">рЯУМ ${rec.ings.join(', ')}</div><div><span class="missing-badge">вЪ†пЄП ${t('missing')} ${rec.missing.join(', ')}</span></div><div class="flex-between" style="margin-top: 8px;"><button class="stepsModalBtn" data-recipe='${JSON.stringify(rec)}'>рЯУЦ ${t('stepByStep')}</button><span style="font-size:11px;">вЬ® ${rec.tip}</span></div></div>`).join('');
        }
        
        let noRecipesHtml = '';
        if (exactMatches.length === 0 && suggestions.length === 0 && userIngredients.length === 0) {
            noRecipesHtml = `<div class="glass-card" style="padding:1rem">вЬ® –Ф–Њ–±–∞–≤—М—В–µ –њ—А–Њ–і—Г–Ї—В—Л –≥–Њ–ї–Њ—Б–Њ–Љ –Є–ї–Є –≤—А—Г—З–љ—Г—О вЬ®</div>`;
        } else if (exactMatches.length === 0 && suggestions.length === 0 && userIngredients.length > 0) {
            noRecipesHtml = `<div class="glass-card" style="padding:1rem">рЯШХ –Э–µ—В —А–µ—Ж–µ–њ—В–Њ–≤, —Б–Њ–≤–Љ–µ—Б—В–Є–Љ—Л—Е —Б –≤–∞—И–Є–Љ–Є –њ—А–Њ–і—Г–Ї—В–∞–Љ–Є</div>`;
        }

        const container = document.getElementById('moduleRecipe');
        container.innerHTML = `
            <div class="glass-card" style="padding:1.2rem">
                <h2>${t('recipeTitle')} <button class="info-btn" id="helpRecipeBtn">вЭФ</button></h2>
                <div class="voice-row"><input id="manualProd" placeholder="рЯНЕ –Ф–Њ–±–∞–≤–Є—В—М –њ—А–Њ–і—Г–Ї—В" style="flex:1"><button class="primary" id="manualAddProdBtn">${t('manualAdd')}</button></div>
                <div class="voice-row"><button id="voiceAddBtn" class="voice-btn">${t('voiceInput')}</button><span id="voiceStatusSpan" style="font-size:12px;"></span></div>
                <div style="margin:12px 0; display:flex; flex-wrap:wrap; gap:8px;">${ingHtml || '<i>–°–њ–Є—Б–Њ–Ї –њ—Г—Б—В</i>'}</div>
                ${userIngredients.length ? `<button id="clearAllIngs" style="background:#4a3a44;">–Ю—З–Є—Б—В–Є—В—М –≤—Б—С</button>` : ''}
            </div>
            ${noRecipesHtml}
            ${exactHtml}
            ${suggestionsHtml}
        `;
        
        document.getElementById('manualAddProdBtn')?.addEventListener('click', addManualProduct);
        document.getElementById('voiceAddBtn')?.addEventListener('click', startVoiceAdd);
        document.getElementById('clearAllIngs')?.addEventListener('click', ()=>{ userIngredients=[]; saveAll(); renderRecipeModule(); haptic(); });
        document.getElementById('helpRecipeBtn')?.addEventListener('click', ()=>showHelpModal('recipe'));
        document.querySelectorAll('[data-rmidx]').forEach(btn=>btn.addEventListener('click',(e)=>{ let idx = parseInt(btn.dataset.rmidx); removeIng(idx); }));
        document.querySelectorAll('.stepsModalBtn').forEach(btn=>btn.addEventListener('click',(e)=>{ let rec = JSON.parse(btn.dataset.recipe); showStepByStep(rec); haptic(); }));
    }

    function renderHealthModule() {
        let medsHtml = medications.map((m,idx)=>`<div class="med-item"><div class="flex-between"><strong>рЯТК ${m.name}</strong><span>${m.dosage} | ${m.freq}x</span></div><div class="stock-bar"><div class="stock-fill ${m.stock<=3?'low':''}" style="width:${Math.min(100,(m.stock/30)*100)}%"></div></div><div>рЯУ¶ ${t('stockLeft')}: ${m.stock} ${t('doses')}</div><div class="flex-between mt-2"><button class="takeMed" data-idx="${idx}">вЬЕ ${t('takeDose')}</button><button class="delMed" data-idx="${idx}">рЯЧСпЄП</button></div></div>`).join('');
        document.getElementById('moduleHealth').innerHTML = `<div class="glass-card" style="padding:1.4rem"><h2>${t('healthTitle')}<button class="info-btn" id="helpHealthBtn">вЭФ</button></h2><input id="medNameIn" placeholder="${t('name')}"><input id="medDoseIn" placeholder="${t('dosage')}" class="mt-2"><input id="medFreqIn" type="number" placeholder="${t('freq')}" value="1" class="mt-2"><button id="addMedFinal" class="primary mt-2">вЮХ ${t('addBtn')}</button><div id="medListBlock" style="margin-top:18px;">${medsHtml || '<div>–Э–µ—В –ї–µ–Ї–∞—А—Б—В–≤</div>'}</div></div>`;
        document.getElementById('addMedFinal')?.addEventListener('click',()=>{ let name=document.getElementById('medNameIn').value.trim(); let dose=document.getElementById('medDoseIn').value.trim(); let freq=parseInt(document.getElementById('medFreqIn').value)||1; if(name && dose){ medications.push({name, dosage:dose, freq, stock:30, initialStock:30}); saveAll(); renderHealthModule(); haptic(); } });
        document.getElementById('helpHealthBtn')?.addEventListener('click',()=>showHelpModal('health'));
        document.querySelectorAll('.takeMed').forEach(btn=>btn.addEventListener('click',(e)=>{ let i=btn.dataset.idx; if(medications[i] && medications[i].stock>0){ medications[i].stock--; saveAll(); renderHealthModule(); haptic(); } }));
        document.querySelectorAll('.delMed').forEach(btn=>btn.addEventListener('click',(e)=>{ let i=btn.dataset.idx; medications.splice(i,1); saveAll(); renderHealthModule(); haptic(); }));
    }

    function drawWheelFull() { 
        if(!wheelCanvas||!wheelCtx||wheelOptions.length===0) return; 
        let angStep=Math.PI*2/wheelOptions.length; 
        wheelCtx.clearRect(0,0,wheelCanvas.width,wheelCanvas.height); 
        for(let i=0;i<wheelOptions.length;i++){ 
            let start=wheelAngle+i*angStep,end=start+angStep; 
            wheelCtx.beginPath(); 
            wheelCtx.arc(wheelCanvas.width/2,wheelCanvas.height/2,wheelCanvas.width/2,start,end); 
            wheelCtx.lineTo(wheelCanvas.width/2,wheelCanvas.height/2); 
            wheelCtx.fillStyle=`hsl(${(i*360/wheelOptions.length)+200},70%,55%)`; 
            wheelCtx.fill(); 
            wheelCtx.save(); 
            wheelCtx.translate(wheelCanvas.width/2,wheelCanvas.height/2); 
            wheelCtx.rotate(start+angStep/2); 
            wheelCtx.fillStyle="white"; 
            wheelCtx.font="bold 14px system-ui"; 
            wheelCtx.fillText(wheelOptions[i], wheelCanvas.width/3.2, 8); 
            wheelCtx.restore(); 
        } 
        wheelCtx.beginPath(); 
        wheelCtx.arc(wheelCanvas.width/2,wheelCanvas.height/2,14,0,2*Math.PI); 
        wheelCtx.fillStyle="#151e2c"; 
        wheelCtx.fill(); 
        wheelCtx.beginPath(); 
        wheelCtx.moveTo(wheelCanvas.width-12,wheelCanvas.height/2); 
        wheelCtx.lineTo(wheelCanvas.width,wheelCanvas.height/2-12); 
        wheelCtx.lineTo(wheelCanvas.width,wheelCanvas.height/2+12); 
        wheelCtx.fillStyle="gold"; 
        wheelCtx.fill(); 
    }
    
    function triggerConfettiCanvas(){
        let canv=document.createElement('canvas');
        canv.style.position='fixed'; canv.style.top=0; canv.style.left=0; canv.style.width='100%'; canv.style.height='100%'; canv.style.pointerEvents='none'; canv.style.zIndex=2100;
        document.body.appendChild(canv);
        let ctxConf=canv.getContext('2d');
        let ww=window.innerWidth,wh=window.innerHeight;
        canv.width=ww; canv.height=wh;
        let particles=[];
        for(let i=0;i<110;i++) particles.push({x:Math.random()*ww,y:Math.random()*wh-80,size:4+Math.random()*7,spdY:2+Math.random()*8,color:`hsl(${Math.random()*360},75%,65%)`});
        function animateConfetti(){ 
            ctxConf.clearRect(0,0,ww,wh); 
            let alive=false; 
            for(let p of particles){ p.y+=p.spdY; if(p.y<wh+60)alive=true; ctxConf.fillStyle=p.color; ctxConf.fillRect(p.x,p.y,p.size,p.size); } 
            if(alive) requestAnimationFrame(animateConfetti); else canv.remove(); 
        }
        animateConfetti();
        setTimeout(()=>{ if(canv.parentNode)canv.remove(); },2000);
    }
    
    function spinWheelNow(){ 
        if(spinning || wheelOptions.length===0) return; 
        haptic(); 
        velocity=20+Math.random()*12; 
        spinning=true; 
        function animateSpin(){ 
            if(!spinning) return; 
            velocity*=0.984; 
            wheelAngle+=velocity; 
            drawWheelFull(); 
            if(Math.abs(velocity)<=0.008){ 
                spinning=false; 
                cancelAnimationFrame(animFrame); 
                let total=wheelOptions.length; 
                let angleRemainder=(wheelAngle%(Math.PI*2)+2*Math.PI)%(Math.PI*2); 
                let slice=Math.PI*2/total; 
                let index=Math.floor(((Math.PI*2-angleRemainder)%(Math.PI*2))/slice)%total; 
                let winner=wheelOptions[index]; 
                triggerConfettiCanvas(); 
                alert(`рЯОЙ ${t('winner')}: ${winner} рЯОЙ`); 
                haptic(); 
                return; 
            } 
            animFrame=requestAnimationFrame(animateSpin); 
        } 
        animateSpin(); 
    }
    
    function renderWheelModule(){
        let optionsHtml = wheelOptions.map((opt,i)=>`<div class="flex-between" style="margin:8px 0;"><span>рЯФЄ ${opt}</span><button class="delWheelOpt" data-idx="${i}">вЭМ</button></div>`).join('');
        document.getElementById('moduleWheel').innerHTML = `<div class="glass-card" style="padding:1.5rem;"><h2>${t('wheelTitle')}<button class="info-btn" id="helpWheelBtn">вЭФ</button></h2><canvas id="wheelCanvasMain" class="wheel-canvas" width="300" height="300" style="width:100%;max-width:280px;aspect-ratio:1;display:block;margin:0 auto;"></canvas><button id="spinFinalBtn" class="primary" style="margin:16px auto;">рЯО° ${t('spin')}</button><div class="flex-between"><input id="newWheelOpt" placeholder="–Э–Њ–≤—Л–є –≤–∞—А–Є–∞–љ—В" style="flex:1"><button id="addWheelOptBtn">вЮХ</button></div><div id="wheelOptionsDiv">${optionsHtml}</div></div>`;
        wheelCanvas = document.getElementById('wheelCanvasMain'); 
        if(wheelCanvas){ wheelCtx=wheelCanvas.getContext('2d'); drawWheelFull(); }
        document.getElementById('spinFinalBtn')?.addEventListener('click', spinWheelNow);
        document.getElementById('addWheelOptBtn')?.addEventListener('click',()=>{ let val=document.getElementById('newWheelOpt')?.value.trim(); if(val){ wheelOptions.push(val); saveAll(); renderWheelModule(); haptic(); } });
        document.getElementById('helpWheelBtn')?.addEventListener('click',()=>showHelpModal('wheel'));
        document.querySelectorAll('.delWheelOpt').forEach(btn=>btn.addEventListener('click',(e)=>{ let idx=btn.dataset.idx; wheelOptions.splice(idx,1); saveAll(); renderWheelModule(); haptic(); }));
    }

    function renderSettingsModule() {
        document.getElementById('moduleSettings').innerHTML = `<div class="glass-card" style="padding:1.5rem;"><h2>${t('settingsTitle')}<button class="info-btn" id="helpSettingsBtn">вЭФ</button></h2><div class="flex-between"><span>рЯМР ${t('langLabel')}</span><div><button class="langSet" data-lang="ru">–†—Г—Б</button><button class="langSet" data-lang="uk">–£–Ї—А</button><button class="langSet" data-lang="en">Eng</button></div></div><hr/><button id="installPwaBtnFinal" class="primary">рЯУ≤ ${t('install')}</button><div class="stat-badge" id="statsDisplay"></div><footer style="margin-top:1rem; font-size:10px;">AXIS ¬Ј v3.0 ¬Ј –Њ—Д–ї–∞–є–љ –∞—Б—Б–Є—Б—В–µ–љ—В</footer></div>`;
        document.querySelectorAll('.langSet').forEach(btn=>btn.addEventListener('click',(e)=>{ currentLang=btn.dataset.lang; saveAll(); renderAllModules(); haptic(); }));
        document.getElementById('helpSettingsBtn')?.addEventListener('click',()=>showHelpModal('settings'));
        let deferredPrompt = null; 
        window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; });
        document.getElementById('installPwaBtnFinal')?.addEventListener('click',()=>{ if(deferredPrompt){ deferredPrompt.prompt(); } else alert("PWA —Г–ґ–µ —Г—Б—В–∞–љ–Њ–≤–ї–µ–љ"); });
        let stats = localStorage.getItem('axis_stats');
        if(stats) {
            try {
                let s = JSON.parse(stats);
                document.getElementById('statsDisplay').innerHTML = `рЯС• –Я–Њ—Б–µ—Й–µ–љ–Є–є: ${s.visits || 0}`;
            } catch(e) {}
        }
    }

    function renderAllModules(){ renderRecipeModule(); renderHealthModule(); renderWheelModule(); renderSettingsModule(); }
    
    function switchModule(moduleId) {
        document.querySelectorAll('.module').forEach(mod=>mod.classList.remove('active-module'));
        document.getElementById(`module${moduleId.charAt(0).toUpperCase()+moduleId.slice(1)}`).classList.add('active-module');
        document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active'));
        let activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(btn=>btn.dataset.module===moduleId);
        if(activeBtn) activeBtn.classList.add('active');
        setBackgroundTheme(moduleId);
        if(moduleId === 'wheel' && wheelCanvas) drawWheelFull();
        haptic();
    }
    
    document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>switchModule(btn.dataset.module)));
    
    if('serviceWorker' in navigator) { 
        const swBlob = new Blob([`self.addEventListener('fetch', e=>e.respondWith(fetch(e.request).catch(()=>new Response("AXIS offline",{status:200}))))`], {type:'application/javascript'}); 
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)); 
    }
    
    setBackgroundTheme('recipe');
    renderAllModules(); 
    switchModule('recipe');
</script>
