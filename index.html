        else helpText = "⚙️ НАСТРОЙКИ: смена языка, установка PWA на домашний экран, автономная работа.";
        const modalDiv = document.createElement('div'); modalDiv.className = 'modal-help';
        modalDiv.innerHTML = `<div class="modal-content glass-card"><h3>❓ ${t('whatIs')}</h3><p style="margin: 12px 0;">${helpText}</p><button id="closeHelpBtn" class="primary" style="width:100%">${t('close')}</button></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('closeHelpBtn')?.addEventListener('click',()=>{ modalDiv.remove(); haptic(); });
        haptic();
    }

    let recognition = null;
    if('webkitSpeechRecognition' in window) { const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition; recognition = new SpeechRecognition(); recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ru-RU'; }
    
    function startVoiceAdd() {
        if(!recognition) { alert("Голосовое распознавание не поддерживается"); return; }
        haptic();
        recognition.start();
        let statusSpan = document.getElementById('voiceStatusSpan');
        if(statusSpan) statusSpan.innerText = "🎙️ Слушаю, называйте продукты...";
        recognition.onresult = (event) => {
            let final = "";
            for(let i=0; i<event.results.length; i++) final += event.results[i][0].transcript;
            if(statusSpan) statusSpan.innerText = `📝 ${final.slice(0,50)}`;
            if(event.results[event.results.length-1].isFinal) {
                let words = final.toLowerCase().split(/[ ,;]+/).filter(w => w.length>1 && !userIngredients.includes(w));
                if(words.length) { userIngredients.push(...words); saveAll(); }
                if(confirm(`Добавлены: ${words.join(', ') || 'ничего'}. Продолжить?`)) { recognition.stop(); renderRecipeModule(); }
                else { recognition.start(); }
            }
        };
        recognition.onend = () => { if(statusSpan) statusSpan.innerText = ""; renderRecipeModule(); };
    }
    
    function addManualProduct() { let inp = document.getElementById('manualProd'); if(inp.value.trim()) { userIngredients.push(inp.value.trim().toLowerCase()); saveAll(); inp.value=""; renderRecipeModule(); haptic(); } }
    function removeIng(idx) { userIngredients.splice(idx,1); saveAll(); renderRecipeModule(); haptic(); }

    function showStepByStep(recipe) {
        let stepIndex = 0, timerInt = null;
        const modalDiv = document.createElement('div'); modalDiv.className='modal-help';
        modalDiv.innerHTML = `<div class="modal-content glass-card" style="max-width:320px;"><h3>${recipe.name}</h3><div id="stepText" style="margin:12px 0;">${recipe.steps[0]}</div><div id="timerDisplay">⏲️ 00:00</div><div class="flex-between" style="margin-top:14px;"><button id="nextStepBtn">➡️ Следующий шаг</button><button id="startTimerBtn">⏵ ${t('startTimer')}</button><button id="closeStepModal">✖ Закрыть</button></div></div>`;
        document.body.appendChild(modalDiv);
        function updateStep() { document.getElementById('stepText').innerText = recipe.steps[stepIndex] || "✅ Готово!"; if(timerInt) clearInterval(timerInt); document.getElementById('timerDisplay').innerText = "⏲️ 00:00"; }
        document.getElementById('nextStepBtn')?.addEventListener('click',()=>{ if(stepIndex+1<recipe.steps.length) stepIndex++; updateStep(); haptic(); });
        document.getElementById('startTimerBtn')?.addEventListener('click',()=>{ haptic(); let mins=recipe.time, secs=0; if(timerInt) clearInterval(timerInt); timerInt = setInterval(()=>{ if(mins===0 && secs===0){ clearInterval(timerInt); document.getElementById('timerDisplay').innerText='✅ Время вышло!'; haptic();} else { if(secs===0){mins--; secs=59;}else secs--; document.getElementById('timerDisplay').innerHTML = `⏲️ ${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`; } },1000); });
        document.getElementById('closeStepModal')?.addEventListener('click',()=>{ if(timerInt)clearInterval(timerInt); modalDiv.remove(); });
        updateStep();
    }

    function renderRecipeModule() {
        let ingHtml = userIngredients.map((ing,i)=>`<span class="ingredient-tag">${ing} <button style="background:transparent; border:none; color:#ffaaa5;" data-rmidx="${i}">✖</button></span>`).join('');
        
        const exactMatches = [];
        const suggestions = [];
        
        for (let rec of fullRecipesDB) {
            const hasAllIngredients = rec.ings.every(need => userIngredients.includes(need));
            
            if (hasAllIngredients) {
                exactMatches.push(rec);
            } else {
                const hasAnyIngredient = rec.ings.some(need => userIngredients.includes(need));
                if (hasAnyIngredient && userIngredients.length > 0) {
                    const missingIngredients = rec.ings.filter(need => !userIngredients.includes(need));
                    suggestions.push({ ...rec, missing: missingIngredients });
                }
            }
        }
        
        let exactHtml = '';
        if (exactMatches.length > 0) {
            exactHtml = `<h3 style="margin-top: 15px;">${t('exactMatches')} (${exactMatches.length})</h3>` +
                exactMatches.map(rec => `<div class="recipe-card"><div class="flex-between"><strong>🍳 ${rec.name}</strong><span class="badge">⏱️ ${rec.time} ${t('timerMin')}</span></div><div style="font-size:0.75rem; margin:8px 0">📌 ${rec.ings.join(', ')}</div><div class="flex-between"><button class="stepsModalBtn" data-recipe='${JSON.stringify(rec)}'>🍳 ${t('stepByStep')}</button><span style="font-size:11px;">✨ ${rec.tip}</span></div></div>`).join('');
        }
        
        let suggestionsHtml = '';
        if (suggestions.length > 0) {
            suggestionsHtml = `<h3 style="margin-top: 15px;">${t('suggestions')} (${suggestions.length})</h3>` +
                suggestions.map(rec => `<div class="suggestion-card"><div class="flex-between"><strong>🍳 ${rec.name}</strong><span class="badge">⏱️ ${rec.time} ${t('timerMin')}</span></div><div style="font-size:0.75rem; margin:8px 0">📌 ${rec.ings.join(', ')}</div><div><span class="missing-badge">⚠️ ${t('missing')} ${rec.missing.join(', ')}</span></div><div class="flex-between" style="margin-top: 8px;"><button class="stepsModalBtn" data-recipe='${JSON.stringify(rec)}'>🍳 ${t('stepByStep')}</button><span style="font-size:11px;">✨ ${rec.tip}</span></div></div>`).join('');
        }
        
        let noRecipesHtml = '';
        if (exactMatches.length === 0 && suggestions.length === 0 && userIngredients.length === 0) {
            noRecipesHtml = `<div class="glass-card" style="padding:1rem">✨ Добавьте продукты голосом или вручную ✨</div>`;
        } else if (exactMatches.length === 0 && suggestions.length === 0 && userIngredients.length > 0) {
            noRecipesHtml = `<div class="glass-card" style="padding:1rem">😕 Нет рецептов, совместимых с вашими продуктами</div>`;
        }

        const container = document.getElementById('moduleRecipe');
        container.innerHTML = `
            <div class="glass-card" style="padding:1.2rem">
                <h2>${t('recipeTitle')} <button class="info-btn" id="helpRecipeBtn">❔</button></h2>
                <div class="voice-row"><input id="manualProd" placeholder="🍅 Добавить продукт" style="flex:1"><button class="primary" id="manualAddProdBtn">${t('manualAdd')}</button></div>
                <div class="voice-row"><button id="voiceAddBtn" class="voice-btn">${t('voiceInput')}</button><span id="voiceStatusSpan" style="font-size:12px;"></span></div>
                <div style="margin:12px 0; display:flex; flex-wrap:wrap; gap:8px;">${ingHtml || '<i>Список пуст</i>'}</div>
                ${userIngredients.length ? `<button id="clearAllIngs" style="background:#4a3a44;">Очистить всё</button>` : ''}
            </div>
            ${noRecipesHtml}
            ${exactHtml}
            ${suggestionsHtml}
        `;
        
        document.getElementById('manualAddProdBtn')?.addEventListener('click', addManualProduct);
        document.getElementById('voiceAddBtn')?.addEventListener('click', startVoiceAdd);
        document.getElementById('clearAllIngs')?.addEventListener('click', ()=>{ userIngredients=[]; saveAll(); renderRecipeModule(); haptic(); });
        document.getElementById('helpRecipeBtn')?.addEventListener('click', ()=>showHelpModal('recipe'));
        document.querySelectorAll('[data-rmidx]').forEach(btn=>btn.addEventListener('click',(e)=>{ let idx = parseInt(btn.dataset.rmidx); removeIng(idx); }));
        document.querySelectorAll('.stepsModalBtn').forEach(btn=>btn.addEventListener('click',(e)=>{ let rec = JSON.parse(btn.dataset.recipe); showStepByStep(rec); haptic(); }));
    }

    function renderHealthModule() {
        let medsHtml = medications.map((m,idx)=>`<div class="med-item"><div class="flex-between"><strong>💊 ${m.name}</strong><span>${m.dosage} | ${m.freq}x</span></div><div class="stock-bar"><div class="stock-fill ${m.stock<=3?'low':''}" style="width:${Math.min(100,(m.stock/30)*100)}%"></div></div><div>📦 ${t('stockLeft')}: ${m.stock} ${t('doses')}</div><div class="flex-between mt-2"><button class="takeMed" data-idx="${idx}">✅ ${t('takeDose')}</button><button class="delMed" data-idx="${idx}">🗑️</button></div></div>`).join('');
        document.getElementById('moduleHealth').innerHTML = `<div class="glass-card" style="padding:1.4rem"><h2>${t('healthTitle')}<button class="info-btn" id="helpHealthBtn">❔</button></h2><input id="medNameIn" placeholder="${t('name')}"><input id="medDoseIn" placeholder="${t('dosage')}" class="mt-2"><input id="medFreqIn" type="number" placeholder="${t('freq')}" value="1" class="mt-2"><button id="addMedFinal" class="primary mt-2">➕ ${t('addBtn')}</button><div id="medListBlock" style="margin-top:18px;">${medsHtml || '<div>Нет лекарств</div>'}</div></div>`;
        document.getElementById('addMedFinal')?.addEventListener('click',()=>{ let name=document.getElementById('medNameIn').value.trim(); let dose=document.getElementById('medDoseIn').value.trim(); let freq=parseInt(document.getElementById('medFreqIn').value)||1; if(name && dose){ medications.push({name, dosage:dose, freq, stock:30, initialStock:30}); saveAll(); renderHealthModule(); haptic(); } });
        document.getElementById('helpHealthBtn')?.addEventListener('click',()=>showHelpModal('health'));
        document.querySelectorAll('.takeMed').forEach(btn=>btn.addEventListener('click',(e)=>{ let i=btn.dataset.idx; if(medications[i] && medications[i].stock>0){ medications[i].stock--; saveAll(); renderHealthModule(); haptic(); } }));
        document.querySelectorAll('.delMed').forEach(btn=>btn.addEventListener('click',(e)=>{ let i=btn.dataset.idx; medications.splice(i,1); saveAll(); renderHealthModule(); haptic(); }));
    }

    function drawWheelFull() { 
        if(!wheelCanvas||!wheelCtx||wheelOptions.length===0) return; 
        let angStep=Math.PI*2/wheelOptions.length; 
        wheelCtx.clearRect(0,0,wheelCanvas.width,wheelCanvas.height); 
        for(let i=0;i<wheelOptions.length;i++){ 
            let start=wheelAngle+i*angStep,end=start+angStep; 
            wheelCtx.beginPath(); 
            wheelCtx.arc(wheelCanvas.width/2,wheelCanvas.height/2,wheelCanvas.width/2,start,end); 
            wheelCtx.lineTo(wheelCanvas.width/2,wheelCanvas.height/2); 
            wheelCtx.fillStyle=`hsl(${(i*360/wheelOptions.length)+200},70%,55%)`; 
            wheelCtx.fill(); 
            wheelCtx.save(); 
            wheelCtx.translate(wheelCanvas.width/2,wheelCanvas.height/2); 
            wheelCtx.rotate(start+angStep/2); 
            wheelCtx.fillStyle="white"; 
            wheelCtx.font="bold 14px system-ui"; 
            wheelCtx.fillText(wheelOptions[i], wheelCanvas.width/3.2, 8); 
            wheelCtx.restore(); 
        } 
        wheelCtx.beginPath(); 
        wheelCtx.arc(wheelCanvas.width/2,wheelCanvas.height/2,14,0,2*Math.PI); 
        wheelCtx.fillStyle="#151e2c"; 
        wheelCtx.fill(); 
        wheelCtx.beginPath(); 
        wheelCtx.moveTo(wheelCanvas.width-12,wheelCanvas.height/2); 
        wheelCtx.lineTo(wheelCanvas.width,wheelCanvas.height/2-12); 
        wheelCtx.lineTo(wheelCanvas.width,wheelCanvas.height/2+12); 
        wheelCtx.fillStyle="gold"; 
        wheelCtx.fill(); 
    }
    
    function triggerConfettiCanvas(){
        let canv=document.createElement('canvas');
        canv.style.position='fixed'; canv.style.top=0; canv.style.left=0; canv.style.width='100%'; canv.style.height='100%'; canv.style.pointerEvents='none'; canv.style.zIndex=2100;
        document.body.appendChild(canv);
        let ctxConf=canv.getContext('2d');
        let ww=window.innerWidth,wh=window.innerHeight;
        canv.width=ww; canv.height=wh;
        let particles=[];
        for(let i=0;i<110;i++) particles.push({x:Math.random()*ww,y:Math.random()*wh-80,size:4+Math.random()*7,spdY:2+Math.random()*8,color:`hsl(${Math.random()*360},75%,65%)`});
        function animateConfetti(){ 
            ctxConf.clearRect(0,0,ww,wh); 
            let alive=false; 
            for(let p of particles){ p.y+=p.spdY; if(p.y<wh+60)alive=true; ctxConf.fillStyle=p.color; ctxConf.fillRect(p.x,p.y,p.size,p.size); } 
            if(alive) requestAnimationFrame(animateConfetti); else canv.remove(); 
        }
        animateConfetti();
        setTimeout(()=>{ if(canv.parentNode)canv.remove(); },2000);
    }
    
    function spinWheelNow(){ 
        if(spinning || wheelOptions.length===0) return; 
        haptic(); 
        velocity=20+Math.random()*12; 
        spinning=true; 
        function animateSpin(){ 
            if(!spinning) return; 
            velocity*=0.984; 
            wheelAngle+=velocity; 
            drawWheelFull(); 
            if(Math.abs(velocity)<=0.008){ 
                spinning=false; 
                cancelAnimationFrame(animFrame); 
                let total=wheelOptions.length; 
                let angleRemainder=(wheelAngle%(Math.PI*2)+2*Math.PI)%(Math.PI*2); 
                let slice=Math.PI*2/total; 
                let index=Math.floor(((Math.PI*2-angleRemainder)%(Math.PI*2))/slice)%total; 
                let winner=wheelOptions[index]; 
                triggerConfettiCanvas(); 
                alert(`🎉 ${t('winner')}: ${winner} 🎉`); 
                haptic(); 
                return; 
            } 
            animFrame=requestAnimationFrame(animateSpin); 
        } 
        animateSpin(); 
    }
    
    function renderWheelModule(){
        let optionsHtml = wheelOptions.map((opt,i)=>`<div class="flex-between" style="margin:8px 0;"><span>🔸 ${opt}</span><button class="delWheelOpt" data-idx="${i}">❌</button></div>`).join('');
        document.getElementById('moduleWheel').innerHTML = `<div class="glass-card" style="padding:1.5rem;"><h2>${t('wheelTitle')}<button class="info-btn" id="helpWheelBtn">❔</button></h2><canvas id="wheelCanvasMain" class="wheel-canvas" width="300" height="300" style="width:100%;max-width:280px;aspect-ratio:1;display:block;margin:0 auto;"></canvas><button id="spinFinalBtn" class="primary" style="margin:16px auto;">🎡 ${t('spin')}</button><div class="flex-between"><input id="newWheelOpt" placeholder="Новый вариант" style="flex:1"><button id="addWheelOptBtn">➕</button></div><div id="wheelOptionsDiv">${optionsHtml}</div></div>`;
        wheelCanvas = document.getElementById('wheelCanvasMain'); 
        if(wheelCanvas){ wheelCtx=wheelCanvas.getContext('2d'); drawWheelFull(); }
        document.getElementById('spinFinalBtn')?.addEventListener('click', spinWheelNow);
        document.getElementById('addWheelOptBtn')?.addEventListener('click',()=>{ let val=document.getElementById('newWheelOpt')?.value.trim(); if(val){ wheelOptions.push(val); saveAll(); renderWheelModule(); haptic(); } });
        document.getElementById('helpWheelBtn')?.addEventListener('click',()=>showHelpModal('wheel'));
        document.querySelectorAll('.delWheelOpt').forEach(btn=>btn.addEventListener('click',(e)=>{ let idx=btn.dataset.idx; wheelOptions.splice(idx,1); saveAll(); renderWheelModule(); haptic(); }));
    }

    function renderSettingsModule() {
        document.getElementById('moduleSettings').innerHTML = `<div class="glass-card" style="padding:1.5rem;"><h2>${t('settingsTitle')}<button class="info-btn" id="helpSettingsBtn">❔</button></h2><div class="flex-between"><span>🌐 ${t('langLabel')}</span><div><button class="langSet" data-lang="ru">Рус</button><button class="langSet" data-lang="uk">Укр</button><button class="langSet" data-lang="en">Eng</button></div></div><hr/><button id="installPwaBtnFinal" class="primary">📲 ${t('install')}</button><div class="stat-badge" id="statsDisplay"></div><footer style="margin-top:1rem; font-size:10px;">AXIS · v5.0 · офлайн ассистент · Более 300 рецептов</footer></div>`;
        document.querySelectorAll('.langSet').forEach(btn=>btn.addEventListener('click',(e)=>{ currentLang=btn.dataset.lang; saveAll(); renderAllModules(); haptic(); }));
        document.getElementById('helpSettingsBtn')?.addEventListener('click',()=>showHelpModal('settings'));
        let deferredPrompt = null; 
        window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; });
        document.getElementById('installPwaBtnFinal')?.addEventListener('click',()=>{ if(deferredPrompt){ deferredPrompt.prompt(); } else alert("PWA уже установлен"); });
        let stats = localStorage.getItem('axis_stats');
        if(stats) {
            try {
                let s = JSON.parse(stats);
                document.getElementById('statsDisplay').innerHTML = `👥 Посещений: ${s.visits || 0}`;
            } catch(e) {}
        }
    }

    function renderAllModules(){ renderRecipeModule(); renderHealthModule(); renderWheelModule(); renderSettingsModule(); }
    
    function switchModule(moduleId) {
        document.querySelectorAll('.module').forEach(mod=>mod.classList.remove('active-module'));
        document.getElementById(`module${moduleId.charAt(0).toUpperCase()+moduleId.slice(1)}`).classList.add('active-module');
        document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active'));
        let activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(btn=>btn.dataset.module===moduleId);
        if(activeBtn) activeBtn.classList.add('active');
        setBackgroundTheme(moduleId);
        if(moduleId === 'wheel' && wheelCanvas) drawWheelFull();
        haptic();
    }
    
    document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{
        const moduleName = btn.dataset.module;
        switchModule(moduleName);
    }));
    
    if('serviceWorker' in navigator) { 
        const swBlob = new Blob([`self.addEventListener('fetch', e=>e.respondWith(fetch(e.request).catch(()=>new Response("AXIS offline",{status:200}))))`], {type:'application/javascript'}); 
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)); 
    }
    
    setBackgroundTheme('recipe');
    renderAllModules(); 
    switchModule('recipe');
</script>
</body>
