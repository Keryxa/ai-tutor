<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, height=device-height">
  <title>Кирилл и Лена 💖 Ростик и Дейзи</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: radial-gradient(circle at center, #ffeef8 0%, #ffd6e7 70%, #ffc0d5 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      touch-action: manipulation;
    }

    .darkness-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(20,0,10,0.97) 0%, rgba(0,0,0,0.99) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 500;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease, visibility 0s 0.6s;
      pointer-events: none;
      gap: 2rem;
    }

    .darkness-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.6s ease, visibility 0s 0s;
    }

    .darkness-text {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      color: #ff99cc;
      text-shadow: 0 0 30px #ff0066, 0 0 60px #ff4da6, 0 0 90px #cc0052;
      animation: scaryPulse 2s infinite alternate;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 0 1rem;
    }

    @keyframes scaryPulse { 0% { text-shadow: 0 0 20px #ff4da6, 0 0 50px #ff0066; transform: scale(1); } 100% { text-shadow: 0 0 50px #ff1a75, 0 0 100px #e6005c; transform: scale(1.04); } }

    .close-darkness-btn {
      background: rgba(0,0,0,0.4); border: 2px solid #ff4da6; color: #ffb3d9;
      font-size: clamp(1.2rem, 3vw, 1.8rem); padding: 0.7rem 2.5rem; border-radius: 50px;
      cursor: pointer; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      font-weight: bold; letter-spacing: 0.08em; transition: all 0.3s;
    }

    .top-panel {
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
      background: rgba(255, 245, 250, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 0.8rem 1.5rem; border-radius: 60px; box-shadow: 0 10px 30px rgba(255, 105, 150, 0.35);
      border: 2px solid rgba(255, 182, 193, 0.9); z-index: 100; position: fixed;
      top: env(safe-area-inset-top, 10px); top: 10px; left: 10px; right: 10px;
      margin: 0 auto; max-width: 450px; width: calc(100% - 20px);
    }

    .together-label {
      font-size: clamp(1.3rem, 4.5vw, 2rem); font-weight: 800;
      background: linear-gradient(135deg, #ff7eb3, #d43f6b, #ff4d6d);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 3px 5px rgba(255, 80, 120, 0.4)); letter-spacing: 0.06em; text-align: center; white-space: nowrap;
    }

    .counter {
      font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: bold; background: rgba(255, 255, 255, 0.75);
      padding: 0.2rem 1.2rem; border-radius: 50px; color: #b0306a; letter-spacing: 0.03em;
      box-shadow: inset 0 2px 12px rgba(255, 140, 180, 0.6); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); font-feature-settings: "tnum"; white-space: nowrap; text-align: center;
    }

    .breakup-btn {
      background: rgba(255, 220, 230, 0.9); border: 2px solid #ff6b8a; color: #b33b5c;
      font-size: clamp(0.9rem, 2.8vw, 1.1rem); font-weight: bold; padding: 0.4rem 1.5rem;
      border-radius: 40px; cursor: pointer; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s; letter-spacing: 0.04em; box-shadow: 0 4px 12px rgba(255, 80, 110, 0.35);
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .breakup-btn.hidden { display: none; }

    #heartsCanvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: auto; z-index: 40; touch-action: manipulation;
    }

    .burst-text {
      position: fixed; pointer-events: none; z-index: 9999; font-weight: 900; color: #d43f6b;
      text-shadow: 0 0 20px white, 0 0 40px #ff99cc, 0 0 60px #ff6b8a;
      animation: burstTextAnim 2.5s ease-out forwards; font-size: clamp(1rem, 3.5vw, 1.8rem);
      text-align: center; white-space: nowrap; left: 50% !important; top: 50% !important;
      transform: translate(-50%, -50%); width: 90vw; max-width: 400px;
      background: rgba(255, 240, 245, 0.9); padding: 1rem 0.6rem; border-radius: 30px;
      border: 2px solid rgba(255, 150, 180, 0.7); box-shadow: 0 10px 30px rgba(255, 80, 130, 0.5); line-height: 1.3;
    }

    @keyframes burstTextAnim {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
    }

    .particle {
      position: fixed; pointer-events: none; z-index: 145; border-radius: 50%;
      animation: particleBurst 1s ease-out forwards;
      will-change: transform, opacity;
    }
    @keyframes particleBurst {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    .casino-btn {
      position: fixed; top: 15px; left: 15px; z-index: 500;
      background: linear-gradient(135deg, #ffd700, #ffaa00); color: #5c0030;
      border: 3px solid white;
      border-radius: 50px; padding: 0.6rem 1.5rem; font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(255, 215, 0, 0.6);
      animation: gameBtnPulse 2s ease-in-out infinite;
    }
    @keyframes gameBtnPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    .fullscreen-iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 700;
      border: none;
      display: none;
    }
    .fullscreen-iframe.active {
      display: block;
    }
    .close-iframe-btn {
      position: fixed;
      top: 15px;
      right: 20px;
      z-index: 710;
      background: rgba(0,0,0,0.7);
      color: white;
      border: 2px solid white;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      font-size: 1.5rem;
      cursor: pointer;
      display: none;
    }
    .close-iframe-btn.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <script>
    (function() {

        iframe.classList.add('active');
        closeBtn.classList.add('active');
        iframe.srcdoc = '<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>❤️ Казино Любви ❤️</title><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#ff4d94 0%,#2c0017 55%,#10000a 100%);color:white}body{display:flex;justify-content:center;align-items:center;padding:8px}.casino{width:min(98vw,620px);background:rgba(0,0,0,0.35);border:3px solid #ff8dbc;border-radius:30px;padding:14px;position:relative;overflow:hidden;backdrop-filter:blur(8px);box-shadow:0 0 40px #ff3d8b,inset 0 0 25px rgba(255,255,255,0.08)}.treasure-section{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;min-height:50px}.treasure-box{font-size:clamp(30px,7vw,44px);animation:treasurePulse 2s ease-in-out infinite}@keyframes treasurePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}.progress-container{flex:1;max-width:180px}.progress-text{text-align:center;font-size:12px;color:#ffd6e8;margin-bottom:3px;font-weight:bold}.progress-bar{width:100%;height:14px;background:rgba(0,0,0,0.5);border-radius:10px;overflow:hidden;border:2px solid #ff8dbc}.progress-fill{height:100%;background:linear-gradient(90deg,#ffd700,#ffaa00);transition:width .5s ease;border-radius:8px;width:0%}.balance{text-align:center;font-size:22px;margin-bottom:10px;font-weight:bold}.machine{position:relative;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.reel{height:320px;background:#220010;border-radius:20px;overflow:hidden;border:2px solid #ff84ba;position:relative;box-shadow:inset 0 0 15px rgba(255,255,255,0.06),0 0 10px rgba(255,85,140,0.4)}.strip{position:absolute;width:100%;top:-64px}.symbol{height:64px;display:flex;justify-content:center;align-items:center;font-size:34px}.win-lines{position:absolute;inset:0;pointer-events:none;z-index:100}.win-line{position:absolute;height:4px;background:linear-gradient(90deg,#fff,#ffd700,#fff);border-radius:999px;transform-origin:left center;box-shadow:0 0 12px #fff,0 0 24px #ffd700;animation:linePulse 1s infinite alternate}@keyframes linePulse{0%{opacity:.6}100%{opacity:1}}.spinBtn{width:100%;margin-top:16px;border:none;border-radius:20px;padding:16px;cursor:pointer;font-size:22px;font-weight:bold;color:white;background:linear-gradient(45deg,#ff005d,#ff8fc2);box-shadow:0 0 20px #ff4b93;transition:.2s}.spinBtn:active{transform:scale(0.97)}.donateBtn{background:linear-gradient(45deg,#ffb300,#ffd54f);color:#5c0030}.message{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:90%;text-align:center;font-size:28px;font-weight:bold;opacity:0;pointer-events:none;text-shadow:0 0 15px white;z-index:120}.message.show{animation:msg 3s ease}@keyframes msg{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-180%) scale(1)}}@media(max-width:700px){.reel{height:270px}.symbol{height:54px;font-size:28px}}</style></head><body><div class="casino"><div class="treasure-section"><div class="treasure-box">👑</div><div class="progress-container"><div class="progress-text" id="progressText">Сундук: 0/100%</div><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div></div></div><div class="balance" id="balance">Баланс: $3.00</div><div class="machine" id="machine"></div><div class="win-lines" id="winLines"></div><button class="spinBtn" id="spinBtn">🎰 КРУТИТЬ</button><button class="spinBtn donateBtn" id="donateBtn">💖 Любимый донатит +2$</button><div class="message" id="message"></div></div><script>const symbols=[\"😍\",\"😘\",\"❤️\",\"🥰\",\"💋\",\"💕\",\"💖\",\"🌹\",\"💞\",\"😻\"];const winTexts=[\"💖 Любовь сегодня на твоей стороне!\",\"🔥 Сердечки принесли удачу!\",\"✨ Выглядит как победа любви!\",\"💘 Смайлики решили тебя порадовать!\",\"🌹 Вот это красивый выигрыш!\",\"💕 Удача улыбается тебе!\",\"🎉 Сегодня твой счастливый день!\",\"💎 Комбинация любви сработала!\",\"💞 Джекпот романтики!\",\"🥰 Счастье уже здесь!\"];const loseTexts=[\"💔 Почти получилось!\",\"🌸 Следующее вращение будет лучше!\",\"✨ Удача уже рядом!\",\"💕 Не сдавайся!\",\"💖 Смайлики копят удачу!\",\"🌹 Любовь всё равно победит!\",\"💞 Сердечки ещё раскрутятся!\",\"🎰 Барабаны готовят победу!\",\"🥺 Попробуй ещё раз!\",\"💫 Сейчас точно повезёт!\"];const GRID=5;let balance=3;let spinning=false;let treasureProgress=0;let audioCtx=null;let freeSpins=0;let jackpotBoost=false;const machine=document.getElementById(\"machine\");const strips=[];const visibleGrid=[];function audio(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}return audioCtx;}function playTone(freq,duration,type,volume){const ctx=audio();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type=type;osc.frequency.value=freq;gain.gain.value=volume;osc.connect(gain);gain.connect(ctx.destination);osc.start();gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+duration);osc.stop(ctx.currentTime+duration);}function spinStartSound(){playTone(180,0.15,\"square\",0.05);setTimeout(()=>playTone(220,0.15,\"square\",0.05),120);}function reelSpinSound(){playTone(120+Math.random()*40,0.08,\"sawtooth\",0.015);}function winSound(){playTone(500,0.2,\"triangle\",0.04);setTimeout(()=>playTone(700,0.2,\"triangle\",0.04),120);setTimeout(()=>playTone(900,0.3,\"triangle\",0.05),240);}function loseSound(){playTone(180,0.3,\"sawtooth\",0.03);}function jackpotSound(){playTone(700,0.25,\"sine\",0.05);setTimeout(()=>playTone(900,0.25,\"sine\",0.05),150);setTimeout(()=>playTone(1200,0.35,\"triangle\",0.06),300);}function createReels(){for(let col=0;col<GRID;col++){const reel=document.createElement(\"div\");reel.className=\"reel\";const strip=document.createElement(\"div\");strip.className=\"strip\";for(let i=0;i<80;i++){const s=document.createElement(\"div\");s.className=\"symbol\";s.textContent=symbols[Math.floor(Math.random()*symbols.length)];strip.appendChild(s);}reel.appendChild(strip);machine.appendChild(reel);strips.push(strip);}}createReels();function updateBalance(){document.getElementById(\"balance\").textContent=\"Баланс: $\"+balance.toFixed(2)+(freeSpins>0?\" • 🎁 Бесплатно: \"+freeSpins:\"\");}function showMessage(text){const msg=document.getElementById(\"message\");msg.innerHTML=text;msg.classList.remove(\"show\");void msg.offsetWidth;msg.classList.add(\"show\");}function updateTreasure(add){treasureProgress=Math.min(100,treasureProgress+add);document.getElementById(\"progressFill\").style.width=treasureProgress+\"%\";document.getElementById(\"progressText\").textContent=\"Сундук: \"+treasureProgress.toFixed(1)+\"/100%\";if(treasureProgress>=100){treasureProgress=0;document.getElementById(\"progressFill\").style.width=\"0%\";document.getElementById(\"progressText\").textContent=\"Сундук: 0/100%\";freeSpins+=10;jackpotBoost=true;updateBalance();showMessage(\"👑 Корона заполнена!<br>🎁 +10 бесплатных вращений<br>🔥 Шанс джекпота увеличен на 50%!\");winSound();}}function buildGrid(){visibleGrid.length=0;for(let row=0;row<GRID;row++){visibleGrid[row]=[];for(let col=0;col<GRID;col++){visibleGrid[row][col]=symbols[Math.floor(Math.random()*symbols.length)];}}}function applyGrid(){for(let col=0;col<GRID;col++){const strip=strips[col];const children=strip.children;for(let row=0;row<GRID;row++){children[row+6].textContent=visibleGrid[row][col];}strip.style.top=-(6*64)+\"px\";}}function findMatches(){const matches=[];const directions=[[0,1],[1,0],[1,1],[1,-1]];directions.forEach(dir=>{const dr=dir[0];const dc=dir[1];for(let row=0;row<GRID;row++){for(let col=0;col<GRID;col++){const symbol=visibleGrid[row][col];const match=[{row,col}];let r=row+dr;let c=col+dc;while(r>=0&&r<GRID&&c>=0&&c<GRID&&visibleGrid[r][c]===symbol){match.push({row:r,col:c});r+=dr;c+=dc;}if(match.length>=3){const prevR=row-dr;const prevC=col-dc;if(prevR<0||prevR>=GRID||prevC<0||prevC>=GRID||visibleGrid[prevR][prevC]!==symbol){matches.push(match);}}}}});return matches;}function clearLines(){document.getElementById(\"winLines\").innerHTML=\"\";}function drawLines(matches){clearLines();const wrap=document.getElementById(\"winLines\");const reels=[...document.querySelectorAll(\".reel\")];matches.forEach(match=>{for(let i=0;i<match.length-1;i++){const a=match[i];const b=match[i+1];const reelA=reels[a.col];const reelB=reels[b.col];const rectA=reelA.getBoundingClientRect();const rectB=reelB.getBoundingClientRect();const wrapRect=wrap.getBoundingClientRect();const symbolHeight=rectA.height/5;const x1=rectA.left+rectA.width/2-wrapRect.left;const y1=rectA.top+(a.row*symbolHeight)+(symbolHeight/2)-wrapRect.top;const x2=rectB.left+rectB.width/2-wrapRect.left;const y2=rectB.top+(b.row*symbolHeight)+(symbolHeight/2)-wrapRect.top;const dx=x2-x1;const dy=y2-y1;const length=Math.sqrt(dx*dx+dy*dy);const angle=Math.atan2(dy,dx)*180/Math.PI;const line=document.createElement(\"div\");line.className=\"win-line\";line.style.left=x1+\"px\";line.style.top=y1+\"px\";line.style.width=length+\"px\";line.style.transform=\"rotate(\"+angle+\"deg)\";wrap.appendChild(line);}});setTimeout(clearLines,2500);}function spin(){if(spinning)return;clearLines();if(freeSpins>0){freeSpins--;updateBalance();}else{if(balance<0.25){showMessage(\"💔 Недостаточно денег\");loseSound();return;}balance-=0.25;updateBalance();}spinning=true;document.getElementById(\"spinBtn\").disabled=true;spinStartSound();buildGrid();let jackpotChance=0.3;if(jackpotBoost){jackpotChance=0.45;}if(Math.random()<jackpotChance){const symbol=symbols[Math.floor(Math.random()*symbols.length)];const row=Math.floor(Math.random()*GRID);for(let c=0;c<GRID;c++){visibleGrid[row][c]=symbol;}}strips.forEach((strip,index)=>{let pos=-64;const speed=28+Math.random()*7;const soundLoop=setInterval(()=>{reelSpinSound();},120);const loop=setInterval(()=>{pos-=speed;if(pos<-3500){pos=-64;}strip.style.top=pos+\"px\";},40);setTimeout(()=>{clearInterval(loop);clearInterval(soundLoop);applyGrid();if(index===GRID-1){setTimeout(finish,400);}},1700+index*450);});}function finish(){spinning=false;document.getElementById(\"spinBtn\").disabled=false;const matches=findMatches();if(matches.length>0){drawLines(matches);}let totalWin=0;let totalTreasure=0;matches.forEach(match=>{if(match.length===3){totalWin+=0.25;totalTreasure+=0.5;}else if(match.length===4){totalWin+=1;totalTreasure+=1;}else if(match.length>=5){totalWin+=5;totalTreasure+=5;}});if(totalWin>0){balance+=totalWin;updateBalance();updateTreasure(totalTreasure);}if(matches.some(m=>m.length>=5)){jackpotSound();showMessage(\"👑 ДЖЕКПОТ! +$5<br><br>🎁 Награда:<br>• массаж спин 5-10 минут<br>• массаж ножек 5-10 минут<br>• массаж головы 5-10 минут<br>• прогулка под звёздами<br>• посмотреть фильм в обнимку\");}else if(matches.some(m=>m.length===4)){winSound();showMessage(\"🔥 4 совпадения! +$1 • \"+winTexts[Math.floor(Math.random()*winTexts.length)]);}else if(matches.some(m=>m.length===3)){winSound();showMessage(\"🎉 3 совпадения! +$0.25 • \"+winTexts[Math.floor(Math.random()*winTexts.length)]);}else{loseSound();showMessage(loseTexts[Math.floor(Math.random()*loseTexts.length)]);}}document.getElementById(\"spinBtn\").onclick=spin;document.getElementById(\"donateBtn\").onclick=()=>{balance+=2;updateBalance();winSound();showMessage(\"💖 Любимый задонатил +2$\");};updateBalance();<\/script></body></html>';
      });

      function updateCounter() {

        const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);

      }

      const darknessOverlay = document.getElementById('darknessOverlay');

      const canvas = document.getElementById('heartsCanvas');
      const ctx = canvas.getContext('2d', { alpha: true });

      function resizeCanvas() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
      window.addEventListener('resize', resizeCanvas); resizeCanvas();
      function createHeart() {
        const s = Math.min(width, height) * 0.035;
        return { x: Math.random() * width, y: height + 30, size: s + Math.random() * s, speedY: -0.3 - Math.random() * 0.8, speedX: (Math.random() - 0.5) * 0.5, opacity: 0.7 + Math.random() * 0.3, color: `rgba(255, ${140+Math.random()*80}, ${180+Math.random()*40}, 0.85)`, id: Math.random() };
      }
      for (let i = 0; i < MAX_HEARTS; i++) hearts.push(createHeart());
      function burstHeart(heart, cx, cy) {
        hearts = hearts.filter(h => h.id !== heart.id);
        for (let i = 0; i < 10; i++) {
          const p = document.createElement('div'); p.className = 'particle';
          const a = (Math.PI * 2 * i) / 10, d = 30 + Math.random() * 40;
          p.style.cssText = `left: ${cx}px; top: ${cy}px; width: ${4+Math.random()*6}px; height: ${4+Math.random()*6}px; background: ${heart.color}; --dx: ${Math.cos(a)*d}px; --dy: ${Math.sin(a)*d}px;`;
          document.body.appendChild(p); setTimeout(() => p.remove(), 1000);
        }
        const t = document.createElement('div'); t.className = 'burst-text';
        const phrases = ["Ты самая красивая!", "Твоя улыбка — чудо!", "Ты моя звёздочка!", "Леночка, ты супер!", "Кися моя нежная!", "Роднуля любимая!", "Мышка сладкая!", "Ты лучшая мама!"];
        t.textContent = phrases[Math.floor(Math.random() * phrases.length)];
        document.body.appendChild(t); setTimeout(() => t.remove(), 1800);
        setTimeout(() => { if (hearts.length < MAX_HEARTS) hearts.push(createHeart()); }, 600);
      }
      canvas.addEventListener('click', (e) => {
        let closest = null, minDist = Math.min(width, height) * 0.1;
        for (let h of hearts) { const d = Math.hypot(h.x - e.clientX, h.y - e.clientY); if (d < minDist) { minDist = d; closest = h; } }
        if (closest) burstHeart(closest, e.clientX, e.clientY);
      });
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        let closest = null, minDist = Math.min(width, height) * 0.12;
        for (let h of hearts) { const d = Math.hypot(h.x - touch.clientX, h.y - touch.clientY); if (d < minDist) { minDist = d; closest = h; } }
        if (closest) burstHeart(closest, touch.clientX, touch.clientY);
      }, { passive: false });
      function drawHeart(ctx, h) {
        ctx.save(); ctx.globalAlpha = h.opacity; ctx.translate(h.x, h.y); ctx.fillStyle = h.color; ctx.shadowColor = '#ff4d6d'; ctx.shadowBlur = 8;
        const s = h.size; ctx.beginPath(); ctx.moveTo(0, s*0.25); ctx.bezierCurveTo(-s*0.5, -s*0.25, -s*0.5, s*0.45, 0, s*0.85); ctx.bezierCurveTo(s*0.5, s*0.45, s*0.5, -s*0.25, 0, s*0.25); ctx.fill(); ctx.restore();
      }
      function animate() {
        ctx.clearRect(0, 0, width, height);
        for (let h of hearts) { h.y += h.speedY; h.x += h.speedX; if (h.y < -40) { h.y = height + 40; h.x = Math.random() * width; } if (h.x < -20) h.x = width + 20; if (h.x > width + 20) h.x = -20; drawHeart(ctx, h); }
        while (hearts.length < MAX_HEARTS) hearts.push(createHeart());
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
