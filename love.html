<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Эти теги заставляют браузер отображать файл как страницу, а не качать его -->
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .message {
            z-index: 10;
            text-align: center;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.3);
        }
        h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        button {
            margin-top: 20px;
            background: #ff0066;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="message">
        <h1 id="text">Ты — моё самое яркое событие</h1>
        <button onclick="changeText()">Нажми сюда</button>
    </div>

    <script>
        // Анимация 3D-частиц в форме сердца
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = width / 2;
                this.y = height / 2;
                this.size = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                // Формула сердца
                const r = 10;
                this.targetX = width / 2 + r * 16 * Math.pow(Math.sin(angle), 3);
                this.targetY = height / 2 - r * (13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                this.vx = (this.targetX - this.x) / (Math.random() * 50 + 50);
                this.vy = (this.targetY - this.y) / (Math.random() * 50 + 50);
                this.color = `hsl(${Math.random() * 30 + 330}, 100%, 50%)`;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (Math.abs(this.x - this.targetX) < 1) {
                    this.x = this.targetX + (Math.random() - 0.5) * 20;
                    this.y = this.targetY + (Math.random() - 0.5) * 20;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 200; i++) particles.push(new Particle());

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        const phrases = ["Я тебя очень люблю ❤️", "Ты самая лучшая!", "Скучаю по тебе...", "Ты моё счастье", "Целую тебя!"];
        function changeText() {
            document.getElementById('text').innerText = phrases[Math.floor(Math.random() * phrases.length)];
            if (navigator.vibrate) navigator.vibrate(100);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
