<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Кирилл и Лена 💖 Ростик и Дейзи</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: radial-gradient(circle at center, #ffeef8 0%, #ffd6e7 70%, #ffc0d5 100%);
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    /* Затемнение для расставания */
    .darkness-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(20,0,10,0.97) 0%, rgba(0,0,0,0.99) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 500;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease, visibility 0s 0.6s;
      pointer-events: none;
      gap: 2rem;
    }

    .darkness-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.6s ease, visibility 0s 0s;
    }

    .darkness-text {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      color: #ff99cc;
      text-shadow: 0 0 30px #ff0066, 0 0 60px #ff4da6, 0 0 90px #cc0052;
      animation: scaryPulse 2s infinite alternate;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 0 1rem;
    }

    @keyframes scaryPulse {
      0% { text-shadow: 0 0 20px #ff4da6, 0 0 50px #ff0066; transform: scale(1); }
      100% { text-shadow: 0 0 50px #ff1a75, 0 0 100px #e6005c; transform: scale(1.04); }
    }

    .close-darkness-btn {
      background: rgba(0,0,0,0.4);
      border: 2px solid #ff4da6;
      color: #ffb3d9;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      padding: 0.7rem 2.5rem;
      border-radius: 50px;
      cursor: pointer;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      font-weight: bold;
      letter-spacing: 0.08em;
      transition: all 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    .close-darkness-btn:active {
      background: #ff4da6;
      color: black;
      border-color: white;
      box-shadow: 0 0 25px #ff4da6;
    }

    /* Верхняя панель */
    .top-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255, 245, 250, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1rem 1.5rem;
      border-radius: 80px;
      box-shadow: 0 15px 35px rgba(255, 105, 150, 0.3);
      border: 2px solid rgba(255, 182, 193, 0.8);
      z-index: 100;
      position: relative;
      max-width: 95vw;
      margin: 0 1rem;
    }

    .together-label {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #ff7eb3, #d43f6b, #ff4d6d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 3px 5px rgba(255, 80, 120, 0.4));
      letter-spacing: 0.06em;
      text-align: center;
      white-space: nowrap;
    }

    .counter {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: bold;
      background: rgba(255, 255, 255, 0.75);
      padding: 0.2rem 1.5rem;
      border-radius: 50px;
      color: #b0306a;
     letter-spacing: 0.03em;
      box-shadow: inset 0 2px 12px rgba(255, 140, 180, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-feature-settings: "tnum";
      white-space: nowrap;
      text-align: center;
    }

    .breakup-btn {
      background: rgba(255, 220, 230, 0.9);
      border: 2px solid #ff6b8a;
      color: #b33b5c;
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: bold;
      padding: 0.4rem 1.8rem;
      border-radius: 40px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 12px rgba(255, 80, 110, 0.35);
      -webkit-tap-highlight-color: transparent;
    }

    .breakup-btn:active {
      background: #ffb3c6;
      color: white;
      border-color: #ff2d55;
      box-shadow: 0 8px 18px #ff6b8a;
      transform: scale(0.96);
    }

    /* Canvas для сердечек */
    #heartsCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      z-index: 40;
      touch-action: manipulation;
    }

    /* Всплывающая фраза при взрыве сердечка */
    .heart-burst-text {
      position: fixed;
      pointer-events: none;
      z-index: 150;
      font-weight: 900;
      color: #d43f6b;
      text-shadow: 0 0 15px white, 0 0 30px #ff99cc;
      animation: burstTextAnim 2s forwards;
      white-space: nowrap;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      text-align: center;
    }

    @keyframes burstTextAnim {
      0% {
        opacity: 0;
        transform: scale(0.3) translateY(0);
      }
      30% {
        opacity: 1;
        transform: scale(1.1) translateY(-15px);
      }
      70% {
        opacity: 0.9;
        transform: scale(1) translateY(-30px);
      }
      100% {
        opacity: 0;
        transform: scale(0.8) translateY(-60px);
      }
    }

    /* Фото элементы (появляются редко) */
    .floating-photo {
      position: fixed;
      width: clamp(55px, 12vw, 70px);
      height: clamp(55px, 12vw, 70px);
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(255, 20, 120, 0.5);
      object-fit: cover;
      border: 3px solid white;
      cursor: pointer;
      pointer-events: auto;
      z-index: 50;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: photoAppear 0.5s ease-out;
      -webkit-tap-highlight-color: transparent;
    }

    .floating-photo:active {
      transform: scale(1.15);
      box-shadow: 0 14px 28px #ff1493;
    }

    @keyframes photoAppear {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Фото модалка */
    .photo-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 0, 5, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 400;
      opacity: 0;
      visibility: hidden;
      transition: 0.4s ease;
    }
    .photo-modal.active {
      opacity: 1;
      visibility: visible;
    }
    .modal-img {
      max-width: 94%;
      max-height: 85%;
      border-radius: 30px;
      box-shadow: 0 30px 60px rgba(255, 192, 203, 0.85);
      border: 4px solid white;
      animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      object-fit: contain;
    }
    @keyframes zoomIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .close-photo-btn {
      position: absolute;
      top: 20px; right: 25px;
      font-size: 2.5rem;
      color: white;
      cursor: pointer;
      background: rgba(255, 130, 160, 0.5);
      width: 50px; height: 50px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid white;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      transition: 0.3s;
      z-index: 410;
      -webkit-tap-highlight-color: transparent;
    }
    .close-photo-btn:active { background: #ff3b6e; transform: rotate(90deg); }

    /* Шторка комплимента */
    .compliment-curtain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #fff0f5 0%, #ffe4f0 100%);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      z-index: 350;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: translateY(-100%);
      transition: transform 0.7s cubic-bezier(0.25, 0.1, 0.15, 1.1);
      opacity: 0;
      pointer-events: none;
      gap: 2rem;
    }
    .compliment-curtain.active {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .compliment-text {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 900;
      color: #d43f6b;
      text-shadow: 3px 3px 15px rgba(255,255,255,0.9);
      animation: gentleFloat 2.5s infinite alternate;
      background: rgba(255,240,245,0.7);
      padding: 0.8rem 2rem;
      border-radius: 60px;
      text-align: center;
    }
    @keyframes gentleFloat {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-12px); }
    }
    .close-curtain-btn {
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      background: #ffccd5;
      border: none;
      padding: 0.7rem 2.5rem;
      border-radius: 50px;
      color: #a63252;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
      transition: 0.2s;
      border: 2px solid white;
      -webkit-tap-highlight-color: transparent;
    }
    .close-curtain-btn:active { background: #ff8da1; color: white; transform: scale(0.96); }

    /* Подсказка "Нажми" */
    .click-hint {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      color: #ff2d6d;
      font-weight: bold;
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      text-shadow: 0 0 12px white, 0 0 20px #ff99cc;
      animation: hintFloat 2.5s forwards;
      white-space: nowrap;
    }

    @keyframes hintFloat {
      0% { opacity: 0; transform: translateY(8px); }
      25% { opacity: 1; transform: translateY(0px); }
      80% { opacity: 0.8; transform: translateY(-20px); }
      100% { opacity: 0; transform: translateY(-35px); }
    }

    /* Частицы взрыва */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 145;
      border-radius: 50%;
      animation: particleBurst 1.2s forwards;
    }

    @keyframes particleBurst {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="darkness-overlay" id="darknessOverlay">
    <div class="darkness-text">Не дождёшься</div>
    <button class="close-darkness-btn" id="closeDarknessBtn">Закрыть</button>
  </div>

  <div class="compliment-curtain" id="complimentCurtain">
    <div class="compliment-text" id="complimentMessageDisplay">Зайка</div>
    <button class="close-curtain-btn" id="closeCurtainBtn">Закрыть</button>
  </div>

  <div class="photo-modal" id="photoModal">
    <span class="close-photo-btn" id="closePhotoModalBtn">&times;</span>
    <img class="modal-img" id="modalImage" src="" alt="Фото">
  </div>

  <div class="top-panel">
    <span class="together-label">🌸 Мы уже вместе 🌸</span>
    <div class="counter" id="counterDisplay">0 д. 00:00:00</div>
    <button class="breakup-btn" id="breakupButton">💔 Расстались</button>
  </div>

  <canvas id="heartsCanvas"></canvas>

  <script>
    (function() {
      const startDate = new Date('2021-10-11T00:00:00');
      
      // ВСТАВЛЯЙТЕ СВОИ ФОТОГРАФИИ СЮДА (можно много ссылок)
      const photoUrls = [
        'https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1500336624523-d7271308a8e5?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1518834107812-67b0b7c58434?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400&auto=format&fit=crop'
      ];

      const compliments = [
        'Зайка', 'Мышка', 'Солнышко', 'Родная', 'Красотка', 'Любимая',
        'Принцесса', 'Счастье моё', 'Котёнок', 'Лапушка', 'Нежность', 'Ангел',
        'Радость моя', 'Золотце', 'Сладкая'
      ];

      const counterEl = document.getElementById('counterDisplay');
      const darknessOverlay = document.getElementById('darknessOverlay');
      const closeDarknessBtn = document.getElementById('closeDarknessBtn');
      const breakupBtn = document.getElementById('breakupButton');
      const complimentCurtain = document.getElementById('complimentCurtain');
      const complimentMessageDisplay = document.getElementById('complimentMessageDisplay');
      const closeCurtainBtn = document.getElementById('closeCurtainBtn');
      const photoModal = document.getElementById('photoModal');
      const modalImage = document.getElementById('modalImage');
      const closePhotoModalBtn = document.getElementById('closePhotoModalBtn');
      const canvas = document.getElementById('heartsCanvas');
      const ctx = canvas.getContext('2d');

      let width, height;
      let hearts = [];
      const MAX_HEARTS = 14;

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
      resizeCanvas();

      // Счётчик
      function updateCounter() {
        const now = new Date();
        let diff = now - startDate;
        if (diff < 0) diff = 0;
        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        counterEl.textContent = `${days} д. ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
      }
      setInterval(updateCounter, 1000);
      updateCounter();

      // Расстались
      breakupBtn.addEventListener('click', () => darknessOverlay.classList.add('active'));
      closeDarknessBtn.addEventListener('click', () => darknessOverlay.classList.remove('active'));

      // Шторка
      function showCompliment(word) {
        complimentMessageDisplay.textContent = word;
        complimentCurtain.classList.add('active');
      }
      closeCurtainBtn.addEventListener('click', () => complimentCurtain.classList.remove('active'));

      // Фото модалка
      function openPhoto(url) {
        modalImage.src = url;
        photoModal.classList.add('active');
      }
      closePhotoModalBtn.addEventListener('click', () => photoModal.classList.remove('active'));
      photoModal.addEventListener('click', (e) => { if (e.target === photoModal) photoModal.classList.remove('active'); });

      // Редкое появление фото
      function spawnTemporaryPhoto() {
        if (document.querySelectorAll('.floating-photo').length >= 3) return;
        
        const url = photoUrls[Math.floor(Math.random() * photoUrls.length)];
        const img = document.createElement('img');
        img.src = url;
        img.className = 'floating-photo';
        
        const size = Math.min(width, height) * 0.13;
        const maxX = width - size - 10;
        const maxY = height - size - 10;
        img.style.left = (10 + Math.random() * maxX) + 'px';
        img.style.top = (10 + Math.random() * maxY) + 'px';
        
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          openPhoto(url);
        });
        
        document.body.appendChild(img);
        
        // Автоудаление через 7-12 секунд
        const lifetime = 7000 + Math.random() * 5000;
        setTimeout(() => {
          if (img.parentNode) {
            img.style.transition = 'opacity 0.5s, transform 0.5s';
            img.style.opacity = '0';
            img.style.transform = 'scale(0.5)';
            setTimeout(() => { if (img.parentNode) img.remove(); }, 500);
          }
        }, lifetime);
      }
      
      setInterval(() => {
        if (Math.random() < 0.5) spawnTemporaryPhoto();
      }, 8000);
      spawnTemporaryPhoto();

      // Сердечки
      function createHeart(x, y) {
        const size = Math.min(width, height) * 0.03 + Math.random() * Math.min(width, height) * 0.04;
        return {
          x: x || Math.random() * width,
          y: y || height + size,
          size: size,
          speedY: -0.4 - Math.random() * 1.2,
          speedX: (Math.random() - 0.5) * 0.7,
          opacity: 0.8 + Math.random() * 0.2,
          color: `rgba(255, ${140 + Math.random() * 80}, 180, 0.9)`,
          id: Math.random()
        };
      }

      for (let i = 0; i < MAX_HEARTS; i++) {
        hearts.push(createHeart(Math.random() * width, Math.random() * height));
      }

      // Взрыв сердечка
      function burstHeart(heart, clickX, clickY) {
        // Удаляем сердечко из массива
        hearts = hearts.filter(h => h.id !== heart.id);
        
        // Создаём частицы
        const particleCount = 12;
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          const angle = (Math.PI * 2 * i) / particleCount;
          const distance = 40 + Math.random() * 60;
          const dx = Math.cos(angle) * distance;
          const dy = Math.sin(angle) * distance;
          particle.style.cssText = `
            left: ${clickX}px;
            top: ${clickY}px;
            width: ${6 + Math.random() * 10}px;
            height: ${6 + Math.random() * 10}px;
            background: ${heart.color};
            --dx: ${dx}px;
            --dy: ${dy}px;
            box-shadow: 0 0 10px #ff4d6d;
          `;
          document.body.appendChild(particle);
          setTimeout(() => particle.remove(), 1300);
        }
        
        // Показываем фразу
        const phrase = compliments[Math.floor(Math.random() * compliments.length)];
        const textEl = document.createElement('div');
        textEl.className = 'heart-burst-text';
        textEl.textContent = phrase;
        textEl.style.left = clickX + 'px';
        textEl.style.top = clickY + 'px';
        textEl.style.transform = 'translate(-50%, -50%)';
        document.body.appendChild(textEl);
        setTimeout(() => textEl.remove(), 2100);
        
        // Добавляем новое сердечко
        setTimeout(() => {
          hearts.push(createHeart(Math.random() * width, height + 30));
        }, 500);
      }

      // Обработка кликов по canvas
      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;
        
        // Ищем ближайшее сердечко к клику
        let closestHeart = null;
        let minDist = Math.min(width, height) * 0.12;
        
        for (let heart of hearts) {
          const dist = Math.hypot(heart.x - clickX, heart.y - clickY);
          if (dist < minDist) {
            minDist = dist;
            closestHeart = heart;
          }
        }
        
        if (closestHeart) {
          burstHeart(closestHeart, e.clientX, e.clientY);
        } else {
          // Если не попали в сердечко, показываем шторку
          const word = compliments[Math.floor(Math.random() * compliments.length)];
          showCompliment(word);
        }
      });

      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const clickX = touch.clientX - rect.left;
        const clickY = touch.clientY - rect.top;
        
        let closestHeart = null;
        let minDist = Math.min(width, height) * 0.12;
        
        for (let heart of hearts) {
          const dist = Math.hypot(heart.x - clickX, heart.y - clickY);
          if (dist < minDist) {
            minDist = dist;
            closestHeart = heart;
          }
        }
        
        if (closestHeart) {
          burstHeart(closestHeart, touch.clientX, touch.clientY);
        } else {
          const word = compliments[Math.floor(Math.random() * compliments.length)];
          showCompliment(word);
        }
      }, { passive: false });

      // Подсказки "Нажми"
      function showHint() {
        const hint = document.createElement('div');
        hint.className = 'click-hint';
        hint.textContent = 'Нажми';
        hint.style.left = (10 + Math.random() * (width - 80)) + 'px';
        hint.style.top = (60 + Math.random() * (height - 120)) + 'px';
        document.body.appendChild(hint);
        setTimeout(() => hint.remove(), 2600);
      }
      setInterval(showHint, 5000);
      showHint();

      // Отрисовка
      function drawHeart(ctx, h) {
        ctx.save();
        ctx.globalAlpha = h.opacity;
        ctx.translate(h.x, h.y);
        ctx.fillStyle = h.color;
        ctx.shadowColor = '#ff4d6d';
        ctx.shadowBlur = 10;
        const s = h.size;
        ctx.beginPath();
        ctx.moveTo(0, s * 0.25);
        ctx.bezierCurveTo(-s * 0.5, -s * 0.25, -s * 0.5, s * 0.45, 0, s * 0.85);
        ctx.bezierCurveTo(s * 0.5, s * 0.45, s * 0.5, -s * 0.25, 0, s * 0.25);
        ctx.fill();
        ctx.restore();
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        
        for (let h of hearts) {
          h.y += h.speedY;
          h.x += h.speedX;
          
          if (h.y < -40) {
            h.y = height + 40;
            h.x = Math.random() * width;
          }
          if (h.x < -20) h.x = width + 20;
          if (h.x > width + 20) h.x = -20;
          
          drawHeart(ctx, h);
        }
        
        // Поддерживаем количество сердечек
        while (hearts.length < MAX_HEARTS) {
          hearts.push(createHeart(Math.random() * width, height + 30));
        }
        
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
