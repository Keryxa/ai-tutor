      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: radial-gradient(circle at center, #ffeef8 0%, #ffd6e7 70%, #ffc0d5 100%);
      position: fixed;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .darkness-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(20,0,10,0.97) 0%, rgba(0,0,0,0.99) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 500;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease, visibility 0s 0.6s;
      pointer-events: none;
      gap: 2rem;
    }

    .darkness-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.6s ease, visibility 0s 0s;
    }

    .darkness-text {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      color: #ff99cc;
      text-shadow: 0 0 30px #ff0066, 0 0 60px #ff4da6, 0 0 90px #cc0052;
      animation: scaryPulse 2s infinite alternate;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 0 1rem;
    }

    @keyframes scaryPulse {
      0% { text-shadow: 0 0 20px #ff4da6, 0 0 50px #ff0066; transform: scale(1); }
      100% { text-shadow: 0 0 50px #ff1a75, 0 0 100px #e6005c; transform: scale(1.04); }
    }

    .close-darkness-btn {
      background: rgba(0,0,0,0.4);
      border: 2px solid #ff4da6;
      color: #ffb3d9;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      padding: 0.7rem 2.5rem;
      border-radius: 50px;
      cursor: pointer;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      font-weight: bold;
      letter-spacing: 0.08em;
      transition: all 0.3s;
    }

    .close-darkness-btn:active {
      background: #ff4da6;
      color: black;
      border-color: white;
      box-shadow: 0 0 25px #ff4da6;
    }

    .top-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 245, 250, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1.2rem 2rem;
      border-radius: 80px;
      box-shadow: 0 15px 35px rgba(255, 105, 150, 0.3);
      border: 2px solid rgba(255, 182, 193, 0.8);
      z-index: 100;
      position: relative;
      max-width: 95vw;
    }

    .together-label {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #ff7eb3, #d43f6b, #ff4d6d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 3px 5px rgba(255, 80, 120, 0.4));
      letter-spacing: 0.06em;
      text-align: center;
      white-space: nowrap;
    }

    .counter {

      font-weight: bold;
      background: rgba(255, 255, 255, 0.75);
      padding: 0.3rem 1.8rem;
      border-radius: 50px;
      color: #b0306a;
      letter-spacing: 0.03em;
      box-shadow: inset 0 2px 12px rgba(255, 140, 180, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-feature-settings: "tnum";
      white-space: nowrap;
    }

    .breakup-btn {
      background: rgba(255, 220, 230, 0.9);
      border: 2px solid #ff6b8a;
      color: #b33b5c;
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: bold;
      padding: 0.5rem 2rem;
      border-radius: 40px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 12px rgba(255, 80, 110, 0.35);
      margin-top: 0.2rem;
    }

    .breakup-btn:active {
      background: #ffb3c6;
      color: white;
      border-color: #ff2d55;
      box-shadow: 0 8px 18px #ff6b8a;
      transform: scale(0.96);
    }

    .breakup-btn.hidden {
      display: none;
    }

    #heartsCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      z-index: 40;
      touch-action: manipulation;
    }

    .burst-text {
      position: fixed;
      pointer-events: none;
      z-index: 150;
      font-weight: 900;
      color: #d43f6b;
      text-shadow: 0 0 15px white, 0 0 30px #ff99cc;
      animation: burstTextAnim 2.5s ease-out forwards;
      white-space: nowrap;
      font-size: clamp(1rem, 3.5vw, 1.6rem);
      max-width: 90vw;
      text-align: center;
    }

    @keyframes burstTextAnim {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.3);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.15);
      }
      40% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1) translateY(-10px);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.7) translateY(-60px);
      }
    }

    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 145;
      border-radius: 50%;
      animation: particleBurst 1s ease-out forwards;
    }

    @keyframes particleBurst {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(0);
        opacity: 0;
      }
    }

    .floating-photo {
      position: fixed;
      width: clamp(55px, 12vw, 70px);
      height: clamp(55px, 12vw, 70px);
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(255, 20, 120, 0.5);
      object-fit: cover;
      border: 3px solid white;
      cursor: pointer;
      pointer-events: auto;
      z-index: 50;
      animation: photoAppear 0.5s ease-out;
    }

    .floating-photo:active {
      transform: scale(1.15);
      box-shadow: 0 14px 28px #ff1493;
    }

    @keyframes photoAppear {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

      left: 0;

      height: 100%;

      right: 25px;

      align-items: center;
      justify-content: center;

      z-index: 410;
      line-height: 1;

    .compliment-curtain {

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      flex-direction: column;

      pointer-events: none;
      gap: 2rem;

      opacity: 1;
      pointer-events: auto;

      text-align: center;
      max-width: 90vw;

      0% { transform: translateY(0px); }
      100% { transform: translateY(-12px); }

      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      background: #ffccd5;
      border: none;
      padding: 0.7rem 2.5rem;

      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);

      border: 2px solid white;
    }
    .close-curtain-btn:active {

      color: white;

      position: fixed;
      pointer-events: none;
      z-index: 200;
      color: #ff2d6d;
      font-weight: bold;
      font-size: clamp(0.8rem, 2vw, 1rem);

      white-space: nowrap;

      0% { opacity: 0; transform: translateY(8px); }
      25% { opacity: 1; transform: translateY(0px); }
      80% { opacity: 0.6; transform: translateY(-15px); }
      100% { opacity: 0; transform: translateY(-30px); }
    }
  </style>

      function createHeart(x, y) {
        const baseSize = Math.min(width, height) * 0.035;
        const size = baseSize + Math.random() * baseSize * 1.2;
        return {
          x: x !== undefined ? x : Math.random() * width,
          y: y !== undefined ? y : height + size,
          size: size,
          speedY: -0.3 - Math.random() * 1.0,
          speedX: (Math.random() - 0.5) * 0.6,
          opacity: 0.75 + Math.random() * 0.25,
          color: `rgba(255, ${140 + Math.random() * 80}, ${170 + Math.random() * 40}, 0.9)`,
          id: Math.random()
        };
      }

      for (let i = 0; i < MAX_HEARTS; i++) {
        hearts.push(createHeart(Math.random() * width, Math.random() * height));
      }

      function burstHeart(heart, clientX, clientY) {
        hearts = hearts.filter(h => h.id !== heart.id);
        
        const particleCount = 14;
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          const angle = (Math.PI * 2 * i) / particleCount;
          const distance = 35 + Math.random() * 55;
          const dx = Math.cos(angle) * distance;
          const dy = Math.sin(angle) * distance;
          const size = 4 + Math.random() * 8;
          
          particle.style.cssText = `
            left: ${clientX}px;
            top: ${clientY}px;
            width: ${size}px;
            height: ${size}px;
            background: ${heart.color};
            --dx: ${dx}px;
            --dy: ${dy}px;
            box-shadow: 0 0 8px #ff6b8a, 0 0 16px #ff99cc;
            margin-left: -${size/2}px;
            margin-top: -${size/2}px;
          `;
          document.body.appendChild(particle);
          setTimeout(() => particle.remove(), 1100);
        }
        
        const phrase = phrases[Math.floor(Math.random() * phrases.length)];
        const textEl = document.createElement('div');
        textEl.className = 'burst-text';
        textEl.textContent = phrase;
        textEl.style.left = clientX + 'px';
        textEl.style.top = clientY + 'px';
        document.body.appendChild(textEl);
        setTimeout(() => textEl.remove(), 2600);
        
        setTimeout(() => {
          if (hearts.length < MAX_HEARTS) {
            hearts.push(createHeart(Math.random() * width, height + 30));
          }
        }, 600);
      }

      function findHeartAt(x, y) {
        const maxDistance = Math.min(width, height) * 0.1;
        let closest = null;
        let minDist = maxDistance;
        
        for (let heart of hearts) {
          const dist = Math.hypot(heart.x - x, heart.y - y);
          if (dist < minDist) {
            minDist = dist;
            closest = heart;
          }
        }
        return closest;
      }

        ctx.moveTo(0, s * 0.25);
        ctx.bezierCurveTo(-s * 0.5, -s * 0.25, -s * 0.5, s * 0.45, 0, s * 0.85);
        ctx.bezierCurveTo(s * 0.5, s * 0.45, s * 0.5, -s * 0.25, 0, s * 0.25);
        ctx.fill();
        ctx.restore();
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        
        for (let h of hearts) {
          h.y += h.speedY;
          h.x += h.speedX;
          
          if (h.y < -40) {
            h.y = height + 40;
            h.x = Math.random() * width;
          }
          if (h.x < -20) h.x = width + 20;
          if (h.x > width + 20) h.x = -20;
          
          drawHeart(ctx, h);
        }
        
        while (hearts.length < MAX_HEARTS) {
          hearts.push(createHeart(Math.random() * width, height + 30));
        }
        
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
