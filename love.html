<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, height=device-height">
  <title>Кирилл и Лена 💖 Ростик и Дейзи</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: radial-gradient(circle at center, #ffeef8 0%, #ffd6e7 70%, #ffc0d5 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      touch-action: manipulation;
    }

    .darkness-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(20,0,10,0.97) 0%, rgba(0,0,0,0.99) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 500;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease, visibility 0s 0.6s;
      pointer-events: none;
      gap: 2rem;
    }

    .darkness-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.6s ease, visibility 0s 0s;
    }

    .darkness-text {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      color: #ff99cc;
      text-shadow: 0 0 30px #ff0066, 0 0 60px #ff4da6, 0 0 90px #cc0052;
      animation: scaryPulse 2s infinite alternate;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 0 1rem;
    }

    @keyframes scaryPulse { 0% { text-shadow: 0 0 20px #ff4da6, 0 0 50px #ff0066; transform: scale(1); } 100% { text-shadow: 0 0 50px #ff1a75, 0 0 100px #e6005c; transform: scale(1.04); } }

    .close-darkness-btn {
      background: rgba(0,0,0,0.4); border: 2px solid #ff4da6; color: #ffb3d9;
      font-size: clamp(1.2rem, 3vw, 1.8rem); padding: 0.7rem 2.5rem; border-radius: 50px;
      cursor: pointer; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      font-weight: bold; letter-spacing: 0.08em; transition: all 0.3s;
    }

    .top-panel {
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
      background: rgba(255, 245, 250, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 0.8rem 1.5rem; border-radius: 60px; box-shadow: 0 10px 30px rgba(255, 105, 150, 0.35);
      border: 2px solid rgba(255, 182, 193, 0.9); z-index: 100; position: fixed;
      top: env(safe-area-inset-top, 10px); top: 10px; left: 10px; right: 10px;
      margin: 0 auto; max-width: 450px; width: calc(100% - 20px);
    }

    .together-label {
      font-size: clamp(1.3rem, 4.5vw, 2rem); font-weight: 800;
      background: linear-gradient(135deg, #ff7eb3, #d43f6b, #ff4d6d);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 3px 5px rgba(255, 80, 120, 0.4)); letter-spacing: 0.06em; text-align: center; white-space: nowrap;
    }

    .counter {
      font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: bold; background: rgba(255, 255, 255, 0.75);
      padding: 0.2rem 1.2rem; border-radius: 50px; color: #b0306a; letter-spacing: 0.03em;
      box-shadow: inset 0 2px 12px rgba(255, 140, 180, 0.6); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); font-feature-settings: "tnum"; white-space: nowrap; text-align: center;
    }

    .breakup-btn {

      font-size: clamp(0.9rem, 2.8vw, 1.1rem); font-weight: bold; padding: 0.4rem 1.5rem;
      border-radius: 40px; cursor: pointer; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s; letter-spacing: 0.04em; box-shadow: 0 4px 12px rgba(255, 80, 110, 0.35);
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .breakup-btn.hidden { display: none; }

    #heartsCanvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: auto; z-index: 40; touch-action: manipulation;
    }

    .burst-text {
      position: fixed; pointer-events: none; z-index: 9999; font-weight: 900; color: #d43f6b;
      text-shadow: 0 0 20px white, 0 0 40px #ff99cc, 0 0 60px #ff6b8a;
      animation: burstTextAnim 2.5s ease-out forwards; font-size: clamp(1rem, 3.5vw, 1.8rem);
      text-align: center; white-space: nowrap; left: 50% !important; top: 50% !important;
      transform: translate(-50%, -50%); width: 90vw; max-width: 400px;
      background: rgba(255, 240, 245, 0.9); padding: 1rem 0.6rem; border-radius: 30px;
      border: 2px solid rgba(255, 150, 180, 0.7); box-shadow: 0 10px 30px rgba(255, 80, 130, 0.5); line-height: 1.3;
    }

    @keyframes burstTextAnim {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
    }

    .particle {
      position: fixed; pointer-events: none; z-index: 145; border-radius: 50%;
      animation: particleBurst 1s ease-out forwards;
      will-change: transform, opacity;
    }
    @keyframes particleBurst {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    .casino-btn {
      position: fixed; top: 15px; left: 15px; z-index: 500;
      background: linear-gradient(135deg, #ffd700, #ffaa00); color: #5c0030;
      border: 3px solid white;
      border-radius: 50px; padding: 0.6rem 1.5rem; font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(255, 215, 0, 0.6);
      animation: gameBtnPulse 2s ease-in-out infinite;
    }
    @keyframes gameBtnPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    .fullscreen-iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 700;
      border: none;
      display: none;
    }
    .fullscreen-iframe.active {
      display: block;
    }
    .close-iframe-btn {
      position: fixed;
      top: 15px;
      right: 20px;
      z-index: 710;
      background: rgba(0,0,0,0.7);
      color: white;
      border: 2px solid white;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      font-size: 1.5rem;
      cursor: pointer;
      display: none;
    }
    .close-iframe-btn.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

ins-badge.active{display:block}@keyframes badgeGlow{0%,100%{box-shadow:0 0 8px #ff4b93}50%{box-shadow:0 0 18px #ffd700}}.balance{text-align:center;font-size:24px;margin-bottom:8px;font-weight:bold;position:relative}.balance-change{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:28px;font-weight:900;animation:balanceFloat 1.5s ease-out forwards;pointer-events:none;z-index:200}.balance-change.positive{color:#4caf50}.balance-change.negative{color:#f44336}@keyframes balanceFloat{0%{opacity:1;transform:translateY(-50%) scale(1.2)}100%{opacity:0;transform:translateY(-150%) scale(0.8)}}.treasure-change{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:28px;font-weight:900;animation:treasureFloat 1.5s ease-out forwards;pointer-events:none;z-index:200;color:#ffd700}@keyframes treasureFloat{0%{opacity:1;transform:translateY(-50%) scale(1.2)}100%{opacity:0;transform:translateY(-150%) scale(0.8)}}.machine-wrap{position:relative}.machine{position:relative;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.reel{height:320px;background:#220010;border-radius:20px;overflow:hidden;border:2px solid #ff84ba;position:relative;box-shadow:inset 0 0 15px rgba(255,255,255,0.06),0 0 10px rgba(255,85,140,0.4)}.strip{position:absolute;width:100%;top:-384px;will-change:top}.symbol{height:64px;display:flex;justify-content:center;align-items:center;font-size:34px;transition:.2s}.symbol.win{animation:winPulse .8s infinite alternate;filter:drop-shadow(0 0 12px #fff)}@keyframes winPulse{0%{transform:scale(1)}100%{transform:scale(1.18)}}.win-lines{position:absolute;inset:0;pointer-events:none;z-index:50}.win-line{position:absolute;height:8px;border-radius:999px;background:linear-gradient(90deg,#fff,#ffd700,#fff);transform-origin:left center;box-shadow:0 0 20px #fff,0 0 35px #ffd700,0 0 55px #ffd700;animation:linePulse .7s infinite alternate}@keyframes linePulse{0%{opacity:.5;filter:blur(.5px)}100%{opacity:1;filter:blur(0px)}}.win-dot{position:absolute;width:18px;height:18px;border-radius:50%;background:white;transform:translate(-50%,-50%);box-shadow:0 0 12px #fff,0 0 25px #ffd700}.spinBtn{width:100%;margin-top:18px;border:none;border-radius:20px;padding:16px;cursor:pointer;font-size:24px;font-weight:bold;color:white;background:linear-gradient(45deg,#ff005d,#ff8fc2);box-shadow:0 0 20px #ff4b93;transition:.2s}.spinBtn:active{transform:scale(.97)}.spinBtn.free-mode{background:linear-gradient(45deg,#ffd700,#ffaa00);color:#5c0030;box-shadow:0 0 25px #ffd700}.message{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:90%;text-align:center;font-size:28px;font-weight:bold;opacity:0;pointer-events:none;text-shadow:0 0 15px white;z-index:120}.message.show{animation:msg 3s ease}@keyframes msg{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-180%) scale(1)}}.hearts{position:fixed;inset:0;pointer-events:none;overflow:hidden}.heart{position:absolute;bottom:-30px;animation:float 4s linear forwards}@keyframes float{from{transform:translateY(0) scale(.4);opacity:1}to{transform:translateY(-110vh) scale(1.5);opacity:0}}.jackpotFlash{animation:jackpotFlash .7s infinite}@keyframes jackpotFlash{0%{box-shadow:0 0 20px #fff,0 0 40px #ff0,0 0 80px #ff0}50%{box-shadow:0 0 30px #fff,0 0 80px #ff00f2,0 0 130px #00ffe5}100%{box-shadow:0 0 20px #fff,0 0 40px #ff0,0 0 80px #ff0}}.coin-drop{position:fixed;pointer-events:none;z-index:998;font-size:20px;animation:dropToTreasure 1.2s ease-in forwards}@keyframes dropToTreasure{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0.3);opacity:0}}.popup{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:none;justify-content:center;align-items:center;padding:18px;z-index:999}.popupContent{width:min(95vw,400px);background:#2b0018;border:3px solid #ff8abc;border-radius:28px;padding:24px;text-align:center;bo
