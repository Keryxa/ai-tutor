<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Кирилл и Лена 💖 Ростик и Дейзи</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #ffeef8 0%, #ffd6e7 70%, #ffc0d5 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: filter 0.8s ease, background 0.8s ease;
    }

    /* Затемнение для расставания */
    .darkness-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(20,0,10,0.95) 0%, rgba(0,0,0,0.98) 100%);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 500;
      opacity: 0;
      visibility: hidden;
      transition: opacity 1s ease, visibility 0s 1s;
      pointer-events: none;
    }

    .darkness-overlay.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.8s ease, visibility 0s 0s;
    }

    .darkness-text {
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 900;
      color: #ff99cc;
      text-shadow: 0 0 40px #ff0066, 0 0 80px #ff4da6, 0 0 120px #cc0052;
      animation: scaryPulse 2s infinite alternate;
      letter-spacing: 0.15em;
      margin-bottom: 3rem;
    }

    @keyframes scaryPulse {
      0% { text-shadow: 0 0 30px #ff4da6, 0 0 70px #ff0066; transform: scale(1); }
      100% { text-shadow: 0 0 70px #ff1a75, 0 0 130px #e6005c; transform: scale(1.03); }
    }

    .close-darkness-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #ff4da6;
      color: #ffb3d9;
      font-size: 2rem;
      padding: 0.8rem 3rem;
      border-radius: 60px;
      cursor: pointer;
      backdrop-filter: blur(15px);
      font-weight: bold;
      letter-spacing: 0.1em;
      transition: all 0.4s;
      background: rgba(0,0,0,0.3);
    }

    .close-darkness-btn:hover {
      background: #ff4da6;
      color: black;
      border-color: white;
      box-shadow: 0 0 30px #ff4da6;
    }

    /* Верхняя панель */
    .top-panel {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      background: rgba(255, 245, 250, 0.75);
      backdrop-filter: blur(18px);
      padding: 1.4rem 3rem;
      border-radius: 100px;
      box-shadow: 0 25px 40px rgba(255, 105, 150, 0.35);
      border: 2px solid rgba(255, 182, 193, 0.9);
      z-index: 100;
      position: relative;
      transition: 0.3s;
    }

    .together-label {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff7eb3, #d43f6b, #ff4d6d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 6px rgba(255, 80, 120, 0.5));
      letter-spacing: 0.1em;
    }

    .counter {
      font-size: 3.4rem;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.7);
      padding: 0.3rem 3rem;
      border-radius: 70px;
      color: #b0306a;
      letter-spacing: 0.04em;
      box-shadow: inset 0 4px 15px rgba(255, 140, 180, 0.7);
      backdrop-filter: blur(8px);
      font-feature-settings: "tnum";
    }

    .breakup-btn {
      background: rgba(255, 220, 230, 0.9);
      border: 2px solid #ff6b8a;
      color: #b33b5c;
      font-size: 1.4rem;
      font-weight: bold;
      padding: 0.5rem 2.2rem;
      border-radius: 50px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: all 0.3s;
      letter-spacing: 0.05em;
      box-shadow: 0 6px 15px rgba(255, 80, 110, 0.4);
      margin-top: 0.2rem;
    }

    .breakup-btn:hover {
      background: #ffb3c6;
      color: white;
      border-color: #ff2d55;
      box-shadow: 0 10px 20px #ff6b8a;
    }

    /* Полотно */
    #mainCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 40;
    }

    /* Летающие фото (DOM) */
    .floating-photo {
      position: absolute;
      width: 75px;
      height: 75px;
      border-radius: 25px;
      box-shadow: 0 12px 25px rgba(255, 20, 120, 0.55);
      object-fit: cover;
      border: 3px solid white;
      cursor: pointer;
      pointer-events: auto;
      z-index: 50;
      transition: transform 0.2s, box-shadow 0.2s;
      filter: brightness(1.05);
    }

    .floating-photo:hover {
      transform: scale(1.18);
      box-shadow: 0 16px 30px #ff1493;
    }

    /* Фото модалка */
    .photo-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 0, 5, 0.85);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 400;
      opacity: 0;
      visibility: hidden;
      transition: 0.5s ease;
    }
    .photo-modal.active {
      opacity: 1;
      visibility: visible;
    }
    .modal-img {
      max-width: 92%;
      max-height: 88%;
      border-radius: 40px;
      box-shadow: 0 35px 70px rgba(255, 192, 203, 0.9);
      border: 5px solid white;
      animation: zoomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes zoomIn {
      0% { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .close-photo-btn {
      position: absolute;
      top: 30px; right: 45px;
      font-size: 3.5rem;
      color: white;
      cursor: pointer;
      background: rgba(255, 130, 160, 0.6);
      width: 70px; height: 70px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid white;
      backdrop-filter: blur(15px);
      transition: 0.3s;
    }
    .close-photo-btn:hover { background: #ff3b6e; transform: rotate(90deg); }

    /* Шторка комплимента (сверху вниз) */
    .compliment-curtain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #fff0f5 0%, #ffe4f0 100%);
      backdrop-filter: blur(25px);
      z-index: 350;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: translateY(-100%);
      transition: transform 0.9s cubic-bezier(0.25, 0.1, 0.15, 1.2);
      opacity: 0;
      pointer-events: none;
    }
    .compliment-curtain.active {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    .compliment-text {
      font-size: clamp(3.5rem, 12vw, 7rem);
      font-weight: 900;
      color: #d43f6b;
      text-shadow: 3px 3px 15px rgba(255,255,255,0.9);
      margin-bottom: 2.5rem;
      animation: gentleFloat 2.5s infinite alternate;
      background: rgba(255,240,245,0.7);
      padding: 1rem 2.5rem;
      border-radius: 90px;
    }
    @keyframes gentleFloat {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-15px); }
    }
    .close-curtain-btn {
      font-size: 2rem;
      background: #ffccd5;
      border: none;
      padding: 0.9rem 3rem;
      border-radius: 60px;
      color: #a63252;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
      border: 2px solid white;
    }
    .close-curtain-btn:hover { background: #ff8da1; color: white; }
  </style>
</head>
<body>
  <!-- Темнота "Не дождёшься" -->
  <div class="darkness-overlay" id="darknessOverlay">
    <div class="darkness-text">Не дождёшься</div>
    <button class="close-darkness-btn" id="closeDarknessBtn">Закрыть</button>
  </div>

  <!-- Шторка комплимента -->
  <div class="compliment-curtain" id="complimentCurtain">
    <div class="compliment-text" id="complimentMessageDisplay">Зайка</div>
    <button class="close-curtain-btn" id="closeCurtainBtn">Закрыть</button>
  </div>

  <!-- Фото модалка -->
  <div class="photo-modal" id="photoModal">
    <span class="close-photo-btn" id="closePhotoModalBtn">&times;</span>
    <img class="modal-img" id="modalImage" src="" alt="Фото">
  </div>

  <div class="top-panel">
    <span class="together-label">🌸 Мы уже вместе 🌸</span>
    <div class="counter" id="counterDisplay">0 д. 00:00:00</div>
    <button class="breakup-btn" id="breakupButton">💔 Расстались</button>
  </div>

  <canvas id="mainCanvas"></canvas>

  <script>
    (() => {
      // ---------- Данные ----------
      const startDate = new Date('2021-10-11T00:00:00');
      
      // ФОТОГРАФИИ: вставляйте свои ссылки сюда (можно много)
      const photoUrls = [
        'https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1500336624523-d7271308a8e5?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1518834107812-67b0b7c58434?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400&auto=format&fit=crop'
      ];

      const compliments = [
        'Зайка', 'Мышка', 'Солнышко', 'Родная', 'Красотка', 'Любимая',
        'Принцесса', 'Счастье моё', 'Котёнок', 'Лапушка', 'Нежность', 'Ангел'
      ];

      // DOM элементы
      const counterEl = document.getElementById('counterDisplay');
      const darknessOverlay = document.getElementById('darknessOverlay');
      const closeDarknessBtn = document.getElementById('closeDarknessBtn');
      const breakupBtn = document.getElementById('breakupButton');
      
      const complimentCurtain = document.getElementById('complimentCurtain');
      const complimentMessageDisplay = document.getElementById('complimentMessageDisplay');
      const closeCurtainBtn = document.getElementById('closeCurtainBtn');
      
      const photoModal = document.getElementById('photoModal');
      const modalImage = document.getElementById('modalImage');
      const closePhotoModalBtn = document.getElementById('closePhotoModalBtn');
      
      const canvas = document.getElementById('mainCanvas');
      const ctx = canvas.getContext('2d');
      
      let width, height;
      let butterflies = [], birds = [], hearts = [];
      let floatingPhotos = []; // DOM элементы
      
      // ---------- Размеры ----------
      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // ---------- Счётчик ----------
      function updateCounter() {
        const now = new Date();
        let diff = now - startDate;
        if (diff < 0) diff = 0;
        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        counterEl.textContent = `${days} д. ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
      }
      setInterval(updateCounter, 1000);
      updateCounter();

      // ---------- Расстались ----------
      breakupBtn.addEventListener('click', () => darknessOverlay.classList.add('active'));
      closeDarknessBtn.addEventListener('click', () => darknessOverlay.classList.remove('active'));

      // ---------- Шторка комплимента ----------
      function showCompliment(word) {
        complimentMessageDisplay.textContent = word;
        complimentCurtain.classList.add('active');
      }
      closeCurtainBtn.addEventListener('click', () => complimentCurtain.classList.remove('active'));

      // ---------- Фото модалка ----------
      function openPhoto(url) {
        modalImage.src = url;
        photoModal.classList.add('active');
      }
      closePhotoModalBtn.addEventListener('click', () => photoModal.classList.remove('active'));
      photoModal.addEventListener('click', (e) => { if (e.target === photoModal) photoModal.classList.remove('active'); });

      // ---------- Создание летающих фото ----------
      function spawnPhoto(url) {
        const img = document.createElement('img');
        img.src = url;
        img.className = 'floating-photo';
        img.style.left = Math.random() * (width - 90) + 'px';
        img.style.top = Math.random() * (height - 90) + 'px';
        img.speedX = (Math.random() - 0.5) * 1.6;
        img.speedY = (Math.random() - 0.5) * 1.6;
        
        img.addEventListener('click', (e) => {
          e.stopPropagation();
          openPhoto(url);
        });
        
        document.body.appendChild(img);
        return img;
      }

      function initPhotos() {
        floatingPhotos.forEach(p => p.remove());
        floatingPhotos = [];
        photoUrls.forEach(url => floatingPhotos.push(spawnPhoto(url)));
      }
      initPhotos();

      function animatePhotos() {
        for (let p of floatingPhotos) {
          let left = parseFloat(p.style.left);
          let top = parseFloat(p.style.top);
          left += p.speedX;
          top += p.speedY;
          if (left <= 0 || left >= width - 75) p.speedX *= -1;
          if (top <= 0 || top >= height - 75) p.speedY *= -1;
          left = Math.min(width-75, Math.max(0, left));
          top = Math.min(height-75, Math.max(0, top));
          p.style.left = left + 'px';
          p.style.top = top + 'px';
        }
        requestAnimationFrame(() => setTimeout(animatePhotos, 35));
      }
      animatePhotos();

      // ---------- Существа Canvas ----------
      function createButterfly() {
        return {
          x: Math.random()*width, y: Math.random()*height,
          size: 18+Math.random()*22, speedX: (Math.random()-0.5)*1.5, speedY: (Math.random()-0.7)*1.3,
          wing: Math.random()*100, color: `hsl(${330+Math.random()*25}, 85%, 72%)`
        };
      }
      function createBird() {
        return {
          x: Math.random()*width, y: Math.random()*height*0.7,
          size: 13+Math.random()*15, speedX: (Math.random()-0.3)*2.0, speedY: (Math.random()-0.4)*1.1
        };
      }
      function createHeart() {
        return {
          x: Math.random()*width, y: Math.random()*height,
          size: 15+Math.random()*22, speedY: -0.5-Math.random()*1.5, speedX: (Math.random()-0.5)*0.7,
          color: `rgba(255, ${120+Math.random()*100}, 180, 0.9)`
        };
      }

      for (let i=0;i<9;i++) butterflies.push(createButterfly());
      for (let i=0;i<6;i++) birds.push(createBird());
      for (let i=0;i<15;i++) hearts.push(createHeart());

      function draw() {
        ctx.clearRect(0,0,width,height);
        butterflies.forEach(b => {
          b.x+=b.speedX; b.y+=b.speedY; b.wing+=0.12;
          if(b.x<-30)b.x=width+30; if(b.x>width+30)b.x=-30;
          if(b.y<-30)b.y=height+30; if(b.y>height+30)b.y=-30;
          ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(Math.sin(b.wing)*0.3);
          ctx.fillStyle=b.color; ctx.shadowColor='#ff99cc'; ctx.shadowBlur=10;
          ctx.beginPath(); ctx.ellipse(-b.size*0.45,0,b.size*0.55,b.size*0.25,0,0,Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(b.size*0.45,0,b.size*0.55,b.size*0.25,0,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#fff5fa'; ctx.beginPath(); ctx.arc(0,0,b.size*0.22,0,Math.PI*2); ctx.fill();
          ctx.restore();
        });
        birds.forEach(b => {
          b.x+=b.speedX; b.y+=b.speedY;
          if(b.x<-20)b.x=width+20; if(b.x>width+20)b.x=-20;
          if(b.y<-20)b.y=height+20; if(b.y>height+20)b.y=-20;
          ctx.save(); ctx.translate(b.x,b.y); ctx.fillStyle='#ffb7c5'; ctx.shadowColor='#ff85a2'; ctx.shadowBlur=7;
          ctx.beginPath(); ctx.arc(0,0,b.size*0.5,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#fff0f3'; ctx.beginPath(); ctx.arc(-2,-2,b.size*0.2,0,Math.PI*2); ctx.fill();
          ctx.restore();
        });
        hearts.forEach(h => {
          h.y+=h.speedY; h.x+=h.speedX;
          if(h.y<-30){h.y=height+30; h.x=Math.random()*width;}
          ctx.save(); ctx.translate(h.x,h.y); ctx.fillStyle=h.color; ctx.shadowColor='#ff4d6d'; ctx.shadowBlur=12;
          const s=h.size;
          ctx.beginPath(); ctx.moveTo(0,s*0.3);
          ctx.bezierCurveTo(-s*0.5,-s*0.3,-s*0.5,s*0.5,0,s*0.9);
          ctx.bezierCurveTo(s*0.5,s*0.5,s*0.5,-s*0.3,0,s*0.3);
          ctx.fill();
          ctx.restore();
        });
        requestAnimationFrame(draw);
      }
      draw();

      // Надпись "Нажми" периодически
      setInterval(() => {
        const hint = document.createElement('div');
        hint.innerText = 'Нажми';
        hint.style.cssText = `position:fixed; left:${Math.random()*(width-100)}px; top:${Math.random()*(height-100)}px; color:#ff2d6d; font-weight:bold; font-size:2.1rem; z-index:200; pointer-events:none; text-shadow:0 0 18px white; animation: floatHint 2s forwards;`;
        document.body.appendChild(hint);
        setTimeout(() => hint.remove(), 2200);
      }, 4000);

      // Стиль анимации для подсказки
      const styleHint = document.createElement('style');
      styleHint.textContent = `@keyframes floatHint{0%{opacity:0;transform:translateY(10px);}30%{opacity:1;}100%{opacity:0;transform:translateY(-30px);}}`;
      document.head.appendChild(styleHint);

      // Клик по canvas (бабочки/сердечки) показывает шторку
      canvas.addEventListener('click', () => {
        const word = compliments[Math.floor(Math.random()*compliments.length)];
        showCompliment(word);
      });

      // Клик по фото также вызывает комплимент (дополнительно)
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('floating-photo')) {
          const word = compliments[Math.floor(Math.random()*compliments.length)];
          showCompliment(word);
        }
      });

    })();
  </script>
</body>
</html>
