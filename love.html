<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Кирилл и Лена 💖 Ростик и Дейзи</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(145deg, #ffeef8 0%, #ffd6e7 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: background 0.6s ease, filter 0.4s ease;
    }

    /* Темный оверлей для эффекта "Расстались" */
    .dark-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.7s ease, visibility 0s 0.7s;
      color: #fff;
      text-shadow: 0 0 20px #ff99cc;
    }

    .dark-overlay.active {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.5s ease, visibility 0s 0s;
    }

    .dark-message {
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: bold;
      letter-spacing: 0.2em;
      animation: pulseDark 1.5s infinite alternate;
      color: #ffb3d9;
      margin-bottom: 2.5rem;
    }

    @keyframes pulseDark {
      0% { text-shadow: 0 0 15px #ff4da6, 0 0 30px #ff4da6; }
      100% { text-shadow: 0 0 35px #ff1a85, 0 0 65px #ff0066; }
    }

    .close-dark-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid #ff99cc;
      color: #ffccdf;
      font-size: 2rem;
      padding: 0.8rem 2.8rem;
      border-radius: 60px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.3s;
      font-family: inherit;
      font-weight: bold;
      letter-spacing: 0.1em;
    }

    .close-dark-btn:hover {
      background: rgba(255, 150, 200, 0.5);
      color: white;
      border-color: white;
    }

    /* Основной контейнер */
    .main-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      z-index: 10;
    }

    /* Верхняя панель: счётчик и кнопка */
    .top-panel {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 240, 245, 0.7);
      backdrop-filter: blur(14px);
      padding: 1.2rem 2.8rem;
      border-radius: 80px;
      box-shadow: 0 20px 35px rgba(255, 105, 180, 0.25);
      border: 2px solid rgba(255, 192, 203, 0.8);
      z-index: 50;
    }

    .together-label {
      font-size: 2.4rem;
      font-weight: 700;
      color: #d43f6b;
      letter-spacing: 0.08em;
      text-shadow: 2px 2px 8px #ffb6c1;
      background: linear-gradient(to right, #ff99c2, #d43f6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .counter {
      font-size: 3.2rem;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.7);
      padding: 0.2rem 2.5rem;
      border-radius: 60px;
      color: #b0306a;
      letter-spacing: 0.05em;
      box-shadow: inset 0 2px 10px rgba(255, 140, 180, 0.6);
      backdrop-filter: blur(5px);
      font-feature-settings: "tnum";
      margin-bottom: 0.3rem;
    }

    .breakup-btn {
      background: #ffe4ec;
      border: 2px solid #ff85a2;
      color: #b3415c;
      font-size: 1.4rem;
      font-weight: bold;
      padding: 0.5rem 2rem;
      border-radius: 40px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      margin-top: 0.3rem;
      letter-spacing: 0.06em;
      background: rgba(255, 220, 230, 0.8);
      box-shadow: 0 4px 10px rgba(255, 80, 120, 0.3);
    }

    .breakup-btn:hover {
      background: #ffb3c6;
      color: white;
      border-color: #ff4d6d;
      transform: scale(1.02);
    }

    /* Холст для бабочек, птичек, сердечек и фото */
    #animationCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 30;
    }

    /* Летающие элементы кликабельны через абсолютное позиционирование в JS, 
       но canvas используется для отрисовки. Для фото добавим элементы поверх */
    .floating-photo {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(255, 20, 147, 0.5);
      object-fit: cover;
      border: 3px solid white;
      cursor: pointer;
      pointer-events: auto;
      z-index: 40;
      transition: transform 0.2s ease;
      background: pink;
    }

    .floating-photo:hover {
      transform: scale(1.15);
      box-shadow: 0 14px 25px #ff1493;
    }

    /* Модальное окно для фото */
    .photo-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      opacity: 0;
      visibility: hidden;
      transition: 0.4s ease;
    }

    .photo-modal.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-img {
      max-width: 90%;
      max-height: 85%;
      border-radius: 35px;
      box-shadow: 0 30px 60px rgba(255, 192, 203, 0.8);
      border: 5px solid white;
      animation: scaleIn 0.5s ease;
    }

    @keyframes scaleIn {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .close-photo {
      position: absolute;
      top: 25px;
      right: 40px;
      font-size: 3.5rem;
      color: white;
      cursor: pointer;
      background: rgba(255, 160, 180, 0.5);
      border-radius: 50%;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
      backdrop-filter: blur(15px);
      transition: 0.3s;
    }

    .close-photo:hover {
      background: #ff4d6d;
      transform: rotate(90deg);
    }

    /* Надпись "Нажми" и комплимент */
    .compliment-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 240, 245, 0.9);
      backdrop-filter: blur(16px);
      z-index: 250;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: 0.5s;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: bold;
      color: #d43f6b;
      text-shadow: 2px 2px 15px #fff;
      text-align: center;
      padding: 2rem;
    }

    .compliment-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .compliment-text {
      animation: floatText 2s infinite alternate;
      margin-bottom: 2rem;
    }

    @keyframes floatText {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-10px); }
    }

    .close-compliment {
      font-size: 2rem;
      background: white;
      border: none;
      padding: 0.8rem 2.5rem;
      border-radius: 50px;
      background: #ffd0dc;
      color: #b0306a;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <!-- Темный слой для "Расстались" -->
  <div class="dark-overlay" id="darkOverlay">
    <div class="dark-message">Не дождёшься</div>
    <button class="close-dark-btn" id="closeDarkBtn">Закрыть</button>
  </div>

  <!-- Комплимент / приятная надпись -->
  <div class="compliment-overlay" id="complimentOverlay">
    <div class="compliment-text" id="complimentMessage">Зайка</div>
    <button class="close-compliment" id="closeComplimentBtn">Закрыть</button>
  </div>

  <!-- Модалка для фото -->
  <div class="photo-modal" id="photoModal">
    <span class="close-photo" id="closePhotoModal">&times;</span>
    <img class="modal-img" id="modalImage" src="" alt="Фото">
  </div>

  <div class="main-container">
    <div class="top-panel">
      <span class="together-label">💗 Мы уже вместе 💗</span>
      <div class="counter" id="counterDisplay">0 д. 00:00:00</div>
      <button class="breakup-btn" id="breakupButton">💔 Расстались</button>
    </div>
  </div>

  <canvas id="animationCanvas"></canvas>

  <script>
    (function() {
      // ---------- ДАННЫЕ И НАСТРОЙКИ ----------
      const startDate = new Date('2021-10-11T00:00:00');
      
      // Фотографии: добавляйте свои URL сюда (можно много)
      const photoUrls = [
        'https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1500336624523-d7271308a8e5?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1518834107812-67b0b7c58434?q=80&w=400&auto=format&fit=crop',
        'https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400&auto=format&fit=crop'
      ];

      // Приятные слова (комплименты)
      const compliments = [
        'Зайка', 'Мышка', 'Солнышко', 'Родная', 'Красотка', 'Любимая', 
        'Принцесса', 'Счастье моё', 'Котёнок', 'Лапушка', 'Нежность'
      ];

      // ---------- DOM элементы ----------
      const counterDisplay = document.getElementById('counterDisplay');
      const darkOverlay = document.getElementById('darkOverlay');
      const closeDarkBtn = document.getElementById('closeDarkBtn');
      const breakupButton = document.getElementById('breakupButton');
      
      const complimentOverlay = document.getElementById('complimentOverlay');
      const complimentMessage = document.getElementById('complimentMessage');
      const closeComplimentBtn = document.getElementById('closeComplimentBtn');
      
      const photoModal = document.getElementById('photoModal');
      const modalImage = document.getElementById('modalImage');
      const closePhotoModal = document.getElementById('closePhotoModal');
      
      const canvas = document.getElementById('animationCanvas');
      const ctx = canvas.getContext('2d');

      // Массивы для анимаций
      let butterflies = [];
      let birds = [];
      let hearts = [];
      let floatingPhotoElements = []; // DOM элементы фото

      // Размеры
      let width, height;

      // ---------- ФУНКЦИИ ----------
      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // Обновление счётчика
      function updateCounter() {
        const now = new Date();
        let diff = now - startDate;
        if (diff < 0) diff = 0;
        
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (86400000)) / (3600000));
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        
        const formatted = `${days} д. ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
        counterDisplay.textContent = formatted;
      }
      setInterval(updateCounter, 1000);
      updateCounter();

      // Кнопка "Расстались"
      breakupButton.addEventListener('click', () => {
        darkOverlay.classList.add('active');
      });
      closeDarkBtn.addEventListener('click', () => {
        darkOverlay.classList.remove('active');
      });

      // Комплимент попап
      function showCompliment(word) {
        complimentMessage.textContent = word;
        complimentOverlay.classList.add('active');
      }
      closeComplimentBtn.addEventListener('click', () => {
        complimentOverlay.classList.remove('active');
      });

      // Фото модалка
      function openPhotoModal(url) {
        modalImage.src = url;
        photoModal.classList.add('active');
      }
      closePhotoModal.addEventListener('click', () => {
        photoModal.classList.remove('active');
      });
      photoModal.addEventListener('click', (e) => {
        if (e.target === photoModal) photoModal.classList.remove('active');
      });

      // Создание DOM-элементов летающих фото
      function createFloatingPhoto(url) {
        const photoDiv = document.createElement('img');
        photoDiv.src = url;
        photoDiv.className = 'floating-photo';
        photoDiv.style.left = Math.random() * (width - 80) + 'px';
        photoDiv.style.top = Math.random() * (height - 80) + 'px';
        
        // Данные для движения
        const speedX = (Math.random() - 0.5) * 1.5;
        const speedY = (Math.random() - 0.5) * 1.5;
        photoDiv.speedX = speedX;
        photoDiv.speedY = speedY;
        
        photoDiv.addEventListener('click', (e) => {
          e.stopPropagation();
          openPhotoModal(url);
        });
        
        document.body.appendChild(photoDiv);
        return photoDiv;
      }

      // Инициализация фото (можно добавить больше)
      function initPhotos() {
        // Удаляем старые если есть
        floatingPhotoElements.forEach(el => el.remove());
        floatingPhotoElements = [];
        
        photoUrls.forEach(url => {
          const photoEl = createFloatingPhoto(url);
          floatingPhotoElements.push(photoEl);
        });
      }
      initPhotos();

      // Обновление позиций фото
      function updatePhotoPositions() {
        for (let photo of floatingPhotoElements) {
          let left = parseFloat(photo.style.left);
          let top = parseFloat(photo.style.top);
          
          left += photo.speedX;
          top += photo.speedY;
          
          // Отскок от краев
          if (left <= 0 || left >= width - 70) {
            photo.speedX *= -1;
            left = Math.max(0, Math.min(width - 70, left));
          }
          if (top <= 0 || top >= height - 70) {
            photo.speedY *= -1;
            top = Math.max(0, Math.min(height - 70, top));
          }
          
          photo.style.left = left + 'px';
          photo.style.top = top + 'px';
        }
        requestAnimationFrame(() => {
          // продолжаем только если не заблокировано
          setTimeout(() => updatePhotoPositions(), 30);
        });
      }
      updatePhotoPositions();

      // Генерация существ для canvas
      function createButterfly() {
        return {
          x: Math.random() * width,
          y: Math.random() * height,
          size: 18 + Math.random() * 18,
          speedX: (Math.random() - 0.5) * 1.3,
          speedY: (Math.random() - 0.7) * 1.2,
          angle: Math.random() * Math.PI * 2,
          wingPhase: Math.random() * 100,
          color: `hsl(${330 + Math.random() * 30}, 80%, 70%)`,
        };
      }
      
      function createBird() {
        return {
          x: Math.random() * width,
          y: Math.random() * height * 0.7,
          size: 14 + Math.random() * 14,
          speedX: (Math.random() - 0.3) * 1.8,
          speedY: (Math.random() - 0.3) * 0.9,
          wing: 0,
        };
      }
      
      function createHeart() {
        return {
          x: Math.random() * width,
          y: Math.random() * height,
          size: 14 + Math.random() * 22,
          speedY: -0.4 - Math.random() * 1.2,
          speedX: (Math.random() - 0.5) * 0.6,
          opacity: 0.7 + Math.random() * 0.3,
          color: `rgba(255, ${100+Math.random()*100}, 180, 0.9)`,
        };
      }

      // Инициализация массивов
      for (let i = 0; i < 8; i++) butterflies.push(createButterfly());
      for (let i = 0; i < 5; i++) birds.push(createBird());
      for (let i = 0; i < 12; i++) hearts.push(createHeart());

      // Рисование
      function drawButterfly(ctx, b) {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(Math.sin(b.wingPhase) * 0.25);
        ctx.fillStyle = b.color;
        ctx.shadowColor = '#ff99cc';
        ctx.shadowBlur = 8;
        // Крылья
        ctx.beginPath();
        ctx.ellipse(-b.size*0.5, 0, b.size*0.6, b.size*0.3, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(b.size*0.5, 0, b.size*0.6, b.size*0.3, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff3f8';
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.arc(0, 0, b.size*0.25, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }

      function drawBird(ctx, b) {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.fillStyle = '#ffb7c5';
        ctx.shadowColor = '#ff85a2';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(0, 0, b.size*0.5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff0f3';
        ctx.beginPath();
        ctx.arc(-2, -2, b.size*0.2, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }

      function drawHeart(ctx, h) {
        ctx.save();
        ctx.translate(h.x, h.y);
        ctx.fillStyle = h.color;
        ctx.shadowColor = '#ff4d6d';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        const s = h.size;
        ctx.moveTo(0, s*0.3);
        ctx.bezierCurveTo(-s*0.5, -s*0.3, -s*0.5, s*0.5, 0, s*0.9);
        ctx.bezierCurveTo(s*0.5, s*0.5, s*0.5, -s*0.3, 0, s*0.3);
        ctx.fill();
        ctx.restore();
      }

      function animateCanvas() {
        ctx.clearRect(0, 0, width, height);
        
        // Обновление и отрисовка бабочек
        for (let b of butterflies) {
          b.x += b.speedX;
          b.y += b.speedY;
          b.wingPhase += 0.15;
          if (b.x < -30) b.x = width + 30;
          if (b.x > width + 30) b.x = -30;
          if (b.y < -30) b.y = height + 30;
          if (b.y > height + 30) b.y = -30;
          drawButterfly(ctx, b);
        }
        
        for (let b of birds) {
          b.x += b.speedX;
          b.y += b.speedY;
          if (b.x < -20) b.x = width + 20;
          if (b.x > width + 20) b.x = -20;
          if (b.y < -20) b.y = height + 20;
          if (b.y > height + 20) b.y = -20;
          drawBird(ctx, b);
        }
        
        for (let h of hearts) {
          h.y += h.speedY;
          h.x += h.speedX;
          if (h.y < -30) {
            h.y = height + 30;
            h.x = Math.random() * width;
          }
          drawHeart(ctx, h);
        }
        
        requestAnimationFrame(animateCanvas);
      }
      animateCanvas();

      // Периодическое появление надписи "Нажми" над элементами
      setInterval(() => {
        // Создаём визуальную подсказку (всплывающая надпись) 
        const hint = document.createElement('div');
        hint.innerText = 'Нажми';
        hint.style.position = 'fixed';
        hint.style.left = Math.random() * (width - 100) + 'px';
        hint.style.top = Math.random() * (height - 100) + 'px';
        hint.style.color = '#ff2d6d';
        hint.style.fontWeight = 'bold';
        hint.style.fontSize = '2rem';
        hint.style.zIndex = '100';
        hint.style.pointerEvents = 'none';
        hint.style.animation = 'floatText 1.5s ease-out forwards';
        hint.style.textShadow = '0 0 15px white';
        document.body.appendChild(hint);
        
        setTimeout(() => {
          hint.remove();
        }, 2000);
      }, 4500);

      // Обработчик клика по canvas (бабочки/сердечки/птички) - показываем комплимент
      canvas.addEventListener('click', (e) => {
        const randomCompliment = compliments[Math.floor(Math.random() * compliments.length)];
        showCompliment(randomCompliment);
      });

      // Также клик по фото не должен вызывать canvas (уже preventDefault? но на всякий случай)
      // Дополнительно: чтобы "Нажми" срабатывало и на фото, добавим обработку на document
      document.addEventListener('click', function(e) {
        if (e.target.classList.contains('floating-photo')) {
          const randomComp = compliments[Math.floor(Math.random() * compliments.length)];
          showCompliment(randomComp);
        }
      });

      // Пересоздание при ресайзе для фото (упрощённо)
      window.addEventListener('resize', () => {
        resizeCanvas();
        // Пересоздадим фото позиции примерно
      });

    })();
  </script>
</body>
</html>
